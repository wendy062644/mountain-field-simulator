<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魯凱族山田燒墾小遊戲</title>
  <style>
    :root {
      --ui-bg: rgba(35, 24, 12, 0.9);
      --ui-border: #e6c98a;
      --ui-text: #fff7de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(#90c95b, #6ca242);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(96vw, 1280px);
      height: auto;
      max-height: 92vh;
      border: 6px solid #3a2816;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      background: #7fb253;
    }
    .panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(96vw, 1280px);
      pointer-events: none;
    }
    #topbar {
      top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--ui-text);
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0,0,0,0.35);
    }

    .badge {
      background: var(--ui-bg);
      border: 3px solid var(--ui-border);
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 22px;
      line-height: 1.5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    #dialogue {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(8px);
      width: min(96vw, 1280px);

      background: rgba(35, 24, 12, 0.92);
      border: 3px solid var(--ui-border);
      border-radius: 16px;
      color: var(--ui-text);

      padding: 16px 18px;
      min-height: 112px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30);
      overflow: visible;
      pointer-events: none;

      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s ease, transform 0.18s ease, min-height 0.18s ease, padding 0.18s ease;
    }

    #dialogue.active {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    #dialogue .dialogue-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-height: 0;
    }

    #dialogue .title {
      color: #ffd27d;
      font-weight: 800;
      letter-spacing: 1px;
      font-size: 14px;
      line-height: 1.2;
    }

    #dialogue .text {
      font-size: 18px;
      line-height: 1.55;
    }

    #dialogue .hint {
      font-size: 13px;
      opacity: 0.82;
      color: #ffebb9;
    }

    #dialoguePortrait {
      position: absolute;
      right: 18px;
      top: -42px;
      width: 180px;
      height: 180px;
      display: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
    }

    /* 正式對話時放大 */
    #dialogue.talking {
      background: linear-gradient(rgba(42, 28, 16, 0.96), rgba(28, 18, 10, 0.96));
      border-width: 4px;
      border-radius: 24px;
      padding: 24px 220px 22px 26px;
      min-height: 210px;
      box-shadow: 0 18px 38px rgba(0,0,0,0.36);
    }

    #dialogue.talking .dialogue-main {
      gap: 10px;
      min-height: 150px;
    }

    #dialogue.talking .title {
      font-weight: 900;
      font-size: 22px;
    }

    #dialogue.talking .text {
      font-size: 28px;
      line-height: 1.65;
      text-shadow: 0 2px 0 rgba(0,0,0,0.28);
    }

    #dialogue.talking .hint {
      font-size: 15px;
      opacity: 0.88;
    }

    #dialogue.talking.show-portrait #dialoguePortrait {
      display: block;
    }
    #dialogue.show-portrait #dialoguePortrait {
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1280" height="768"></canvas>

    <div class="panel" id="topbar">
      <div class="badge" id="mission">任務：前往山田，與長老對話</div>
      <div class="badge" id="status">場景：戶外｜祈福：未完成｜整理：0 / 0</div>
    </div>

    <div class="panel" id="dialogue">
      <canvas id="dialoguePortrait" width="180" height="180"></canvas>

      <div class="dialogue-main">
        <div class="title" id="dialogueTitle">魯凱族山田燒墾</div>
        <div class="text" id="dialogueText">使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。</div>
        <div class="hint">操作：移動 / 空白鍵互動 / R 重新開始</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dialogueEl = document.getElementById('dialogue');
    const dialogueTitle = document.getElementById('dialogueTitle');
    const dialogueText = document.getElementById('dialogueText');
    const portraitCanvas = document.getElementById('dialoguePortrait');
    const portraitCtx = portraitCanvas.getContext('2d');
    const missionEl = document.getElementById('mission');
    const statusEl = document.getElementById('status');

    const TILE = 32;
    const WORLD = { w: 56, h: 30 };
    const keys = {};
    let canPressInteract = true;

    document.addEventListener('keydown', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = true;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if (k === 'r') init();

      if (!game.started) {
        if (k === 'a' || k === 'ArrowLeft') game.selectedGender = 'male';
        if (k === 'd' || k === 'ArrowRight') game.selectedGender = 'female';
        if (k === 'Enter') {
          const n = prompt('請輸入角色名字：', game.playerName || '');
          if (n && n.trim()) game.playerName = n.trim();
          game.started = true;
          setMessage(`歡迎，${game.playerName}。先熟悉部落，再前往山田。`);
          updateUI();
        }
      }
    });
    document.addEventListener('keyup', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = false;
      if (e.key === ' ') canPressInteract = true;
    });

    const game = {
      player: null,
      elder: null,
      blocks: [],
      weeds: [],
      stackZone: null,
      blessingDone: false,
      blessingStep: 0,
      carrying: false,
      allCleared: false,
      burningTriggered: false,
      burningProgress: 0,
      inHouse: false,
      landReady: false,
      landPlots: [],
      landPrepared: false,

      stoneStacks: [],
      stoneWallBuilt: false,

      scareDevices: [],
      scareReady: false,

      allSeeded: false,
      birds: [],
      birdTimer: 0,
      scareCount: 0,
      birdPhaseDone: false,

      houseDoorZone: null,
      houseExitZone: null,
      interiorGuide: null,
      camera: { x: 0, y: 0 },
      started: false,
      selectedGender: 'male',
      playerName: '',
      message: '使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。',
      currentSpeaker: 'system',
      currentTitle: '魯凱族山田燒墾',
      isTalking: false
    };

    function init() {
      game.player = { x: 7.2 * TILE, y: 19.2 * TILE, w: 20, h: 26, speed: 2.4, dir: 'down' };
      game.elder = { x: 46.5 * TILE, y: 13.5 * TILE, w: 20, h: 26 };
      game.blocks = [];
      game.weeds = [];
      game.stackZone = { x: 47 * TILE, y: 19 * TILE, w: TILE * 3, h: TILE * 2 };
      game.houseDoorZone = { x: 8.15 * TILE, y: 16 * TILE, w: 1.55 * TILE, h: 2.9 * TILE };
      game.houseExitZone = { x: 14.2 * TILE, y: 14.3 * TILE, w: 1.6 * TILE, h: 1.2 * TILE };
      game.interiorGuide = { x: 20.5 * TILE, y: 8.5 * TILE, w: 20, h: 26 };
      game.blessingDone = false;
      game.blessingStep = 0;
      game.carrying = false;
      game.allCleared = false;
      game.burningTriggered = false;
      game.burningProgress = 0;
      game.inHouse = false;
      game.landReady = false;
      game.landPlots = [];
      game.landPrepared = false;
      game.stoneStacks = [];
      game.stoneWallBuilt = false;

      game.scareDevices = [];
      game.scareReady = false;
      game.allSeeded = false;
      game.birds = [];
      game.birdTimer = 0;
      game.scareCount = 0;
      game.birdPhaseDone = false;
      game.camera = { x: 0, y: 0 };
      game.started = false;
      game.message = '';
      game.currentSpeaker = 'system';
      game.currentTitle = '魯凱族山田燒墾';
      game.isTalking = false;
      buildWorld();
      updateCamera();
      updateUI();
      refreshDialogueUI();
    }

    function buildWorld() {
      for (let x = 0; x < WORLD.w; x++) {
        addBlock(x, 0, 1, 1, 'tree');
        addBlock(x, WORLD.h - 1, 1, 1, 'tree');
      }
      for (let y = 1; y < WORLD.h - 1; y++) {
        addBlock(0, y, 1, 1, 'tree');
        addBlock(WORLD.w - 1, y, 1, 1, 'tree');
      }

      // 部落區：不使用圍牆，改用前院空地、石板地與樹木界定空間
      addBlock(6, 14, 6, 4, 'house');
      addBlock(6, 13, 6, 1, 'houseRoof');
      addBlock(14, 14, 1, 3, 'totem');

      // 部落周邊以樹與石材物件構成自然邊界
      addBlock(2, 10, 1, 1, 'tree');
      addBlock(4, 8, 1, 1, 'tree');
      addBlock(12, 8, 1, 1, 'tree');
      addBlock(15, 10, 1, 1, 'tree');
      addBlock(2, 21, 1, 1, 'tree');
      addBlock(16, 21, 1, 1, 'tree');
      addBlock(4, 21, 1, 1, 'tree');
      addBlock(13, 22, 1, 1, 'tree');

      // 山林過渡
      addBlock(18, 4, 1, 10, 'tree');
      addBlock(18, 17, 1, 10, 'tree');
      addBlock(19, 4, 10, 1, 'tree');
      addBlock(19, 26, 16, 1, 'tree');
      addBlock(28, 6, 1, 6, 'tree');
      addBlock(28, 16, 1, 10, 'tree');
      addBlock(33, 4, 1, 7, 'tree');
      addBlock(33, 17, 1, 10, 'tree');
      addBlock(37, 6, 1, 6, 'tree');
      addBlock(37, 16, 1, 10, 'tree');

      // 山田區：移除整圈柵欄，改成自然邊界（大樹、局部開口）
      addBlock(39, 8, 2, 1, 'tree');
      addBlock(42, 8, 2, 1, 'tree');
      addBlock(45, 8, 2, 1, 'tree');
      addBlock(48, 8, 2, 1, 'tree');
      addBlock(51, 8, 2, 1, 'tree');

      addBlock(39, 21, 2, 1, 'tree');
      addBlock(42, 21, 2, 1, 'tree');
      addBlock(45, 21, 1, 1, 'tree');

      addBlock(39, 10, 1, 2, 'tree');
      addBlock(39, 17, 1, 3, 'tree');
      addBlock(52, 9, 1, 3, 'tree');
      addBlock(52, 15, 1, 4, 'tree');

      // 入口左側保留開口，右下留出堆置區通道
      const spots = [
        [41,10],[45,10],[49,10],
        [40,12],[44,12],[50,12],
        [41,14],[45,14],[49,14],
        [42,16],[46,16],
        [43,18],[47,18]
      ];
      const specialKinds = {
        2: 'wildflower',
        6: 'stone',
        10: 'nest'
      };

      spots.forEach(([x,y], i) => {
        game.weeds.push({
          x: x * TILE + 5,
          y: y * TILE + 6,
          w: 22,
          h: 20,
          cleared: false,
          id: i,
          kind: specialKinds[i] || 'normal'
        });
      });
    }

    function setupLandPlots() {
      game.landPlots = [
        { x: 41.2 * TILE, y: 10.8 * TILE, w: 2.6 * TILE, h: 2.2 * TILE, prepared: false, seeded: false },
        { x: 46.0 * TILE, y: 10.8 * TILE, w: 2.8 * TILE, h: 2.2 * TILE, prepared: false, seeded: false },
        { x: 41.6 * TILE, y: 15.0 * TILE, w: 2.7 * TILE, h: 2.3 * TILE, prepared: false, seeded: false },
        { x: 46.1 * TILE, y: 15.1 * TILE, w: 2.8 * TILE, h: 2.3 * TILE, prepared: false, seeded: false }
      ];

      game.stoneStacks = [
        { x: 40.3 * TILE, y: 13.4 * TILE, w: 1.8 * TILE, h: 0.8 * TILE, done: false },
        { x: 43.0 * TILE, y: 13.3 * TILE, w: 2.0 * TILE, h: 0.8 * TILE, done: false },
        { x: 46.0 * TILE, y: 13.5 * TILE, w: 1.8 * TILE, h: 0.8 * TILE, done: false },
        { x: 48.8 * TILE, y: 13.4 * TILE, w: 1.8 * TILE, h: 0.8 * TILE, done: false }
      ];
    }

    function addBlock(tx, ty, tw, th, type) {
      game.blocks.push({ x: tx * TILE, y: ty * TILE, w: tw * TILE, h: th * TILE, type, tx, ty });
    }

    function removeBlockAt(tx, ty) {
      game.blocks = game.blocks.filter(b => !(b.tx === tx && b.ty === ty && b.w === TILE && b.h === TILE));
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function shrinkBlockForCollision(b) {
      if (b.type === 'tree') return { x: b.x + 2, y: b.y + 10, w: b.w - 4, h: b.h - 10 };
      if (b.type === 'house') return { x: b.x + 10, y: b.y + 18, w: b.w - 20, h: b.h - 18 };
      if (b.type === 'houseRoof') return null;
      return b;
    }

    function getStoneHouseGeometry(b) {
      const x = b.x - 26;
      const y = b.y - 42;
      const w = 8.4 * TILE;
      const h = 5.2 * TILE;

      const body = {
        x: x + 12,
        y: y + 56,
        w: w - 16,
        h: h - 20
      };

      const door = {
        x: x + 94,
        y: y + 106,
        w: 50,
        h: 92
      };

      return { x, y, w, h, body, door };
    }

    function getHouseColliders(b) {
      const g = getStoneHouseGeometry(b);
      const body = g.body;
      const door = g.door;

      // 把可通行門洞往下壓
      const doorOpeningTop = door.y + 70;

      return [
        // 門上方整片牆（往下延長到 doorOpeningTop）
        {
          x: body.x,
          y: body.y,
          w: body.w,
          h: doorOpeningTop - body.y
        },

        // 門左側牆
        {
          x: body.x,
          y: doorOpeningTop,
          w: door.x - body.x,
          h: body.y + body.h - doorOpeningTop
        },

        // 門右側牆
        {
          x: door.x + door.w,
          y: doorOpeningTop,
          w: body.x + body.w - (door.x + door.w),
          h: body.y + body.h - doorOpeningTop
        }
      ];
    }

    function collides(box) {
      if (game.inHouse) {
        const roomBounds = { x: 80, y: 130, w: canvas.width - 160, h: canvas.height - 150 };

        const hitRoomEdge =
          box.x < roomBounds.x ||
          box.y < roomBounds.y ||
          box.x + box.w > roomBounds.x + roomBounds.w ||
          box.y + box.h > roomBounds.y + roomBounds.h;

        if (hitRoomEdge) return true;

        // 室內 NPC 防撞
        const guideHitbox = getNPCCollider(game.interiorGuide);
        if (rectsOverlap(box, guideHitbox)) return true;

        return false;
      }

      // 室外 NPC 防撞
      const elderHitbox = getNPCCollider(game.elder);
      if (rectsOverlap(box, elderHitbox)) return true;

      for (const b of game.blocks) {
        if (b.type === 'house') {
          const colliders = getHouseColliders(b);
          for (const c of colliders) {
            if (rectsOverlap(box, c)) return true;
          }
          continue;
        }

        const hitbox = shrinkBlockForCollision(b);
        if (hitbox && rectsOverlap(box, hitbox)) return true;
      }

      return false;
    }

    function updateCamera() {
      if (game.inHouse) return;
      const worldW = WORLD.w * TILE;
      const worldH = WORLD.h * TILE;
      const tx = game.player.x + game.player.w / 2 - canvas.width / 2;
      const ty = game.player.y + game.player.h / 2 - canvas.height / 2;
      game.camera.x = clamp(tx, 0, Math.max(0, worldW - canvas.width));
      game.camera.y = clamp(ty, 0, Math.max(0, worldH - canvas.height));
    }

    function movePlayer() {
      const p = game.player;
      let dx = 0, dy = 0;
      if (keys['ArrowLeft'] || keys['a']) { dx -= p.speed; p.dir = 'left'; }
      if (keys['ArrowRight'] || keys['d']) { dx += p.speed; p.dir = 'right'; }
      if (keys['ArrowUp'] || keys['w']) { dy -= p.speed; p.dir = 'up'; }
      if (keys['ArrowDown'] || keys['s']) { dy += p.speed; p.dir = 'down'; }

      const nextX = { x: p.x + dx, y: p.y, w: p.w, h: p.h };
      if (!collides(nextX)) p.x += dx;
      const nextY = { x: p.x, y: p.y + dy, w: p.w, h: p.h };
      if (!collides(nextY)) p.y += dy;
    }

    function getNPCCollider(npc) {
      return {
        x: npc.x + 1,
        y: npc.y + 2,
        w: npc.w - 2,
        h: npc.h - 2
      };
    }

    function isNear(a, b, d = 36) {
      const ax = a.x + a.w / 2;
      const ay = a.y + a.h / 2;
      const bx = b.x + b.w / 2;
      const by = b.y + b.h / 2;
      return Math.hypot(ax - bx, ay - by) <= d;
    }

    function setDialogue(text, speaker = 'system', title = null) {
      game.message = text;
      game.currentSpeaker = speaker;
      game.isTalking = true;

      const titleMap = {
        system: '魯凱族山田燒墾',
        elder: '長老',
        interiorGuide: '屋內長者',
        player: game.playerName || '你'
      };

      game.currentTitle = title || titleMap[speaker] || '魯凱族山田燒墾';
      refreshDialogueUI();
    }

    function drawDialoguePortrait(speaker) {
      portraitCtx.clearRect(0, 0, portraitCanvas.width, portraitCanvas.height);
      if (!speaker) return;

      const ctx = portraitCtx;
      const isElder = speaker === 'elder';
      const clothes = isElder ? '#1a1a1a' : '#5a3420';
      const skin = '#d0b98c';

      // 背景光暈
      ctx.fillStyle = 'rgba(255, 222, 150, 0.12)';
      ctx.beginPath();
      ctx.arc(92, 84, 62, 0, Math.PI * 2);
      ctx.fill();

      // 頭髮後輪廓
      ctx.fillStyle = '#1c1713';
      ctx.fillRect(56, 38, 66, 74);

      // 臉
      ctx.fillStyle = skin;
      ctx.fillRect(66, 42, 46, 44);

      // 頭髮瀏海
      ctx.fillStyle = '#16120f';
      ctx.fillRect(62, 34, 54, 18);
      ctx.fillRect(60, 44, 10, 16);
      ctx.fillRect(108, 44, 8, 14);

      // 眼睛
      ctx.fillStyle = '#fff8ea';
      ctx.fillRect(76, 58, 6, 4);
      ctx.fillRect(96, 58, 6, 4);

      // 眼珠
      ctx.fillStyle = '#2d241d';
      ctx.fillRect(78, 59, 2, 2);
      ctx.fillRect(98, 59, 2, 2);

      // 鼻口
      ctx.fillStyle = '#8b6a57';
      ctx.fillRect(88, 65, 3, 6);
      ctx.fillStyle = '#6b4434';
      ctx.fillRect(84, 74, 10, 3);

      // 頸部
      ctx.fillStyle = skin;
      ctx.fillRect(80, 86, 16, 12);

      // 上半身衣服
      ctx.fillStyle = clothes;
      ctx.fillRect(50, 98, 78, 58);

      // 肩膀
      ctx.fillRect(42, 108, 20, 26);
      ctx.fillRect(116, 108, 20, 26);

      // 傳統紋樣
      ctx.fillStyle = '#efe8d4';
      ctx.fillRect(84, 100, 8, 50);
      ctx.fillRect(69, 118, 6, 18);
      ctx.fillRect(101, 118, 6, 18);

      if (isElder) {
        // 長老較沉穩的披飾
        ctx.fillStyle = '#c2b18b';
        ctx.fillRect(63, 108, 50, 6);
        ctx.fillRect(72, 114, 8, 18);
        ctx.fillRect(97, 114, 8, 18);
      } else {
        // 屋內長者略溫暖的裝飾
        ctx.fillStyle = '#d6c3a1';
        ctx.fillRect(68, 108, 40, 5);
        ctx.fillRect(76, 114, 6, 16);
        ctx.fillRect(94, 114, 6, 16);
      }

      // 外框
      ctx.strokeStyle = '#e6c98a';
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, 144, 144);
    }

    function syncDialogueBox() {
      const shouldShow = game.started && !!game.message;
      dialogueEl.classList.toggle('active', shouldShow);
      dialogueEl.classList.toggle('talking', shouldShow && game.isTalking);

      const showPortrait =
        shouldShow &&
        game.isTalking &&
        (game.currentSpeaker === 'elder' || game.currentSpeaker === 'interiorGuide');

      dialogueEl.classList.toggle('show-portrait', showPortrait);
      drawDialoguePortrait(showPortrait ? game.currentSpeaker : null);
    }

    function refreshDialogueUI() {
      dialogueTitle.textContent = game.currentTitle;
      dialogueText.textContent = game.message;
      syncDialogueBox();
    }

    function setMessage(text, title = '魯凱族山田燒墾') {
      game.message = text;
      game.currentSpeaker = 'system';
      game.currentTitle = title;
      game.isTalking = false;
      refreshDialogueUI();
    }

    function handleInteract() {
      const pressed = keys[' '];
      if (!pressed || !canPressInteract) return;
      canPressInteract = false;
      const player = game.player;

      if (!game.inHouse && isNear(player, game.houseDoorZone, 44)) {
        game.inHouse = true;
        game.player.x = 14.8 * TILE;
        game.player.y = 14.2 * TILE;
        game.player.dir = 'up';
        setMessage('你走進石板屋。屋內擺著陶壺、木雕與日常器物。靠近門口再按空白鍵可離開。');
        updateUI();
        return;
      }

      if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
        game.inHouse = false;
        game.player.x = 7.2 * TILE;
        game.player.y = 19.2 * TILE;
        game.player.dir = 'down';
        updateCamera();
        setMessage('你走出石板屋，回到部落前方空地。');
        updateUI();
        return;
      }

      if (game.inHouse && isNear(player, game.interiorGuide, 50)) {
        setDialogue('石板屋是生活與記憶的所在。先熟悉家屋，再去山田與外面的長老對話。', 'interiorGuide');
        return;
      }

      if (!game.blessingDone && isNear(player, game.elder, 56)) {
        game.blessingStep++;
        if (game.blessingStep === 1) setDialogue('這片山田還不能動手。先向祖靈祈福，再開始整理吧。', 'elder');
        else if (game.blessingStep === 2) setDialogue('你與長老低聲祈禱，向土地、山林與祖靈表達敬意。', 'elder');
        else {
          game.blessingDone = true;
          setDialogue('祈福完成。現在可以整理荒田，把雜草與矮樹集中堆到右下角的堆置區。', 'elder');
        }
        updateUI();
        return;
      }

      if (!game.inHouse && game.blessingDone && !game.carrying) {
        const weed = game.weeds.find(w => !w.cleared && isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34));
        if (weed) {
          weed.cleared = true;
          game.carrying = true;

          if (weed.kind === 'wildflower') {
            setMessage('你在草叢裡發現一小束野花。你小心把它放到一旁，再把雜草帶去堆置區。');
          } else if (weed.kind === 'stone') {
            setMessage('草叢下露出一塊特別的石片，像是舊山田留下的痕跡。你記住了這個地方，再把草木搬去堆置區。');
          } else if (weed.kind === 'nest') {
            setMessage('你差點碰到一個小鳥巢，趕緊避開，把旁邊的雜草整理好後帶去堆置區。');
          } else {
            setMessage('你砍下並整理了一份雜草／矮樹。把它帶到堆置區。');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.carrying && isNear(player, game.stackZone, 58)) {
        game.carrying = false;

        const depositedNow = game.weeds.filter(w => w.cleared).length;
        const totalNow = game.weeds.length;

        if (depositedNow === Math.ceil(totalNow / 3)) {
          setMessage('你把第一批草木堆好，山田開始露出原本的輪廓。');
        } else if (depositedNow === Math.ceil(totalNow * 2 / 3)) {
          setMessage('整理進度過半，山田看起來清爽多了。');
        } else {
          setMessage('你把整理好的草木堆放在指定地點。');
        }

        if (game.weeds.every(w => w.cleared)) {
          game.allCleared = true;
          setMessage('荒田已整理完成。再到堆置區按空白鍵，即可觸發燃燒。');
        }

        updateUI();
        return;
      }

      if (!game.inHouse && game.allCleared && !game.carrying && isNear(player, game.stackZone, 58) && !game.burningTriggered) {
        game.burningTriggered = true;
        setMessage('你點燃堆置的草木，火勢受控地燃起。山田燒墾進入下一步。');
        updateUI();
      }

      if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
        const stack = game.stoneStacks.find(s => !s.done && isNear(player, s, 44));
        if (stack) {
          stack.done = true;

          const done = game.stoneStacks.filter(s => s.done).length;
          const total = game.stoneStacks.length;

          if (done < total) {
            setMessage(`你仔細堆疊石頭，讓擋土牆更穩固。石牆進度：${done} / ${total}`);
          } else {
            game.stoneWallBuilt = true;
            game.landPrepared = true;
            game.landPlots.forEach(p => p.prepared = true);
            setDialogue('石牆已經堆好，山田更穩固了。接下來可以開始播種。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.landPrepared && !game.allSeeded) {
        const plot = game.landPlots.find(p => p.prepared && !p.seeded && isNear(player, p, 44));
        if (plot) {
          plot.seeded = true;

          const done = game.landPlots.filter(p => p.seeded).length;
          const total = game.landPlots.length;

          if (done < total) {
            setMessage(`你將小米種子撒入土地。播種進度：${done} / ${total}`);
          } else {
            game.allSeeded = true;
            setupScareDevices();
            setDialogue('播種完成。先在田邊架設驅鳥器具，再開始守護山田。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.allSeeded && !game.scareReady) {
        const device = game.scareDevices.find(d => !d.placed && isNear(player, d, 42));
        if (device) {
          device.placed = true;

          const done = game.scareDevices.filter(d => d.placed).length;
          const total = game.scareDevices.length;

          if (done < total) {
            setMessage(`你架好了其中一組驅鳥器具。設置進度：${done} / ${total}`);
          } else {
            game.scareReady = true;
            setDialogue('驅鳥器具已設置完成。鳥群來時，去拉動繩子發出聲響。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
        const rope = game.scareDevices.find(
          d => d.placed && isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42)
        );

        if (rope) {
          const activeBirds = game.birds.filter(b => !b.scared);

          if (activeBirds.length === 0) {
            setMessage('你拉了繩子，鋁罐發出聲響，但現在還沒有鳥靠近山田。');
            updateUI();
            return;
          }

          for (const bird of activeBirds) {
            bird.scared = true;
          }

          game.scareCount++;

          if (game.scareCount < 5) {
            setMessage(`你拉動繩子，鋁罐發出聲響，鳥群被驚走了！驅鳥進度：${game.scareCount} / 5`);
          } else {
            game.birdPhaseDone = true;
            game.birds = [];
            setDialogue('很好，你用驅鳥器具守住了山田。', 'elder');
          }

          updateUI();
          return;
        }
      }
    }

    function updateBurning() {
      if (!game.burningTriggered) return;

      game.burningProgress = Math.min(1, game.burningProgress + 0.0035);

      if (game.burningProgress >= 1 && !game.landReady) {
        game.landReady = true;
        setupLandPlots();
        setDialogue('火勢已經退去，地面覆上一層灰燼。接下來要開始整地，把土地整理平順，準備播種。', 'elder');
        updateUI();
      }
    }

    function spawnBird() {
      const seededPlots = game.landPlots.filter(p => p.seeded);
      if (seededPlots.length === 0) return;

      const plot = seededPlots[Math.floor(Math.random() * seededPlots.length)];

      game.birds.push({
        x: plot.x + plot.w / 2 - 6,
        y: plot.y - 20,
        w: 12,
        h: 8,
        target: plot,
        scared: false,
        vy: 0.25
      });
    }

    function setupScareDevices() {
      game.scareDevices = [
        { x: 40.5 * TILE, y: 9.5 * TILE,  w: 18, h: 36, placed: false, ropeX: 42.2 * TILE, ropeY: 11.3 * TILE },
        { x: 50.8 * TILE, y: 9.7 * TILE,  w: 18, h: 36, placed: false, ropeX: 48.8 * TILE, ropeY: 11.5 * TILE },

        { x: 40.8 * TILE, y: 17.2 * TILE, w: 18, h: 36, placed: false, ropeX: 42.5 * TILE, ropeY: 18.8 * TILE },
        { x: 49.8 * TILE, y: 17.0 * TILE, w: 18, h: 36, placed: false, ropeX: 47.8 * TILE, ropeY: 18.7 * TILE }
      ];
    }

    function updateBirds() {
      if (!game.allSeeded || !game.scareReady || game.birdPhaseDone) return;

      game.birdTimer++;
      if (game.birdTimer >= 120 && game.birds.length < 3) {
        spawnBird();
        game.birdTimer = 0;
      }

      for (const bird of game.birds) {
        if (bird.scared) {
          bird.y -= 2.2;
          bird.x += 1.2;
          continue;
        }

        const targetY = bird.target.y + 10;
        if (bird.y < targetY) {
          bird.y += bird.vy;
        }
      }

      game.birds = game.birds.filter(b => b.y > -40 && b.x < WORLD.w * TILE + 40);
    }

    function drawBirds() {
      for (const b of game.birds) {
        if (b.scared) continue;

        ctx.fillStyle = '#2b2b2b';
        ctx.fillRect(b.x, b.y, 12, 8);

        ctx.fillRect(b.x - 4, b.y + 2, 5, 2);
        ctx.fillRect(b.x + 11, b.y + 2, 5, 2);

        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(b.x + 2, b.y - 2, 4, 2);
      }
    }

    function drawScareDevices() {
      for (const d of game.scareDevices) {
        // 竹竿
        if (d.placed) {
          ctx.fillStyle = '#7a5b2b';
          ctx.fillRect(d.x, d.y, 4, 36);
        } else {
          ctx.fillStyle = 'rgba(255, 236, 170, 0.65)';
          ctx.fillRect(d.x - 4, d.y + 28, 12, 6);
        }

        if (d.placed) {
          // 鋁罐
          ctx.fillStyle = '#c8c8c8';
          ctx.fillRect(d.x + 4, d.y + 6, 10, 8);
          ctx.fillRect(d.x + 6, d.y + 16, 10, 8);
          ctx.fillRect(d.x + 4, d.y + 26, 10, 8);

          // 繩子
          ctx.strokeStyle = '#d8c28a';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(d.x + 2, d.y + 8);
          ctx.lineTo(d.ropeX, d.ropeY);
          ctx.stroke();

          // 拉繩點
          ctx.fillStyle = '#f2e2a8';
          ctx.fillRect(d.ropeX - 5, d.ropeY - 5, 10, 10);
        }
      }
    }

    function updateUI() {
      const total = game.weeds.length;
      const deposited = game.weeds.filter(w => w.cleared).length - (game.carrying ? 1 : 0);

      if (game.inHouse) {
        missionEl.textContent = '任務：探索石板屋，靠近門口按空白鍵可離開';
      } else if (!game.blessingDone) {
        missionEl.textContent = '任務：到山田與長老對話，完成祈福';
      } else if (!game.allCleared) {
        missionEl.textContent = game.carrying ? '任務：把草木搬到右下角堆置區' : '任務：繼續整理荒田';
      } else if (!game.burningTriggered) {
        missionEl.textContent = '任務：前往堆置區，觸發燃燒';
      } else if (!game.landReady) {
        missionEl.textContent = '任務：等待火勢退去';
      } else if (!game.stoneWallBuilt) {
        missionEl.textContent = '任務：堆疊石頭，完成山田擋土牆';
      } else if (!game.allSeeded) {
        missionEl.textContent = '任務：在山田播種小米';
      } else if (!game.scareReady) {
        missionEl.textContent = '任務：在田邊架設驅鳥器具';
      } else if (!game.birdPhaseDone) {
        missionEl.textContent = `任務：拉動繩索驅鳥（${game.scareCount} / 5）`;
      } else {
        missionEl.textContent = '任務完成：你完成了播種與驅鳥';
      }

      const preparedCount = game.landPlots.filter(p => p.prepared).length;
      const preparedTotal = game.landPlots.length;
      const seededCount = game.landPlots.filter(p => p.seeded).length;
      const seededTotal = game.landPlots.length;

      statusEl.textContent =
        `場景：${game.inHouse ? '石板屋內' : '戶外'}｜祈福：${game.blessingDone ? '已完成' : '未完成'}｜整理：${Math.max(deposited, 0)} / ${total}` +
        `${game.carrying ? '｜搬運中' : ''}` +
        `${game.burningTriggered ? '｜燃燒中' : ''}` +
        `${game.landReady && !game.stoneWallBuilt ? `｜石牆：${game.stoneStacks.filter(s => s.done).length} / ${game.stoneStacks.length}` : ''}` +
        `${game.landPrepared ? `｜播種：${seededCount} / ${seededTotal}` : ''}` +
        `${game.allSeeded && !game.scareReady ? `｜器具：${game.scareDevices.filter(d => d.placed).length} / ${game.scareDevices.length}` : ''}` +
        `${game.scareReady && !game.birdPhaseDone ? `｜驅鳥：${game.scareCount} / 5` : ''}`;
      refreshDialogueUI();
    }

    function loop() {
      if (game.started) {
        movePlayer();
        handleInteract();
        updateBurning();
        updateBirds();
        updateCamera();
      }
      render();
      requestAnimationFrame(loop);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!game.started) {
        drawStartScreen();
        return;
      }

      if (game.inHouse) {
        drawInteriorScene();
        drawNPC(game.interiorGuide, '#5a3420', '#d0b98c');
        drawHouseExitMarker();
        drawPlayer();
      } else {
        ctx.save();
        ctx.translate(-game.camera.x, -game.camera.y);
        drawGround();
        drawRoad();
        drawHouseArea();
        drawField();
        drawLandPlots();
        drawScareDevices();
        drawBirds();
        drawBlocks();
        drawWeeds();
        drawStackZone();
        drawNPC(game.elder, '#1a1a1a', '#d0b98c');
        drawQuestIcon(game.elder, !game.blessingDone ? '!' : '?');
        drawDoorPrompt();
        drawPlayer();
        if (game.carrying) drawCarryIcon();
        ctx.restore();
      }
    }

    function drawGround() {
      for (let y = 0; y < WORLD.h; y++) {
        for (let x = 0; x < WORLD.w; x++) {
          const field = x >= 39 && x <= 52 && y >= 8 && y <= 21;
          ctx.fillStyle = field ? '#c39a58' : '#78b24f';
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.fillStyle = 'rgba(255,255,255,0.07)';
          if ((x + y) % 3 === 0) ctx.fillRect(x * TILE + 4, y * TILE + 4, 3, 3);
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          if ((x * 7 + y * 11) % 4 === 0) ctx.fillRect(x * TILE + 20, y * TILE + 16, 3, 3);
        }
      }
    }

    function drawRoad() {
      ctx.fillStyle = '#bc8746';

      // 石板屋前的小路
      ctx.fillRect(9 * TILE, 17 * TILE, 2.5 * TILE, 1.5 * TILE);

      // 通往森林的主路，做成逐段彎折比較自然
      ctx.fillRect(9.5 * TILE, 17.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(15 * TILE, 16.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(21 * TILE, 15.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(27 * TILE, 14.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(33 * TILE, 14 * TILE, 6 * TILE, 1.5 * TILE);

      // 接到山田入口
      ctx.fillRect(38 * TILE, 14 * TILE, 1.5 * TILE, 2 * TILE);

      // short spur toward the house door
      ctx.fillRect(8.5 * TILE, 16.4 * TILE, 1.2 * TILE, 0.8 * TILE);

      for (let i = 0; i < 140; i++) {
        const x = 7 * TILE + (i * 41) % (32 * TILE);
        const y = 14 * TILE + (i * 23) % (5 * TILE);
        ctx.fillStyle = i % 2 ? 'rgba(255,230,180,0.12)' : 'rgba(120,75,20,0.08)';
        ctx.fillRect(x, y, 3, 3);
      }
    }

    function drawHouseArea() {
      // 石板前院
      ctx.fillStyle = '#5e5e5e';
      for (let i = 0; i < 30; i++) {
        const row = Math.floor(i / 10);
        const px = 3.8 * TILE + (i % 10) * 24 + (row % 2 ? 8 : 0);
        const py = 18.0 * TILE + row * 18;
        ctx.beginPath();
        ctx.moveTo(px, py + 8);
        ctx.lineTo(px + 12, py);
        ctx.lineTo(px + 26, py + 4);
        ctx.lineTo(px + 22, py + 16);
        ctx.lineTo(px + 6, py + 18);
        ctx.closePath();
        ctx.fill();
      }

      // 柴堆與生活痕跡
      drawWoodPile(3.4 * TILE, 17.0 * TILE);
      drawWoodPile(12.3 * TILE, 18.6 * TILE);
      drawPotOutdoor(4.8 * TILE, 17.4 * TILE, 10);
      drawPotOutdoor(11.8 * TILE, 19.1 * TILE, 9);

      drawBush(5 * TILE + 6, 9 * TILE + 8, '#4a7f39');
      drawBush(12 * TILE + 6, 20 * TILE + 4, '#507d3a');
    }

    function drawField() {
      // main soil area with more organic shape
      ctx.fillStyle = '#b88745';
      ctx.fillRect(40 * TILE, 9 * TILE, 11 * TILE, 11 * TILE);

      // irregular edges to avoid boxy feel
      ctx.fillRect(39.5 * TILE, 11 * TILE, 1.5 * TILE, 7 * TILE);
      ctx.fillRect(50.5 * TILE, 10 * TILE, 1.5 * TILE, 8 * TILE);
      ctx.fillRect(42 * TILE, 19.5 * TILE, 6 * TILE, 1 * TILE);

      ctx.fillStyle = '#8f5d2f';
      for (let y = 9; y < 20; y++) {
        for (let x = 40; x < 51; x++) {
          ctx.fillRect(x * TILE + 2, y * TILE + 20, TILE - 4, 2);
        }
      }
    }

    function drawLandPlots() {
      if (!game.landReady) return;

      for (const plot of game.landPlots) {
        if (!plot.prepared) {
          ctx.fillStyle = 'rgba(70, 55, 30, 0.32)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(255, 234, 170, 0.72)';
          ctx.lineWidth = 2;
          ctx.strokeRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(90, 70, 40, 0.6)';
          for (let i = 0; i < 4; i++) {
            const yy = plot.y + 8 + i * 14;
            ctx.beginPath();
            ctx.moveTo(plot.x + 8, yy);
            ctx.lineTo(plot.x + plot.w - 8, yy + ((i % 2) ? 3 : -2));
            ctx.stroke();
          }
        } else {
          ctx.fillStyle = 'rgba(150, 110, 62, 0.28)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(120, 82, 42, 0.7)';
          ctx.lineWidth = 2;
          for (let i = 0; i < 5; i++) {
            const yy = plot.y + 8 + i * 12;
            ctx.beginPath();
            ctx.moveTo(plot.x + 6, yy);
            ctx.lineTo(plot.x + plot.w - 6, yy);
            ctx.stroke();
          }
        }

        // 已播種：覆蓋一層較深土色 + 固定種子點
        if (plot.seeded) {
          ctx.fillStyle = 'rgba(120, 80, 40, 0.22)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          ctx.fillStyle = '#2e1d0f';
          const cols = 5;
          const rows = 4;
          const gapX = plot.w / (cols + 1);
          const gapY = plot.h / (rows + 1);

          for (let ry = 1; ry <= rows; ry++) {
            for (let cx = 1; cx <= cols; cx++) {
              const px = plot.x + cx * gapX;
              const py = plot.y + ry * gapY;
              ctx.fillRect(px, py, 2, 2);
            }
          }
        }
      }

      for (const s of game.stoneStacks) {
        ctx.fillStyle = s.done ? '#6c6a67' : 'rgba(120, 120, 120, 0.45)';
        ctx.fillRect(s.x, s.y, s.w, s.h);

        ctx.strokeStyle = s.done ? '#3f3d3a' : 'rgba(255, 240, 200, 0.65)';
        ctx.lineWidth = 2;
        ctx.strokeRect(s.x, s.y, s.w, s.h);

        // 石頭紋理
        ctx.fillStyle = s.done ? '#8c8a86' : '#9d9a95';
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(s.x + 6 + i * 12, s.y + 4 + (i % 2) * 4, 10, 4);
        }
      }
    }

    function drawBlocks() {
      for (const b of game.blocks) {
        if (b.type === 'tree') drawTree(b.x, b.y, b.w, b.h);
        else if (b.type === 'house' || b.type === 'houseRoof') drawStoneHouse(b);
        else if (b.type === 'fence') drawFence(b.x, b.y, b.w, b.h);
        else if (b.type === 'post') drawPost(b.x, b.y, b.w, b.h);
        else if (b.type === 'totem') drawTotem(b.x, b.y, b.w, b.h);
      }
    }

    function drawStoneHouse(b) {
      if (b.type !== 'house') return;

      const g = getStoneHouseGeometry(b);
      const { x, y, w, h, door } = g;

      // roof
      ctx.fillStyle = '#2f2f2f';
      ctx.beginPath();
      ctx.moveTo(x + 12, y + 54);
      ctx.lineTo(x + 86, y + 18);
      ctx.lineTo(x + w - 10, y + 38);
      ctx.lineTo(x + w + 8, y + 56);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#5d5d5d';
      for (let i = 0; i < 16; i++) {
        ctx.fillRect(x + 8 + i * 18, y + 39 + (i % 2), 24, 4);
        ctx.fillRect(x + 2 + i * 18, y + 48 + ((i + 1) % 2), 24, 4);
      }

      // wall base
      ctx.fillStyle = '#32363a';
      ctx.fillRect(x + 12, y + 56, w - 16, h - 20);

      // irregular slate stones instead of repeated emblem-like pattern
      const stoneRows = [
        [26, 42, 34, 48, 30, 38],
        [36, 30, 46, 28, 40, 32],
        [28, 44, 34, 48, 26, 38],
        [42, 32, 40, 30, 44, 28]
      ];

      for (let r = 0; r < 8; r++) {
        const sy = y + 66 + r * 16;
        let sx = x + 18 + (r % 2 ? 10 : 0);
        const row = stoneRows[r % stoneRows.length];

        for (const sw of row) {
          if (sx + sw > x + w - 24) break;

          ctx.fillStyle = ((r + sw) % 2 === 0) ? '#6a6d72' : '#5b5f64';
          ctx.fillRect(sx, sy, sw, 10);

          // 石塊下方一點陰影
          ctx.fillStyle = 'rgba(0,0,0,0.12)';
          ctx.fillRect(sx, sy + 8, sw, 2);

          sx += sw + 6;
        }
      }

      // lintel above door
      ctx.fillStyle = '#6a4327';
      ctx.fillRect(x + 30, y + 78, w - 66, 16);
      ctx.fillStyle = '#b98a57';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(x + 44 + i * 34, y + 84, 10, 4);
      }

      // door
      ctx.fillStyle = '#4a2a18';
      ctx.fillRect(door.x, door.y, door.w, door.h);
      ctx.strokeStyle = '#875a38';
      ctx.lineWidth = 2;
      ctx.strokeRect(door.x + 5, door.y + 5, door.w - 10, door.h - 10);

      ctx.beginPath();
      ctx.arc(door.x + 25, door.y + 39, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 119, y + 155);
      ctx.lineTo(x + 119, y + 176);
      ctx.moveTo(x + 119, y + 164);
      ctx.lineTo(x + 108, y + 173);
      ctx.moveTo(x + 119, y + 164);
      ctx.lineTo(x + 130, y + 173);
      ctx.stroke();

      // standing slab on right
      ctx.fillStyle = '#454545';
      ctx.beginPath();
      ctx.moveTo(x + w - 24, y + h);
      ctx.lineTo(x + w + 10, y + 118);
      ctx.lineTo(x + w + 24, y + h - 4);
      ctx.closePath();
      ctx.fill();
    }

      const spriteX = npc.x - 36;

      ctx.textAlign = 'center';

      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#355b2e');
      g.addColorStop(1, '#1c2a18');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(35,24,12,0.82)';
      ctx.fillRect(250, 110, 780, 520);
      ctx.strokeStyle = '#e6c98a';
      ctx.lineWidth = 4;
      ctx.strokeRect(250, 110, 780, 520);

      ctx.fillStyle = '#ffd27d';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('魯凱族山田燒墾', canvas.width / 2, 180);

      ctx.fillStyle = '#fff7de';
      ctx.font = '24px sans-serif';
      ctx.fillText('選擇角色', canvas.width / 2, 235);

      const leftX = 430, rightX = 780, y = 310;
      ctx.fillStyle = game.selectedGender === 'male' ? '#f3d28d' : '#8a7553';
      ctx.fillRect(leftX - 60, y - 60, 180, 220);
      ctx.fillStyle = game.selectedGender === 'female' ? '#f3d28d' : '#8a7553';
      ctx.fillRect(rightX - 60, y - 60, 180, 220);
      ctx.strokeStyle = '#3a2816';
      ctx.strokeRect(leftX - 60, y - 60, 180, 220);
      ctx.strokeRect(rightX - 60, y - 60, 180, 220);

      // preview characters
      const oldPlayer = game.player;
      game.player = { x: leftX+25, y: y + 110, dir: 'down' };
      const oldGender = game.selectedGender;
      game.selectedGender = 'male';
      drawPlayer();
      game.player = { x: rightX+25, y: y + 110, dir: 'down' };
      game.selectedGender = 'female';
      drawPlayer();
      game.player = oldPlayer;
      game.selectedGender = oldGender;

      ctx.fillStyle = '#fff7de';
      ctx.font = '22px sans-serif';
      ctx.fillText('男生', leftX+30, 500);
      ctx.fillText('女生', rightX+30, 500);

      ctx.font = '20px sans-serif';
      ctx.fillText(`名字：${game.playerName}`, canvas.width / 2, 545);
      ctx.font = '18px sans-serif';
      ctx.fillText('左右鍵或 A / D 選擇角色，按 Enter 輸入名字並開始', canvas.width / 2, 590);
    }

    init();
    loop();
  </script>
</body>
</html>
