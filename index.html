        ctx.fillStyle = '#ff8f2c';
        ctx.beginPath(); ctx.moveTo(fx, 395); ctx.lineTo(fx + 6, 395 - up); ctx.lineTo(fx + 12, 395); ctx.fill();
        ctx.fillStyle = '#ffd463';
        ctx.beginPath(); ctx.moveTo(fx + 2, 395); ctx.lineTo(fx + 6, 395 - up * 0.6); ctx.lineTo(fx + 10, 395); ctx.fill();
      }

      // right rear room opening
      ctx.fillStyle = '#1a1715';
      ctx.fillRect(940, 250, 180, 170);
      ctx.fillStyle = '#3a3129';
      ctx.fillRect(960, 275, 140, 110);
      ctx.fillStyle = '#bca07a';
      ctx.fillRect(1000, 292, 60, 20);
      ctx.fillRect(985, 330, 90, 12);

      // right wall shelves and jars
      ctx.fillStyle = '#433228';
      ctx.fillRect(835, 245, 230, 8);
      ctx.fillRect(820, 320, 250, 8);
      for (let i = 0; i < 7; i++) drawPot(850 + i * 30, 224 + (i % 2) * 5, 15);
      for (let i = 0; i < 6; i++) drawPot(838 + i * 36, 296 + (i % 2) * 7, 19);

      // right front big jar
      drawPot(920, 515, 22);

      // warm hanging lights glow
      drawGlow(710, 110, 120, 'rgba(255,190,80,0.28)');
      drawGlow(640, 155, 80, 'rgba(255,180,70,0.18)');
    }

    function drawPot(x, y, r) {
      ctx.fillStyle = '#4a3027';
      ctx.beginPath();
      ctx.ellipse(x, y + r * 1.1, r * 0.95, r * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - r * 0.35, y - 2, r * 0.7, 8);
      ctx.fillStyle = '#7a5142';
      ctx.fillRect(x - r * 0.2, y + 2, r * 0.4, 4);
    }

    function drawPotOutdoor(x, y, r) {
      ctx.fillStyle = '#6a4a38';
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.9, r * 0.9, r, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - r * 0.25, y - 2, r * 0.5, 6);
    }

    function drawWoodPile(x, y) {
      ctx.fillStyle = '#6b4524';
      for (let i = 0; i < 7; i++) {
        ctx.fillRect(x + i * 10, y + (i % 2) * 4, 26, 5);
      }
      ctx.fillStyle = '#8b5a2d';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(x + 8 + i * 12, y + 12 + (i % 2) * 4, 24, 5);
      }
    }

    function drawGlow(x, y, r, color) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, color);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStartScreen() {
      ctx.fillStyle = '#1f2b1c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#355b2e');
      g.addColorStop(1, '#1c2a18');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(35,24,12,0.82)';
      ctx.fillRect(250, 110, 780, 520);
      ctx.strokeStyle = '#e6c98a';
      ctx.lineWidth = 4;
      ctx.strokeRect(250, 110, 780, 520);

      ctx.fillStyle = '#ffd27d';
      ctx.font = 'bold 40px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('魯凱族山田燒墾', canvas.width / 2, 180);

      ctx.fillStyle = '#fff7de';
      ctx.font = '24px sans-serif';
      ctx.fillText('選擇角色', canvas.width / 2, 235);

      const leftX = 430, rightX = 780, y = 310;
      ctx.fillStyle = game.selectedGender === 'male' ? '#f3d28d' : '#8a7553';
      ctx.fillRect(leftX - 60, y - 60, 180, 220);
      ctx.fillStyle = game.selectedGender === 'female' ? '#f3d28d' : '#8a7553';
      ctx.fillRect(rightX - 60, y - 60, 180, 220);
      ctx.strokeStyle = '#3a2816';
      ctx.strokeRect(leftX - 60, y - 60, 180, 220);
      ctx.strokeRect(rightX - 60, y - 60, 180, 220);

      // preview characters
      const oldPlayer = game.player;
      game.player = { x: leftX+25, y: y + 110, dir: 'down' };
      const oldGender = game.selectedGender;
      game.selectedGender = 'male';
      drawPlayer();
      game.player = { x: rightX+25, y: y + 110, dir: 'down' };
      game.selectedGender = 'female';
      drawPlayer();
      game.player = oldPlayer;
      game.selectedGender = oldGender;

      ctx.fillStyle = '#fff7de';
      ctx.font = '22px sans-serif';
      ctx.fillText('男生', leftX+30, 500);
      ctx.fillText('女生', rightX+30, 500);

      ctx.font = '20px sans-serif';
      ctx.fillText(`名字：${game.playerName}`, canvas.width / 2, 545);
      ctx.font = '18px sans-serif';
      ctx.fillText('左右鍵或 A / D 選擇角色，按 Enter 輸入名字並開始', canvas.width / 2, 590);
    }

    init();
    loop();
  </script>
</body>
</html>
