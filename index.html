<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魯凱族山田燒墾小遊戲</title>
    <style>
      :root {
        --ui-bg: rgba(35, 24, 12, 0.9);
        --ui-border: #e6c98a;
        --ui-text: #fff7de;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: linear-gradient(#90c95b, #6ca242);
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
        overflow: hidden;
      }
      #wrap {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: min(96vw, 1280px);
        height: auto;
        max-height: 92vh;
        border: 6px solid #3a2816;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        background: #7fb253;
      }
      .panel {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: min(96vw, 1280px);
        pointer-events: none;
      }
      #topbar {
        top: 16px;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        color: var(--ui-text);
        font-weight: 700;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
      }

      .badge {
        background: var(--ui-bg);
        border: 3px solid var(--ui-border);
        border-radius: 16px;
        padding: 14px 20px;
        font-size: 22px;
        line-height: 1.5;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }
      #dialogue {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%) translateY(8px);
        width: min(96vw, 1280px);

        background: rgba(35, 24, 12, 0.92);
        border: 3px solid var(--ui-border);
        border-radius: 16px;
        color: var(--ui-text);

        padding: 16px 18px;
        min-height: 112px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
        overflow: visible;
        pointer-events: none;

        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease,
          min-height 0.18s ease,
          padding 0.18s ease;
      }

      #dialogue.active {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      #dialogue .dialogue-main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 8px;
        min-height: 0;
      }

      #dialogue .title {
        color: #ffd27d;
        font-weight: 800;
        letter-spacing: 1px;
        font-size: 14px;
        line-height: 1.2;
      }

      #dialogue .text {
        font-size: 18px;
        line-height: 1.55;
      }

      #dialogue .hint {
        font-size: 13px;
        opacity: 0.82;
        color: #ffebb9;
      }

      #dialoguePortrait {
        position: absolute;
        right: 18px;
        top: -42px;
        width: 180px;
        height: 180px;
        display: none;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.35));
      }

      /* 正式對話時放大 */
      #dialogue.talking {
        background: linear-gradient(
          rgba(42, 28, 16, 0.96),
          rgba(28, 18, 10, 0.96)
        );
        border-width: 4px;
        border-radius: 24px;
        padding: 24px 220px 22px 26px;
        min-height: 210px;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.36);
      }

      #dialogue.talking .dialogue-main {
        gap: 10px;
        min-height: 150px;
      }

      #dialogue.talking .title {
        font-weight: 900;
        font-size: 22px;
      }

      #dialogue.talking .text {
        font-size: 28px;
        line-height: 1.65;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
      }

      #dialogue.talking .hint {
        font-size: 15px;
        opacity: 0.88;
      }

      #dialogue.talking.show-portrait #dialoguePortrait {
        display: block;
      }
      #dialogue.show-portrait #dialoguePortrait {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="1280" height="768"></canvas>

      <div class="panel" id="topbar">
        <div class="badge" id="mission">任務：前往田地，與長老對話</div>
        <div class="badge" id="status">
          場景：戶外｜祈福：未完成｜整理：0 / 0
        </div>
      </div>

      <div class="panel" id="dialogue">
        <canvas id="dialoguePortrait" width="180" height="180"></canvas>

        <div class="dialogue-main">
          <div class="title" id="dialogueTitle">魯凱族山田燒墾</div>
          <div class="text" id="dialogueText">
            使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。
          </div>
          <div class="hint">操作：移動 / 空白鍵互動 / R 重新開始</div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const dialogueEl = document.getElementById("dialogue");
      const dialogueTitle = document.getElementById("dialogueTitle");
      const dialogueText = document.getElementById("dialogueText");
      const portraitCanvas = document.getElementById("dialoguePortrait");
      const portraitCtx = portraitCanvas.getContext("2d");
      const missionEl = document.getElementById("mission");
      const statusEl = document.getElementById("status");
      const topbarEl = document.getElementById("topbar");

      const backgroundMusic = new Audio("background_music.mp3");
      const maleSong = new Audio("A.mp3");
      const femaleSong = new Audio("B.mp3");

      backgroundMusic.loop = true;
      maleSong.loop = true;
      femaleSong.loop = true;

      backgroundMusic.volume = 0.5;
      maleSong.volume = 0.7;
      femaleSong.volume = 0.7;

      const TILE = 32;
      const LEFT_EXPAND_TILES = 5;
      const WORLD_MIN_X = -LEFT_EXPAND_TILES * TILE;
      const WORLD = { w: 56, h: 30 };
      const keys = {};
      let canPressInteract = true;

      document.addEventListener("keydown", (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;

        if (
          [
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            " ",
            "Escape",
          ].includes(e.key)
        ) {
          e.preventDefault();
        }

        if (k === "Escape") {
          if (game.started || game.inMainMenu) {
            toggleSettingsMenu();
            updateUI();
          }
          return;
        }

        if (game.settingsOpen) {
          if (k === "ArrowUp" || k === "w") {
            game.selectedSettingRow = Math.max(0, game.selectedSettingRow - 1);
          } else if (k === "ArrowDown" || k === "s") {
            game.selectedSettingRow = Math.min(1, game.selectedSettingRow + 1);
          } else if (k === "ArrowLeft" || k === "a") {
            adjustSettingValue(-5);
          } else if (k === "ArrowRight" || k === "d") {
            adjustSettingValue(5);
          }
          return;
        }

        keys[k] = true;
        if (k === "r") init();

        if (game.seedMenuOpen) {
          if (k === "1") {
            plantCropByIndex(0);
            return;
          }
          if (k === "2") {
            plantCropByIndex(1);
            return;
          }
          if (k === "3") {
            plantCropByIndex(2);
            return;
          }
          if (k === "4") {
            plantCropByIndex(3);
            return;
          }
        }

        if (!game.started) {
          if (game.inMainMenu) {
            if (k === "arrowup" || k === "w") {
              game.mainMenuSelection = (game.mainMenuSelection - 1 + 5) % 5;
            }
            if (k === "arrowdown" || k === "s") {
              game.mainMenuSelection = (game.mainMenuSelection + 1) % 5;
            }
            if (k === "Enter" || k === " ") {
              if (game.mainMenuSelection === 0) {
                game.inMainMenu = false; // 進入創建角色
              } else if (game.mainMenuSelection === 3) {
                toggleSettingsMenu();
              } else if (game.mainMenuSelection === 4) {
                // 退出的視覺效果或alert
                alert(
                  "已退出遊戲（網頁版無法直接關閉視窗，您可以手動關閉分頁）。",
                );
              } else {
                alert("此功能尚未開放。");
              }
            }
            return;
          }

          if (game.introPlaying) {
            if (k === "Enter" || k === " ") {
              finishIntroSequence(true);
            }
            return;
          }

          if (k === "a" || k === "arrowleft") game.selectedGender = "male";
          if (k === "d" || k === "arrowright") game.selectedGender = "female";
          if (k === "Enter") {
            const n = prompt("請輸入角色名字：", game.playerName || "");
            if (n && n.trim()) game.playerName = n.trim();
            if (!game.playerName || !game.playerName.trim()) {
              game.playerName = "無名之人";
            }
            startIntroSequence();
          }
          return;
        }
      });
      document.addEventListener("keyup", (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        keys[k] = false;
        if (e.key === " ") canPressInteract = true;
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!game.started && game.inMainMenu) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const x = (e.clientX - rect.left) * scaleX;
          const y = (e.clientY - rect.top) * scaleY;

          const menus = 5; // 5個菜單按鈕
          const btnW = 280;
          const btnH = 48;
          const startY = 320;
          const gap = 60;

          let hovered = false;
          for (let i = 0; i < menus; i++) {
            const btnX = canvas.width / 2 - btnW / 2;
            const btnY = startY + i * gap;
            if (
              x >= btnX &&
              x <= btnX + btnW &&
              y >= btnY &&
              y <= btnY + btnH
            ) {
              game.mainMenuSelection = i;
              hovered = true;
              break;
            }
          }
          canvas.style.cursor = hovered ? "pointer" : "default";
        } else {
          canvas.style.cursor = "default";
        }
      });

      canvas.addEventListener("click", (e) => {
        if (!game.started && game.inMainMenu) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          const x = (e.clientX - rect.left) * scaleX;
          const y = (e.clientY - rect.top) * scaleY;

          const menus = 5;
          const btnW = 280;
          const btnH = 48;
          const startY = 320;
          const gap = 60;

          for (let i = 0; i < menus; i++) {
            const btnX = canvas.width / 2 - btnW / 2;
            const btnY = startY + i * gap;
            if (
              x >= btnX &&
              x <= btnX + btnW &&
              y >= btnY &&
              y <= btnY + btnH
            ) {
              game.mainMenuSelection = i;
              if (i === 0) {
                game.inMainMenu = false; // 進入創建角色
                canvas.style.cursor = "default";
              } else if (i === 3) {
                toggleSettingsMenu();
              } else if (i === 4) {
                alert(
                  "已退出遊戲（網頁版無法直接關閉視窗，您可以手動關閉分頁）。",
                );
              } else {
                alert("此功能尚未開放。");
              }
              return;
            }
          }
        }
      });

      const game = {
        inMainMenu: true,
        mainMenuSelection: 0,
        player: null,
        elder: null,
        blocks: [],
        weeds: [],
        stackZone: null,
        blessingDone: false,
        blessingStep: 0,
        carrying: false,
        allCleared: false,
        burningTriggered: false,
        burningProgress: 0,
        ashReady: false,
        inHouse: false,
        landReady: false,
        landPlots: [],
        landPrepared: false,
        cropTypes: ["小米", "玉米", "芋頭", "地瓜"],
        seedMenuOpen: false,
        seedMenuPlot: null,
        settingsOpen: false,
        masterVolume: 70,
        gameSpeed: 100,
        selectedSettingRow: 0,

        stoneStacks: [],
        stoneWallBuilt: false,

        scareDevices: [],
        scareReady: false,

        allSeeded: false,
        birds: [],
        birdTimer: 0,
        scareCount: 0,
        birdPhaseDone: false,

        growthStarted: false,
        growthProgress: 0,
        growthStage: 0, // 0剛播、1發芽、2長高、3成熟
        allMature: false,

        harvestCount: 0,
        harvestTarget: 0,
        carryingHarvest: false,
        carryingHarvestCrop: null,
        allHarvested: false,

        storageZone: null,
        storedBundles: 0,
        granaryStoredCrops: { 小米: 0, 玉米: 0, 芋頭: 0, 地瓜: 0 },
        allStored: false,

        houseDoorZone: null,
        houseExitZone: null,
        inGranary: false,
        granaryDoorZone: null,
        granaryExitZone: null,
        granaryStoreZone: null,
        interiorNPCs: [],
        currentIndoorSinger: null,
        camera: { x: 0, y: 0 },
        started: false,
        selectedGender: "male",
        playerName: "",
        message: "使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。",
        currentSpeaker: "system",
        currentTitle: "魯凱族山田燒墾",
        isTalking: false,
        introPlaying: false,
        introFrame: 0,
        introTotalFrames: 1800,
        outdoorNPCs: [],
        storySpots: {},
        storyFlags: {
          metRiverGirl: false,
          readOldMap: false,
          metHunter: false,
          sawLeopardSign: false,
        },
        forestPathZone: null,
        inRiverScene: false,
        riverSceneExitZone: null,
        riverNPC: null,
        riverStorySpot: null,
        riverElder: null,
        riverIntroStep: 0,
        openingAtRiver: false,
      };

      function startIntroSequence() {
        game.introPlaying = true;
        game.introFrame = 0;
      }

      function finishIntroSequence(skipped = false) {
        game.introPlaying = false;
        game.introFrame = 0;
        game.started = true;
        playBackgroundMusic();

        game.inRiverScene = true;
        game.openingAtRiver = true;
        game.riverIntroStep = 0;

        game.player.x = 34.2 * TILE;
        game.player.y = 11.0 * TILE;
        game.player.dir = "left";

        game.riverElder.x = 31.8 * TILE;
        game.riverElder.y = 10.8 * TILE;

        setDialogue(
          skipped
            ? `……${game.playerName || "無名之人"}，你終於醒了。這裡是溪邊，別怕。`
            : `……${game.playerName || "無名之人"}，你終於醒了。這裡是溪邊，別怕。`,
          "elder",
        );

        updateUI();
      }

      function playBackgroundMusic() {
        backgroundMusic.play().catch((err) => {
          console.warn("背景音樂播放失敗：", err);
        });
      }

      function resumeBackgroundMusic() {
        if (!game.started) return;

        backgroundMusic.play().catch((err) => {
          console.warn("背景音樂恢復播放失敗：", err);
        });
      }

      function applyAudioSettings() {
        const volume = game.masterVolume / 100;
        backgroundMusic.volume = volume * 0.5; // 背景音樂稍微小聲一點
        maleSong.volume = volume;
        femaleSong.volume = volume;
      }

      function speedFactor() {
        return game.gameSpeed / 100;
      }

      function toggleSettingsMenu() {
        game.settingsOpen = !game.settingsOpen;
        if (game.settingsOpen) {
          keys[" "] = false;
          canPressInteract = false;
        }
      }

      function adjustSettingValue(delta) {
        if (game.selectedSettingRow === 0) {
          game.masterVolume = Math.max(
            0,
            Math.min(100, game.masterVolume + delta),
          );
          applyAudioSettings();
        } else if (game.selectedSettingRow === 1) {
          game.gameSpeed = Math.max(50, Math.min(200, game.gameSpeed + delta));
        }
      }

      const ELDER_SPOTS = {
        prayer: { x: 38.0 * TILE, y: 14.9 * TILE }, // 農田入口外側，略往左下避免堵住開口
        brushGuide: { x: 50.6 * TILE, y: 18.2 * TILE }, // 右下堆置區旁
        burnWatch: { x: 44.0 * TILE, y: 8.8 * TILE }, // 上方防火道旁
        stoneGuide: { x: 53.6 * TILE, y: 13.8 * TILE }, // 石牆右側
        sowGuide: { x: 38.6 * TILE, y: 15.6 * TILE }, // 左下田邊
        birdGuide: { x: 38.4 * TILE, y: 15.2 * TILE }, // 入口旁，方便看驅鳥
        rest: { x: 34.8 * TILE, y: 14.6 * TILE }, // 田外小路
        storageGuide: { x: 14.8 * TILE, y: 16.8 * TILE }, // 石板屋旁穀倉附近
      };

      function moveElderTo(stage) {
        const pos = ELDER_SPOTS[stage];
        if (!pos) return;
        game.elder.x = pos.x;
        game.elder.y = pos.y;
      }

      function init() {
        game.player = {
          x: 7.2 * TILE,
          y: 19.2 * TILE,
          w: 20,
          h: 26,
          baseSpeed: 2.4,
          dir: "down",
        };
        game.elder = {
          kind: "elder",
          speaker: "elder",
          x: ELDER_SPOTS.prayer.x,
          y: ELDER_SPOTS.prayer.y,
          w: 20,
          h: 26,
        };
        game.blocks = [];
        game.weeds = [];
        game.stackZone = {
          x: 47 * TILE,
          y: 19 * TILE,
          w: TILE * 3,
          h: TILE * 2,
        };
        game.houseDoorZone = {
          x: 6.5 * TILE,
          y: 14 * TILE,
          w: 1.8 * TILE,
          h: 3 * TILE,
        };
        game.houseExitZone = {
          x: 14.2 * TILE,
          y: 14.3 * TILE,
          w: 1.6 * TILE,
          h: 1.2 * TILE,
        };
        game.storageZone = {
          x: 21.8 * TILE,
          y: 18.0 * TILE,
          w: 3.4 * TILE,
          h: 3.0 * TILE,
        };
        game.forestPathZone = {
          x: -5.35 * TILE,
          y: 17.0 * TILE,
          w: 2.35 * TILE,
          h: 2.9 * TILE,
          label: "前往河邊",
        };
        game.inRiverScene = false;
        game.riverSceneExitZone = {
          x: 1174,
          y: 240,
          w: 42,
          h: 42,
          label: "返回部落",
          promptBox: { x: 1174, y: 240, w: 42, h: 42 },
        };
        game.riverNPC = {
          id: "riverGirl",
          name: "河邊少女",
          speaker: "riverGirl",
          x: 770,
          y: 322,
          w: 20,
          h: 26,
          clothes: "#406ea8",
          skin: "#d0b98c",
          dialog: [
            "你第一次來到溪邊時，像是在找什麼。",
            "水會帶走聲音，卻不會帶走真正屬於你的名字。",
          ],
        };
        game.riverElder = {
          id: "riverElder",
          kind: "elder",
          name: "長老",
          speaker: "elder",
          x: 31.8 * TILE,
          y: 10.8 * TILE,
          w: 20,
          h: 26,
          clothes: "#1a1a1a",
          skin: "#d0b98c",
        };
        const riverLayout = getRiverSceneLayout();
        const bridge = riverLayout.bridge;
        game.riverStorySpot = {
          x: bridge.x,
          y: bridge.y - 4,
          w: bridge.w,
          h: bridge.h + 8,
          rotation: bridge.rotation || 0,
          label: "橋下溪岸",
          promptBox: {
            x: bridge.x,
            y: bridge.y + bridge.h * 0.5 - 18,
            w: bridge.w,
            h: 36,
            rotation: bridge.rotation || 0,
          },
        };
        const g = getGranaryGeometry();

        // 為了符合放大後的糧倉圖片，我們把互動區域與碰撞框對應放大與往下移
        game.granaryDoorZone = {
          x: g.door.x + 20,
          y: g.door.y - 4,
          w: g.door.w + 40,
          h: g.door.h + 40,
        };

        const granaryInside = getGranaryInteriorLayout();
        game.granaryExitZone = granaryInside.exit;
        game.granaryStoreZone = {
          x: granaryInside.dryingMat.x - 18,
          y: granaryInside.dryingMat.y - 14,
          w: granaryInside.dryingMat.w + 36,
          h: granaryInside.dryingMat.h + 28,
        };
        game.inGranary = false;
        game.interiorNPCs = [
          {
            id: "indoorMale",
            name: "屋內男族人",
            gender: "male",
            x: 16.8 * TILE,
            y: 9.6 * TILE,
            w: 20,
            h: 26,
            songText: "嗯——啊——山谷的風，會把歌帶到田裡。",
            songFreqs: [196, 246.94, 293.66],
          },
          {
            id: "indoorFemale",
            name: "屋內女族人",
            gender: "female",
            x: 22.8 * TILE,
            y: 9.4 * TILE,
            w: 20,
            h: 26,
            songText: "啦——啊——小米成熟時，歌聲也會回來。",
            songFreqs: [261.63, 329.63, 392.0],
          },
        ];

        game.currentIndoorAudio = null;
        stopIndoorSong();
        game.blessingDone = false;
        game.blessingStep = 0;
        game.carrying = false;
        game.allCleared = false;
        game.burningTriggered = false;
        game.burningProgress = 0;
        game.ashReady = false;
        game.inHouse = false;
        game.landReady = false;
        game.landPlots = [];
        game.landPrepared = false;
        game.seedMenuOpen = false;
        game.seedMenuPlot = null;
        game.stoneStacks = [];
        game.stoneWallBuilt = false;

        game.scareDevices = [];
        game.scareReady = false;
        game.allSeeded = false;
        game.birds = [];
        game.birdTimer = 0;
        game.scareCount = 0;
        game.birdPhaseDone = false;
        game.growthStarted = false;
        game.growthProgress = 0;
        game.growthStage = 0;
        game.allMature = false;

        game.harvestCount = 0;
        game.harvestTarget = 0;
        game.carryingHarvest = false;
        game.carryingHarvestCrop = null;
        game.allHarvested = false;

        game.storedBundles = 0;

      function pointInEllipse(px, py, ellipse, padding = 0) {
        const cos = Math.cos(-(ellipse.rot || 0));
        const sin = Math.sin(-(ellipse.rot || 0));
        const dx = px - ellipse.x;
        const dy = py - ellipse.y;
        const rx = Math.max(1, (ellipse.rx || 1) + padding);
        const ry = Math.max(1, (ellipse.ry || 1) + padding);
        const lx = dx * cos - dy * sin;
        const ly = dx * sin + dy * cos;
        return (lx * lx) / (rx * rx) + (ly * ly) / (ry * ry) <= 1;
      }

      function pointInRiverEllipse(px, py, ellipse) {
        const cos = Math.cos(-(ellipse.rot || 0));
        const sin = Math.sin(-(ellipse.rot || 0));
        const dx = px - ellipse.x;
        const dy = py - ellipse.y;
        const lx = dx * cos - dy * sin;
        const ly = dx * sin + dy * cos;

        const upperPad = ellipse.upperPad ?? 6;
        const lowerPad = ellipse.lowerPad ?? 6;
        const sidePad = ellipse.sidePad ?? 7;
        const verticalPad = ly < 0 ? upperPad : lowerPad;
        const rx = Math.max(1, (ellipse.rx || 1) + sidePad);
        const ry = Math.max(1, (ellipse.ry || 1) + verticalPad);

        return (lx * lx) / (rx * rx) + (ly * ly) / (ry * ry) <= 1;
      }

      function pointInRect(px, py, rect, padding = 0) {
        return (
          px >= rect.x - padding &&
          px <= rect.x + rect.w + padding &&
          py >= rect.y - padding &&
          py <= rect.y + rect.h + padding
        );
      }

      function pointInRotatedRect(
        px,
        py,
        rect,
        paddingX = 0,
        paddingY = paddingX,
      ) {
        const rot = rect.rotation || 0;
        const cx = rect.x + rect.w / 2;
        const cy = rect.y + rect.h / 2;
        const dx = px - cx;
        const dy = py - cy;
        const cos = Math.cos(-rot);
        const sin = Math.sin(-rot);
        const lx = dx * cos - dy * sin;
        const ly = dx * sin + dy * cos;

        return (
          Math.abs(lx) <= rect.w / 2 + paddingX &&
          Math.abs(ly) <= rect.h / 2 + paddingY
        );
      }

      function pointToSegmentDistance(px, py, ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) {
          return {
            distance: Math.hypot(px - ax, py - ay),
            t: 0,
          };
        }

        const rawT = ((px - ax) * dx + (py - ay) * dy) / lenSq;
        const t = Math.max(0, Math.min(1, rawT));
        const cx = ax + dx * t;
        const cy = ay + dy * t;

        return {
          distance: Math.hypot(px - cx, py - cy),
          t,
        };
      }

      function catmullRomPoint(p0, p1, p2, p3, t) {
        const t2 = t * t;
        const t3 = t2 * t;
        return {
          x:
            0.5 *
            (2 * p1.x +
              (-p0.x + p2.x) * t +
              (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
              (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3),
          y:
            0.5 *
            (2 * p1.y +
              (-p0.y + p2.y) * t +
              (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
              (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3),
          w:
            0.5 *
            (2 * p1.w +
              (-p0.w + p2.w) * t +
              (2 * p0.w - 5 * p1.w + 4 * p2.w - p3.w) * t2 +
              (-p0.w + 3 * p1.w - 3 * p2.w + p3.w) * t3),
        };
      }

      function getRiverCurveSamples(layout, samplesPerSegment = 14) {
        const nodes = layout.riverNodes || [];
        if (nodes.length <= 1) return nodes.slice();

        const points = [];
        for (let i = 0; i < nodes.length - 1; i++) {
          const p0 = nodes[Math.max(0, i - 1)];
          const p1 = nodes[i];
          const p2 = nodes[i + 1];
          const p3 = nodes[Math.min(nodes.length - 1, i + 2)];
          const startStep = i === 0 ? 0 : 1;

          for (let step = startStep; step <= samplesPerSegment; step++) {
            const t = step / samplesPerSegment;
            points.push(catmullRomPoint(p0, p1, p2, p3, t));
          }
        }

        return points;
      }

      function pointInRiverChannel(px, py, layout, padding = 0) {
        if (
          layout.sourcePool &&
          pointInEllipse(px, py, layout.sourcePool, padding)
        ) {
          return true;
        }

        const samples = getRiverCurveSamples(layout, 14);
        for (let i = 0; i < samples.length - 1; i++) {
          const a = samples[i];
          const b = samples[i + 1];
          const info = pointToSegmentDistance(px, py, a.x, a.y, b.x, b.y);
          const width = a.w + (b.w - a.w) * info.t;
          if (info.distance <= width * 0.5 + padding) {
            return true;
          }
        }

        return false;
      }

      function pointOnBridgeWalkway(px, py, layout) {
        const bridge = layout.bridge;
        if (!bridge) return false;

        const rot = bridge.rotation || 0;

        // 讓可通行區更貼近實際橋面，避免玩家在橋頭或側邊看起來踩進河水。
        const deck = {
          x: bridge.x + 10,
          y: bridge.y + 4,
          w: bridge.w - 20,
          h: bridge.h - 8,
          rotation: rot,
        };

        const upperCap = {
          x: bridge.x + 16,
          y: bridge.y - 4,
          w: bridge.w - 32,
          h: 18,
          rotation: rot,
        };

        const lowerCap = {
          x: bridge.x + 16,
          y: bridge.y + bridge.h - 14,
          w: bridge.w - 32,
          h: 18,
          rotation: rot,
        };

        return (
          pointInRotatedRect(px, py, deck, 8, 10) ||
          pointInRotatedRect(px, py, upperCap, 5, 4) ||
          pointInRotatedRect(px, py, lowerCap, 5, 4)
        );
      }

      function riverHitsPlayer(box, layout) {
        const samples = [
          { x: box.x + box.w * 0.28, y: box.y + box.h * 0.6 },
          { x: box.x + box.w * 0.5, y: box.y + box.h * 0.6 },
          { x: box.x + box.w * 0.72, y: box.y + box.h * 0.6 },
          { x: box.x + box.w * 0.24, y: box.y + box.h * 0.78 },
          { x: box.x + box.w * 0.5, y: box.y + box.h * 0.78 },
          { x: box.x + box.w * 0.76, y: box.y + box.h * 0.78 },
          { x: box.x + box.w * 0.32, y: box.y + box.h * 0.92 },
          { x: box.x + box.w * 0.5, y: box.y + box.h * 0.92 },
          { x: box.x + box.w * 0.68, y: box.y + box.h * 0.92 },
        ];

        const footCenter = { x: box.x + box.w * 0.5, y: box.y + box.h * 0.9 };
        const bodyCenter = { x: box.x + box.w * 0.5, y: box.y + box.h * 0.72 };
        const footOnBridge = pointOnBridgeWalkway(
          footCenter.x,
          footCenter.y,
          layout,
        );
        const bodyOnBridge = pointOnBridgeWalkway(
          bodyCenter.x,
          bodyCenter.y,
          layout,
        );

        const bridgeContactCount = samples.filter((p) =>
          pointOnBridgeWalkway(p.x, p.y, layout),
        ).length;
        if (
          (footOnBridge && bodyOnBridge && bridgeContactCount >= 4) ||
          bridgeContactCount >= 5
        ) {
          return false;
        }

        return samples.some((p) => {
          if (pointOnBridgeWalkway(p.x, p.y, layout)) return false;
          return pointInRiverChannel(p.x, p.y, layout, 4);
        });
      }

      function rectsOverlap(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function shrinkBlockForCollision(b) {
        if (b.type === "tree")
          return { x: b.x + 2, y: b.y + 10, w: b.w - 4, h: b.h - 10 };
        if (b.type === "house")
          return { x: b.x + 10, y: b.y + 18, w: b.w - 20, h: b.h - 18 };
        if (b.type === "houseRoof") return null;
        return b;
      }

      function getStoneHouseGeometry(b) {
        const x = b.x - 26;
        const y = b.y - 42;
        const w = 10.6 * TILE;
        const h = 5.2 * TILE;

        const body = {
          x: x + 12,
          y: y + 56,
          w: w - 16,
          h: h - 20,
        };

        const door = {
          x: x + 60, // 將門的實體開口往左移並加寬，避免隱形牆擋住
          y: y + 90,
          w: 140,
          h: 108,
        };

        return { x, y, w, h, body, door };
      }

      function getHouseColliders(b) {
        const g = getStoneHouseGeometry(b);
        const body = g.body;

        // 我們將房子的主碰撞框大幅縮減，變成只有房屋靠內側的一道薄牆
        // 這確保了外圍的門口範圍(HouseDoorZone)與整個屋簷下完全不會卡住玩家！
        return [
          {
            x: body.x + 10,
            y: body.y,
            w: body.w - 20,
            h: 80, // 非常薄的一層，只限於房子深處
          },
        ];
      }

      function collides(box) {
        if (game.inHouse || game.inGranary || game.inRiverScene) {
          const roomBounds = game.inHouse
            ? { x: 80, y: 130, w: canvas.width - 160, h: canvas.height - 150 }
            : game.inGranary
              ? getGranaryInteriorLayout().room
              : getRiverSceneLayout().room;

          const hitRoomEdge =
            box.x < roomBounds.x ||
            box.y < roomBounds.y ||
            box.x + box.w > roomBounds.x + roomBounds.w ||
            box.y + box.h > roomBounds.y + roomBounds.h;

          if (hitRoomEdge) return true;

          if (game.inHouse) {
            for (const npc of game.interiorNPCs) {
              const hitbox = getNPCCollider(npc);
              if (rectsOverlap(box, hitbox)) return true;
            }
          }

          if (game.inGranary) {
            const layout = getGranaryInteriorLayout();
            for (const c of layout.colliders) {
              if (rectsOverlap(box, c)) return true;
            }
          }

          if (game.inRiverScene) {
            const layout = getRiverSceneLayout();
            for (const c of [
              layout.leftRock,
              layout.rightRock,
              ...(layout.sourceForestColliders || []),
            ]) {
              if (rectsOverlap(box, c)) return true;
            }
            if (riverHitsPlayer(box, layout)) return true;
            if (game.riverNPC && !game.openingAtRiver) {
              const hitbox = getNPCCollider(game.riverNPC);
              if (rectsOverlap(box, hitbox)) return true;
            }
            if (game.riverElder && game.openingAtRiver) {
              const hitbox = getNPCCollider(game.riverElder);
              if (rectsOverlap(box, hitbox)) return true;
            }
          }

          return false;
        }

        if (box.x < WORLD_MIN_X) return true;

        // 室外 NPC 防撞
        const elderHitbox = getNPCCollider(game.elder);
        if (rectsOverlap(box, elderHitbox)) return true;

        const granaryGeo = getGranaryGeometry();

        for (const c of granaryGeo.colliders) {
          if (rectsOverlap(box, c)) {
            return true;
          }
        }

        for (const b of game.blocks) {
          if (b.type === "house") {
            const colliders = getHouseColliders(b);
            for (const c of colliders) {
              if (rectsOverlap(box, c)) return true;
            }
            continue;
          }

          const hitbox = shrinkBlockForCollision(b);
          if (hitbox && rectsOverlap(box, hitbox)) return true;
        }

        return false;
      }

      function updateCamera() {
        if (game.inHouse || game.inGranary) return;

        const worldW = WORLD.w * TILE;
        const worldH = WORLD.h * TILE;
        const playerCenterX = game.player.x + game.player.w / 2;
        const playerCenterY = game.player.y + game.player.h / 2;

        const tx = playerCenterX - canvas.width / 2;
        const ty = playerCenterY - canvas.height / 2;

        game.camera.x = clamp(
          tx,
          WORLD_MIN_X,
          Math.max(0, worldW - canvas.width),
        );
        game.camera.y = clamp(ty, 0, Math.max(0, worldH - canvas.height));
      }

      function movePlayer() {
        const p = game.player;
        let dx = 0,
          dy = 0;

        if (keys["ArrowLeft"] || keys["a"]) {
          dx -= 1;
          p.dir = "left";
        }
        if (keys["ArrowRight"] || keys["d"]) {
          dx += 1;
          p.dir = "right";
        }
        if (keys["ArrowUp"] || keys["w"]) {
          dy -= 1;
          p.dir = "up";
        }
        if (keys["ArrowDown"] || keys["s"]) {
          dy += 1;
          p.dir = "down";
        }

        if (dx !== 0 || dy !== 0) {
          const len = Math.hypot(dx, dy);
          let currentSpeed = p.baseSpeed * speedFactor();

          // 河邊空地場景比較大且沒有攝影機跟隨，適度提高走路速度
          if (game.inRiverScene) {
            currentSpeed *= 1.4;
          }

          dx = (dx / len) * currentSpeed;
          dy = (dy / len) * currentSpeed;
        }

        let slopeDy = 0;
        if (!game.inHouse && !game.inGranary && !game.inRiverScene) {
          const influence = getSlopeInfluence(p.x + p.w / 2, p.y + p.h / 2);
          if (influence > 0 && Math.abs(dx) > 0.01) {
            slopeDy = -dx * 0.12 * influence;
          }
        }

        const nextX = { x: p.x + dx, y: p.y, w: p.w, h: p.h };
        if (!collides(nextX)) p.x += dx;

        const nextY = { x: p.x, y: p.y + dy + slopeDy, w: p.w, h: p.h };
        if (!collides(nextY)) p.y += dy + slopeDy;
      }

      function getNPCCollider(npc) {
        return {
          x: npc.x + 1,
          y: npc.y + 2,
          w: npc.w - 2,
          h: npc.h - 2,
        };
      }

      function isNear(a, b, d = 36) {
        const ax = a.x + a.w / 2;
        const ay = a.y + a.h / 2;
        const bx = b.x + b.w / 2;
        const by = b.y + b.h / 2;
        return Math.hypot(ax - bx, ay - by) <= d;
      }

      function getNearbyHarvestPlot() {
        if (game.inHouse || game.inGranary) return null;
        if (!game.allMature || game.carryingHarvest) return null;

        return (

            (p) => p.mature && !p.harvested && isNear(game.player, p, 44),
          ) || null

      function drawDialoguePortrait(speaker) {
        portraitCtx.clearRect(
          0,
          0,
          portraitCanvas.width,
          portraitCanvas.height,
        );
        if (!speaker) return;

        const ctx = portraitCtx;
        let img = null;

        // 根據 speaker 決定使用哪張圖片
        if (speaker === "elder") {
          img = IMAGES.elder;
        } else if (
          speaker === "craftWoman" ||
          speaker === "riverGirl" ||
          speaker === "indoorFemale"
        ) {
          img = IMAGES.craftWoman;
        } else if (speaker === "child") {
          img = IMAGES.child;
        } else if (speaker === "oldMap") {
          img = IMAGES.oldMap;
        } else {
          // indoorMale, mapKeeper, hunter, 或未知的預設
          img = IMAGES.npc_villager;
        }

        if (img && img.complete) {
          // 加上背景光暈
          ctx.fillStyle = "rgba(255, 222, 150, 0.12)";
          ctx.beginPath();
          ctx.arc(90, 90, 75, 0, Math.PI * 2);
          ctx.fill();

          // 等比例縮放並置中圖片 (也可選擇只裁切頭部，但這裡先顯示全身/完整素材)
          const sW = img.naturalWidth || 128;
          const sH = img.naturalHeight || 128;
          const targetSize = 140; // 邊框內部大小
          let scale = Math.min(targetSize / sW, targetSize / sH);
          let dW = sW * scale;
          let dH = sH * scale;
          let dX = (portraitCanvas.width - dW) / 2;
          let dY = (portraitCanvas.height - dH) / 2 + 10; // 稍微下移對準

          // 由於有些圖片可能是全身，在對話框可能縮很小，若想裁切臉部(假設上半部):
          // 若要顯示頭部局部，可視圖片狀況調整 sx, sy, sw, sh
          // 這裡目前直接將完整立繪畫入對話框內
          ctx.drawImage(img, 0, 0, sW, sH, dX, dY, dW, dH);
        }

        // 畫一個有質感的原住民風格外框
        ctx.strokeStyle = "#e6c98a";
        ctx.lineWidth = 3;
        ctx.strokeRect(18, 18, 144, 144);

        ctx.strokeStyle = "#8a3d5b";
        ctx.lineWidth = 1;
        ctx.strokeRect(22, 22, 136, 136);
      }

        let target = null;
        if (type === "male") target = maleSong;

      function handleInteract() {
        const pressed = keys[" "];
        if (!pressed || !canPressInteract) return;
        canPressInteract = false;
        const player = game.player;

        if (game.inRiverScene) {
          const riverElder = getNearbyRiverElder();
          if (riverElder) {
            talkToRiverElder();
            return;
          }

          if (game.openingAtRiver) return;

          const riverNpc = getNearbyRiverNPC();
          if (riverNpc) {
            talkToRiverNPC(riverNpc);
            return;
          }

          const riverSpot = getNearbyRiverSpot();
          if (riverSpot) {
            inspectRiverSceneSpot(riverSpot);
            return;
          }

          if (
            game.riverSceneExitZone &&
            isNear(player, game.riverSceneExitZone, 62)
          ) {
            leaveRiverScene();
            return;
          }

          return;
        } else if (!game.inHouse && !game.inGranary) {
          if (game.forestPathZone && isNear(player, game.forestPathZone, 54)) {
            enterRiverScene();
            return;
          }

          const outdoorNpc = getNearbyOutdoorNPC();
          if (outdoorNpc) {
            talkToOutdoorNPC(outdoorNpc);
            return;
          }

          const storySpot = getNearbyStorySpot();
          if (storySpot) {
            inspectStorySpot(storySpot);
            return;
          }
        }

        if (
          game.inGranary &&
          game.carryingHarvest &&
          isNear(player, game.granaryStoreZone, 62)
        ) {
          storeCurrentHarvestInGranary();
          return;
        }

        if (!game.inHouse && isNear(player, game.houseDoorZone, 76)) {
          game.inHouse = true;
          game.player.x = 14.8 * TILE;
          game.player.y = 14.2 * TILE;
          game.player.dir = "up";
          setMessage(
            "你走進石板屋。屋內擺著陶壺、木雕與日常器物。靠近門口再按空白鍵可離開。",
          );
          updateUI();
          return;
        }

        if (
          !game.inHouse &&
          !game.inGranary &&
          isNear(player, game.granaryDoorZone, 58)
        ) {
          game.inGranary = true;
          game.player.x = 19.2 * TILE;
          game.player.y = 16.8 * TILE;
          game.player.dir = "up";
          setMessage(
            "你走進布農族糧倉。左側堆放小米束，後方吊掛玉米，右側籃中放著芋頭與地瓜，中間留有搬運通道。",
          );
          updateUI();
          return;
        }

        if (game.inGranary && isNear(player, game.granaryExitZone, 46)) {
          game.inGranary = false;

          game.player.x = game.granaryDoorZone.x + game.granaryDoorZone.w - 40;
          game.player.y =
            game.granaryDoorZone.y +
            game.granaryDoorZone.h -
            game.player.h +
            120;
          game.player.dir = "right";

          updateCamera();
          setMessage("你走出布農族糧倉，站在糧倉出入口旁。");
          updateUI();
          return;
        }

        if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
          game.inHouse = false;
          game.player.x = 7.2 * TILE;
          game.player.y = 19.2 * TILE;
          game.player.dir = "down";
          updateCamera();
          setMessage("你走出石板屋，回到部落前方空地。");
          updateUI();
          return;
        }

        if (game.inHouse) {
          const indoorNpc = game.interiorNPCs.find((npc) =>
            isNear(player, npc, 50),
          );
          if (indoorNpc) {
            if (indoorNpc.id === "indoorMale") {
              setDialogue(indoorNpc.songText, "indoorMale");
              playIndoorSong("male");
            } else {
              setDialogue(indoorNpc.songText, "indoorFemale");
              playIndoorSong("female");
            }
            return;
          }
        }

        if (!game.blessingDone && isNear(player, game.elder, 56)) {
          game.blessingStep++;
          if (game.blessingStep === 1)
            setDialogue(
              "這塊田地還不能動手。先向祖靈祈福，再開始整理吧。",
              "elder",
            );
          else if (game.blessingStep === 2)
            setDialogue(
              "你與長老低聲祈禱，向土地、山林與祖靈表達敬意。",
              "elder",
            );
          else {
            game.blessingDone = true;
            moveElderTo("brushGuide");
            setDialogue(
              "祈福完成。現在可以整理這塊田地，把雜草和小樹集中堆到右下角。",
              "elder",
            );
          }
          updateUI();
          return;
        }

        if (
          !game.inHouse &&
          game.blessingDone &&
          isNear(player, game.elder, 56)
        ) {
          if (!game.allCleared) {
            setDialogue("先把田地整理好，把草木集中到右下角。", "elder");
          } else if (
            !game.burningTriggered &&
            !game.ashReady &&
            !game.landReady
          ) {
            setDialogue("草木都堆好了，去堆置區準備點火。", "elder");
          } else if (!game.landReady) {
            setDialogue("先等火勢退去，不要急著走進田裡。", "elder");
          } else if (!game.stoneWallBuilt) {
            setDialogue("沿著田邊把石頭堆穩，先把擋土牆做好。", "elder");
          } else if (!game.allSeeded) {
            setDialogue("石牆穩了，接下來可以選擇作物播種進土地裡。", "elder");
          } else if (!game.scareReady) {
            setDialogue("先把田邊的驅鳥器具架好。", "elder");
          } else if (!game.birdPhaseDone) {
            setDialogue("聽到鳥靠近，就去拉繩子把牠們驚走。", "elder");
          } else if (!game.allMature) {
            setDialogue("田裡的作物還在長，先讓它慢慢成熟。", "elder");
          } else if (!game.allHarvested) {
            setDialogue("作物已經熟了，去田裡採收吧。", "elder");
          } else if (!game.allStored) {
            setDialogue(
              "把採下來的作物背回穀倉，曬過、收好，才算真正完成。",
              "elder",
            );
          } else {
            setDialogue(
              "今年的作物已經採收入倉，可以準備迎接收穫之後的分享與祭儀了。",
              "elder",
            );
          }
          updateUI();
          return;
        }

        if (!game.inHouse && game.blessingDone && !game.carrying) {
          const weed = game.weeds.find(
            (w) =>
              !w.cleared &&
              isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34),
          );
          if (weed) {
            weed.cleared = true;
            game.carrying = true;

            if (weed.kind === "wildflower") {
              setMessage(
                "你在草叢裡發現一小束野花。你小心把它放到一旁，再把雜草帶去堆置區。",
              );
            } else if (weed.kind === "stone") {
              setMessage(
                "草叢下露出一塊特別的石片，像是舊田地留下的痕跡。你記住了這個地方，再把草木搬去堆置區。",
              );
            } else if (weed.kind === "nest") {
              setMessage(
                "你差點碰到一個小鳥巢，趕緊避開，把旁邊的雜草整理好後帶去堆置區。",
              );
            } else {
              setMessage("你砍下並整理了一份雜草／矮樹。把它帶到堆置區。");
            }

            updateUI();
            return;
          }
        }

        if (
          !game.inHouse &&
          game.carrying &&
          isNear(player, game.stackZone, 58)
        ) {
          game.carrying = false;

          const depositedNow = game.weeds.filter((w) => w.cleared).length;
          const totalNow = game.weeds.length;

          if (depositedNow === Math.ceil(totalNow / 3)) {
            setMessage("你把第一批草木堆好，田地開始露出原本的輪廓。");
          } else if (depositedNow === Math.ceil((totalNow * 2) / 3)) {
            setMessage("整理進度過半，田地看起來清爽多了。");
          } else {
            setMessage("你把整理好的草木堆放在指定地點。");
          }

          if (game.weeds.every((w) => w.cleared)) {
            game.allCleared = true;
            moveElderTo("burnWatch");
            setDialogue(
              "草木都集中好了。我先去上面看防火道，你到堆置區準備點火。",
              "elder",
            );
          }

          updateUI();
          return;
        }

        if (
          !game.inHouse &&
          game.allCleared &&
          !game.carrying &&
          isNear(player, game.stackZone, 58) &&
          !game.burningTriggered &&
          !game.ashReady
        ) {
          game.burningTriggered = true;
          setMessage(
            "你點燃堆置的草木，火勢受控地燃起。長老正在上方看著火路。",
          );
          updateUI();
        }

        if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
          const stack = game.stoneStacks.find(
            (s) => !s.done && isNear(player, s, 44),
          );
          if (stack) {
            stack.done = true;

            const done = game.stoneStacks.filter((s) => s.done).length;
            const total = game.stoneStacks.length;

            if (done < total) {
              setMessage(
                `你把清理出的石頭沿田邊堆疊，作為簡易石牆來保持水土。石牆進度：${done} / ${total}`,
              );
            } else {
              game.stoneWallBuilt = true;
              game.landPrepared = true;
              game.landPlots.forEach((p) => (p.prepared = true));
              moveElderTo("sowGuide");
              setDialogue(
                "清理出來的石頭已經沿田邊堆好，能幫助保持水土。現在可以開始播種。",
                "elder",
              );
            }

            updateUI();
            return;
          }
        }

        if (
          !game.inHouse &&
          !game.inGranary &&
          game.landPrepared &&
          !game.allSeeded &&
          !game.seedMenuOpen
        ) {
          const plot = game.landPlots.find(
            (p) => p.prepared && !p.seeded && isNear(player, p, 44),
          );
          if (plot) {
            game.seedMenuOpen = true;
            game.seedMenuPlot = plot;
            game.isTalking = false;
            game.message = "請用 1～4 選擇要種植的作物。";
            refreshDialogueUI();
            updateUI();
            return;
          }
        }

        if (!game.inHouse && game.allSeeded && !game.scareReady) {
          const device = game.scareDevices.find(
            (d) => !d.placed && isNear(player, d, 42),
          );
          if (device) {
            device.placed = true;

            const done = game.scareDevices.filter((d) => d.placed).length;
            const total = game.scareDevices.length;

            if (done < total) {
              setMessage(
                `你架好了其中一組驅鳥器具。設置進度：${done} / ${total}`,
              );
            } else {
              game.scareReady = true;
              moveElderTo("rest");
              setDialogue(
                "驅鳥器具都好了。我在外頭看著，你聽到鳥靠近就去拉繩。",
                "elder",
              );
            }

            updateUI();
            return;
          }
        }

        if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
          const rope = game.scareDevices.find(
            (d) =>
              d.placed &&
              isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42),
          );

          if (rope) {
            const activeBirds = game.birds.filter((b) => !b.scared);

            if (activeBirds.length === 0) {
              setMessage("你拉了繩子，鋁罐發出聲響，但現在還沒有鳥靠近農田。");
              updateUI();
              return;
            }

            for (const bird of activeBirds) {
              bird.scared = true;
            }

            game.scareCount++;

            if (game.scareCount < 5) {
              setMessage(
                `你拉動繩子，鋁罐發出聲響，鳥群被驚走了！驅鳥進度：${game.scareCount} / 5`,
              );
            } else {
              game.birdPhaseDone = true;
              game.birds = [];
              moveElderTo("rest");
              setDialogue("做得好，你把田地顧住了。今天先到這裡。", "elder");
            }

            updateUI();
            return;
          }
        }

        if (!game.inHouse && game.allMature && !game.carryingHarvest) {
          const plot = getNearbyHarvestPlot();

          if (plot) {
            plot.harvested = true;
            plot.mature = false;
            game.carryingHarvest = true;
            game.carryingHarvestCrop = plot.cropType;
            game.harvestCount++;

            if (game.harvestCount < game.harvestTarget) {
              setMessage(
                `你採收了一份成熟的${plot.cropType}。先背回糧倉，再回來繼續採收。`,
              );
            } else {
              game.allHarvested = true;
              setMessage(
                `最後一份${plot.cropType}也採收完成了。把這一批背進糧倉吧。`,
              );
            }

            updateUI();
            return;
          }
        }
      }

      function updateCropGrowth() {
        if (!game.birdPhaseDone || game.allMature) return;

        if (!game.growthStarted) {
          game.growthStarted = true;
          game.growthProgress = 0;
          game.growthStage = 0;
          moveElderTo("rest");
          setDialogue(
            "鳥群退去後，就等作物慢慢長成。這段時間要常來看田。",
            "elder",
          );
          updateUI();
          return;
        }

        game.growthProgress = Math.min(
          1,
          game.growthProgress + 0.0007 * speedFactor(),
        );

        let stage = 0;
        if (game.growthProgress >= 0.25) stage = 1;
        if (game.growthProgress >= 0.55) stage = 2;
        if (game.growthProgress >= 0.9) stage = 3;

        if (stage !== game.growthStage) {
          game.growthStage = stage;
          game.landPlots.forEach((p) => {
            if (p.seeded && !p.harvested) p.growth = stage;
          });

          if (stage === 1) {
            setMessage("田裡冒出了幼苗。");
          } else if (stage === 2) {
            setMessage("作物慢慢長高了，田地開始變得茂密。");
          } else if (stage === 3) {
            game.allMature = true;
            game.landPlots.forEach((p) => {
              if (p.seeded && !p.harvested) p.mature = true;
            });
            game.harvestTarget = game.landPlots.filter((p) => p.mature).length;
            moveElderTo("storageGuide");
            setDialogue(
              "田裡的作物已經成熟，可以開始採收。採下來後背回穀倉。",
              "elder",
            );
          }

          updateUI();
        }
      }

      function updateBurning() {
        if (!game.burningTriggered) return;

        game.burningProgress = Math.min(
          1,
          game.burningProgress + 0.0015 * speedFactor(),
        );

        if (game.burningProgress >= 1 && !game.landReady) {
          game.burningTriggered = false; // 火熄掉
          game.ashReady = true; // 改成灰燼狀態
          game.landReady = true;
          setupLandPlots();
          moveElderTo("stoneGuide");
          setDialogue(
            "火勢退去後，地上留下灰燼。把清理出的石頭沿田邊堆穩，做好保持水土的石牆。",
            "elder",
          );
          updateUI();
        }
      }

      function spawnBird() {
        const seededPlots = game.landPlots.filter((p) => p.seeded);
        if (seededPlots.length === 0) return;

        const plot =
          seededPlots[Math.floor(Math.random() * seededPlots.length)];

        game.birds.push({
          x: plot.x + plot.w / 2 - 6,
          y: plot.y - 20,
          w: 12,
          h: 8,
          target: plot,
          scared: false,
          vy: 0.25,
        });
      }

      function setupScareDevices() {
        game.scareDevices = [
          {
            x: 40.5 * TILE,
            y: 9.5 * TILE,
            w: 18,
            h: 36,
            placed: false,
            ropeX: 42.2 * TILE,
            ropeY: 11.3 * TILE,
          },
          {
            x: 50.8 * TILE,
            y: 9.7 * TILE,
            w: 18,
            h: 36,
            placed: false,
            ropeX: 48.8 * TILE,
            ropeY: 11.5 * TILE,
          },

          {
            x: 40.8 * TILE,
            y: 17.2 * TILE,
            w: 18,
            h: 36,
            placed: false,
            ropeX: 42.5 * TILE,
            ropeY: 18.8 * TILE,
          },
          {
            x: 49.8 * TILE,
            y: 17.0 * TILE,
            w: 18,
            h: 36,
            placed: false,
            ropeX: 47.8 * TILE,
            ropeY: 18.7 * TILE,
          },
        ];
      }

      function updateBirds() {
        if (!game.allSeeded || !game.scareReady || game.birdPhaseDone) return;

        game.birdTimer += speedFactor();
        if (game.birdTimer >= 600 && game.birds.length < 3) {
          spawnBird();
          game.birdTimer = 0;
        }

        for (const bird of game.birds) {
          if (bird.scared) {
            bird.y -= 2.2 * speedFactor();
            bird.x += 1.2 * speedFactor();
            continue;
          }

          const targetY = bird.target.y + 10;
          if (bird.y < targetY) {
            bird.y += bird.vy * speedFactor();
          }
        }

        game.birds = game.birds.filter(
          (b) => b.y > -40 && b.x < WORLD.w * TILE + 40,
        );
      }

      function drawBirds() {
        for (const b of game.birds) {
          if (b.scared) continue;

          ctx.fillStyle = "#2b2b2b";
          ctx.fillRect(b.x, b.y, 12, 8);

          ctx.fillRect(b.x - 4, b.y + 2, 5, 2);
          ctx.fillRect(b.x + 11, b.y + 2, 5, 2);

          ctx.fillStyle = "#4a4a4a";
          ctx.fillRect(b.x + 2, b.y - 2, 4, 2);
        }
      }

      function drawScareDevices() {
        for (const d of game.scareDevices) {
          // 竹竿
          if (d.placed) {
            ctx.fillStyle = "#7a5b2b";
            ctx.fillRect(d.x, d.y, 4, 36);
          } else {
            ctx.fillStyle = "rgba(255, 236, 170, 0.65)";
            ctx.fillRect(d.x - 4, d.y + 28, 12, 6);
          }

          if (d.placed) {
            // 鋁罐
            ctx.fillStyle = "#c8c8c8";
            ctx.fillRect(d.x + 4, d.y + 6, 10, 8);
            ctx.fillRect(d.x + 6, d.y + 16, 10, 8);
            ctx.fillRect(d.x + 4, d.y + 26, 10, 8);

            // 繩子
            ctx.strokeStyle = "#d8c28a";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(d.x + 2, d.y + 8);
            ctx.lineTo(d.ropeX, d.ropeY);
            ctx.stroke();

            // 拉繩點
            ctx.fillStyle = "#f2e2a8";
            ctx.fillRect(d.ropeX - 5, d.ropeY - 5, 10, 10);
          }
        }
      }

      function drawTaskGlow(
        box,
        color = "rgba(255, 245, 200, 0.18)",
        pad = 10,
      ) {
        const x = box.x - pad;
        const y = box.y - pad;
        const w = box.w + pad * 2;
        const h = box.h + pad * 2;
        const cx = x + w / 2;
        const cy = y + h / 2;
        const r = Math.max(w, h) * 0.75;

        ctx.save();

        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, color);
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

        ctx.strokeStyle = "rgba(255, 245, 215, 0.45)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x, y, w, h);

        ctx.restore();
      }

      function drawPendingTaskGlows() {
        if (game.inHouse) return;

        // 祈福：長老
        if (!game.blessingDone) {
          drawTaskGlow(game.elder, "rgba(255, 245, 200, 0.18)", 12);
          return;
        }

        // 整理草木
        if (!game.allCleared) {
          if (game.carrying) {
            drawTaskGlow(game.stackZone, "rgba(255, 230, 180, 0.20)", 12);
          } else {
            for (const w of game.weeds) {
              if (!w.cleared) {
                drawTaskGlow(
                  { x: w.x, y: w.y, w: w.w, h: w.h },
                  "rgba(230, 255, 210, 0.14)",
                  8,
                );
              }
            }
          }
          return;
        }

        // 點火
        if (!game.burningTriggered && !game.ashReady && !game.landReady) {
          drawTaskGlow(game.stackZone, "rgba(255, 210, 150, 0.22)", 14);
          return;
        }

        // 等待火勢退去
        if (!game.landReady) {
          drawTaskGlow(game.stackZone, "rgba(255, 185, 120, 0.16)", 16);
          return;
        }

        // 堆石牆：全部未完成石堆一起亮
        if (!game.stoneWallBuilt) {
          for (const s of game.stoneStacks) {
            if (!s.done) {
              drawTaskGlow(s, "rgba(220, 235, 255, 0.16)", 8);
            }
          }
          return;
        }

        // 播種：全部未播種區塊一起亮
        if (!game.allSeeded) {
          for (const p of game.landPlots) {
            if (p.prepared && !p.seeded) {
              drawTaskGlow(p, "rgba(255, 245, 175, 0.16)", 8);
            }
          }
          return;
        }

        // 架設驅鳥器具：全部未放置器具一起亮
        if (!game.scareReady) {
          for (const d of game.scareDevices) {
            if (!d.placed) {
              drawTaskGlow(d, "rgba(235, 245, 255, 0.18)", 10);
            }
          }
          return;
        }

        // 驅鳥：全部拉繩點一起亮
        if (!game.birdPhaseDone) {
          for (const d of game.scareDevices) {
            if (d.placed) {
              drawTaskGlow(
                { x: d.ropeX - 6, y: d.ropeY - 6, w: 12, h: 12 },
                "rgba(255, 250, 210, 0.18)",
                8,
              );
            }
          }
        }

        if (!game.allMature) {
          for (const p of game.landPlots) {
            if (p.seeded && !p.harvested) {
              drawTaskGlow(p, "rgba(210, 255, 190, 0.12)", 8);
            }
          }
          return;
        }
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawInteractOutline(box, radius = 6) {
        const pad = 12;
        const x = box.x - pad;
        const y = box.y - pad;
        const w = box.w + pad * 2;
        const h = box.h + pad * 2;

        ctx.save();

        ctx.strokeStyle = "rgba(255,255,255,0.24)";
        ctx.lineWidth = 8;
        roundRect(ctx, x, y, w, h, radius);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,245,210,0.95)";
        ctx.lineWidth = 2;
        roundRect(ctx, x, y, w, h, radius);
        ctx.stroke();

        ctx.restore();
      }

      function drawPromptBubble(text, x, y, options = {}) {
        ctx.save();

        const fitBox = options.fitBox || null;
        let fontSize = options.fontSize || 12;
        const padX = options.padX ?? (fitBox ? 5 : 8);
        const padY = options.padY ?? (fitBox ? 3 : 5);
        const maxWidth = fitBox
          ? Math.max(
              46,
              Math.floor(
                options.maxWidth || fitBox.w + (options.extraWidth ?? 8),
              ),
            )
          : null;

        const setFont = () => {
          ctx.font = `${fontSize}px sans-serif`;
        };

        setFont();
        let textWidth = Math.ceil(ctx.measureText(text).width);
        while (maxWidth && fontSize > 9 && textWidth + padX * 2 > maxWidth) {
          fontSize -= 1;
          setFont();
          textWidth = Math.ceil(ctx.measureText(text).width);
        }

        const w = maxWidth
          ? Math.min(maxWidth, textWidth + padX * 2)
          : textWidth + padX * 2;
        const h = fitBox
          ? Math.max(
              16,
              Math.min(
                20,
                Math.floor(options.height || Math.max(16, fitBox.h * 0.24)),
              ),
            )
          : 20;
        const bubbleX = fitBox ? fitBox.x + (fitBox.w - w) / 2 : x;
        const bubbleY = fitBox ? (options.y ?? fitBox.y - h - 8) : y;

        ctx.textAlign = fitBox ? "center" : "left";
        ctx.textBaseline = "middle";

        ctx.fillStyle = "rgba(45,30,18,0.9)";
        roundRect(ctx, bubbleX, bubbleY, w, h, Math.min(8, h / 2));
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 1;
        roundRect(ctx, bubbleX, bubbleY, w, h, Math.min(8, h / 2));
        ctx.stroke();

        ctx.fillStyle = "#fff4c4";
        if (fitBox) {
          ctx.fillText(text, bubbleX + w / 2, bubbleY + h / 2 + 0.5);
        } else {
          ctx.fillText(text, bubbleX + padX, bubbleY + h / 2 + 0.5);
        }

        ctx.restore();
      }

        ];

        const rootBins = [
          {
            x: room.x + room.w - 300,

          {
            x: room.x + room.w - 170,

      function drawHangingCorn(x, y, count = 5) {
        for (let i = 0; i < count; i++) {
          const cx = x + i * 28;
          ctx.strokeStyle = "#d8c28a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(cx + 8, y);
          ctx.lineTo(cx + 8, y + 16);
          ctx.stroke();

          ctx.fillStyle = "#d1ac42";
          ctx.fillRect(cx + 2, y + 16, 12, 26);
          ctx.fillStyle = "#6f9d45";
          ctx.beginPath();
          ctx.moveTo(cx + 2, y + 18);
          ctx.lineTo(cx - 4, y + 28);
          ctx.lineTo(cx + 2, y + 30);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(cx + 14, y + 20);
          ctx.lineTo(cx + 20, y + 30);
          ctx.lineTo(cx + 14, y + 32);
          ctx.closePath();
          ctx.fill();
        }
      }

      function drawMilletBundles(x, y, bundles = 6, height = 76) {
        for (let i = 0; i < bundles; i++) {
          const bx = x + i * 16;
          const lift = (i % 2) * 6;
          ctx.fillStyle = "#d3af4a";
          ctx.fillRect(bx, y - height + lift, 10, height - lift);
          ctx.fillStyle = "#8e6230";
          ctx.fillRect(bx - 1, y - 16 + lift, 12, 4);
        }
      }

      function drawRootBasket(bin, itemCount = 0) {
        ctx.fillStyle = "#8b6338";
        ctx.fillRect(bin.x, bin.y, bin.w, bin.h);
        ctx.strokeStyle = "#caa36f";
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(bin.x + 8, bin.y + 10 + i * 12);
          ctx.lineTo(bin.x + bin.w - 8, bin.y + 10 + i * 12);
          ctx.stroke();
        }
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(bin.x + 14 + i * 24, bin.y + 8);
          ctx.lineTo(bin.x + 14 + i * 24, bin.y + bin.h - 8);
          ctx.stroke();
        }

        const maxVisible = 8;
        const visibleCount = Math.min(itemCount, maxVisible);

        for (let i = 0; i < visibleCount; i++) {
          const rx = bin.x + 12 + (i % 4) * 24;
          const ry = bin.y + 18 + Math.floor(i / 4) * 28;
          if (bin.crop === "芋頭") {
            ctx.fillStyle = "#6a4e2f";
            ctx.beginPath();
            ctx.ellipse(rx + 10, ry + 10, 10, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#5d8f41";
            ctx.beginPath();
            ctx.moveTo(rx + 10, ry + 2);
            ctx.lineTo(rx + 3, ry - 4);
            ctx.lineTo(rx + 10, ry - 1);
            ctx.lineTo(rx + 17, ry - 4);
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.fillStyle = "#a75c34";
            ctx.beginPath();
            ctx.ellipse(rx + 10, ry + 10, 11, 7, -0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#7ea34a";
            ctx.fillRect(rx + 8, ry + 2, 3, 4);
          }
        }
      }

      function drawGranaryInteriorScene() {
        const layout = getGranaryInteriorLayout();
        const room = layout.room;
        const milletCount = game.granaryStoredCrops["小米"];
        const cornCount = game.granaryStoredCrops["玉米"];
        const taroCount = game.granaryStoredCrops["芋頭"];
        const sweetPotatoCount = game.granaryStoredCrops["地瓜"];
        const totalStored = game.storedBundles;

        // 外層背景
        ctx.fillStyle = "#322416";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 牆體
        ctx.fillStyle = "#4b3622";
        ctx.fillRect(room.x, room.y, room.w, room.h);

        // 地板木台（布農族糧倉高架空間感）
        ctx.fillStyle = "#7a5934";
        ctx.fillRect(room.x, room.y + 300, room.w, 130);
        ctx.fillStyle = "#6a4c2b";
        for (let i = 0; i < 11; i++) {
          ctx.fillRect(room.x + 24 + i * 72, room.y + 312, 54, 92);
        }

        // 後牆橫木
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        for (let i = 0; i < 7; i++) {
          ctx.fillRect(room.x + 24, room.y + 34 + i * 34, room.w - 48, 3);
        }

        // 左側：小米束底座（初始存在，但不預先堆滿）
        ctx.fillStyle = "#5b4024";
        ctx.fillRect(
          layout.milletStacks[0].x - 10,
          layout.milletStacks[0].y + 62,
          128,
          16,
        );
        ctx.fillRect(
          layout.milletStacks[1].x - 8,
          layout.milletStacks[1].y + 50,
          104,
          14,
        );

        if (milletCount > 0) {
          const firstStack = Math.min(milletCount, 6);
          const secondStack = Math.min(Math.max(milletCount - 6, 0), 5);

          drawMilletBundles(
            layout.milletStacks[0].x,
            layout.milletStacks[0].y + 58,
            firstStack,
            82,
          );

          if (secondStack > 0) {
            drawMilletBundles(
              layout.milletStacks[1].x,
              layout.milletStacks[1].y + 48,
              secondStack,
              68,
            );
          }
        }

        // 後方：木架（空架預設存在）
        ctx.fillStyle = "#5b4024";
        ctx.fillRect(
          layout.rearRack.x,
          layout.rearRack.y + 92,
          layout.rearRack.w,
          14,
        );
        ctx.fillRect(
          layout.rearRack.x,
          layout.rearRack.y + 36,
          layout.rearRack.w,
          10,
        );
        ctx.fillRect(layout.rearRack.x + 4, layout.rearRack.y, 12, 106);
        ctx.fillRect(
          layout.rearRack.x + layout.rearRack.w - 16,
          layout.rearRack.y,
          12,
          106,
        );
        ctx.fillRect(layout.rearRack.x + 108, layout.rearRack.y, 10, 106);
        ctx.fillRect(layout.rearRack.x + 218, layout.rearRack.y, 10, 106);

        // 有入倉後才逐步出現架上器物
        if (totalStored >= 1) {
          ctx.fillStyle = "#92704b";
          ctx.fillRect(layout.rearRack.x + 24, layout.rearRack.y + 10, 42, 24);
        }
        if (totalStored >= 2) {
          ctx.fillStyle = "#92704b";
          ctx.fillRect(layout.rearRack.x + 138, layout.rearRack.y + 12, 46, 22);
        }
        if (totalStored >= 3) {
          ctx.fillStyle = "#9d6d47";
          ctx.beginPath();
          ctx.arc(
            layout.rearRack.x + 270,
            layout.rearRack.y + 24,
            14,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }
        if (totalStored >= 4) {
          ctx.beginPath();
          ctx.arc(
            layout.rearRack.x + 304,
            layout.rearRack.y + 24,
            12,
            0,
            Math.PI * 2,
          );
          ctx.fill();
        }

        // 玉米吊掛區：先有橫桿，玉米等入倉才出現
        ctx.fillStyle = "#6a4a29";
        ctx.fillRect(
          layout.cornBeam.x,
          layout.cornBeam.y,
          layout.cornBeam.w,
          8,
        );
        if (cornCount > 0) {
          drawHangingCorn(
            layout.cornBeam.x + 10,
            layout.cornBeam.y + 8,
            Math.min(cornCount, 5),
          );
        }

        // 右側：芋頭、地瓜籃區（籃子預設存在，內容物等玩家入倉）
        drawRootBasket(layout.rootBins[0], sweetPotatoCount);
        drawRootBasket(layout.rootBins[1], taroCount);

        // 中央搬運走道
        ctx.fillStyle = "#96734b";
        ctx.fillRect(
          layout.dryingMat.x,
          layout.dryingMat.y,
          layout.dryingMat.w,
          layout.dryingMat.h,
        );
        ctx.strokeStyle = "#c6a57a";
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
          ctx.beginPath();
          ctx.moveTo(layout.dryingMat.x + 8, layout.dryingMat.y + 8 + i * 8);
          ctx.lineTo(
            layout.dryingMat.x + layout.dryingMat.w - 8,
            layout.dryingMat.y + 8 + i * 8,
          );
          ctx.stroke();
        }

        // 門口／出口區
        ctx.fillStyle = "#3f2816";
        ctx.fillRect(
          layout.exit.x,
          layout.exit.y,
          layout.exit.w,
          layout.exit.h,
        );
        ctx.strokeStyle = "#c9b27a";
        ctx.lineWidth = 3;
        ctx.strokeRect(
          layout.exit.x,
          layout.exit.y,
          layout.exit.w,
          layout.exit.h,
        );
        ctx.fillStyle = "rgba(255,245,210,0.10)";
        ctx.fillRect(
          layout.exit.x + 12,
          layout.exit.y + 10,
          layout.exit.w - 24,
          18,
        );
      }

      function drawGranaryExitMarker() {
        const z = game.granaryExitZone;
        ctx.strokeStyle = "rgba(255,245,210,0.9)";

      function updateUI() {
        const total = game.weeds.length;
        const deposited =
          game.weeds.filter((w) => w.cleared).length - (game.carrying ? 1 : 0);

        if (game.inRiverScene && game.openingAtRiver) {
          missionEl.textContent = "任務：在河道旁與長老對話";
        } else if (game.inRiverScene) {
          missionEl.textContent =
            "探索河邊空地，靠近右側樹叢中的小徑後按空白鍵可返回部落";
        } else if (game.inHouse) {
          missionEl.textContent = "探索石板屋，靠近門口按空白鍵可離開";
        } else if (game.inGranary) {
          missionEl.textContent = game.carryingHarvest
            ? `任務：把${game.carryingHarvestCrop}放進糧倉內`
            : "探索糧倉，靠近門口按空白鍵可離開";
        } else if (!game.blessingDone) {
          missionEl.textContent = "任務：到農田與長老對話，完成祈福";
        } else if (!game.allCleared) {
          missionEl.textContent = game.carrying
            ? "任務：把草木搬到右下角堆置區"
            : "任務：繼續整理荒田";
        } else if (
          !game.burningTriggered &&
          !game.ashReady &&
          !game.landReady
        ) {
          missionEl.textContent = "任務：前往堆置區，觸發燃燒";
        } else if (!game.landReady) {
          missionEl.textContent = "任務：等待火勢退去";
        } else if (!game.stoneWallBuilt) {
          missionEl.textContent = "任務：堆疊石頭，完成田邊擋土牆";
        } else if (!game.allSeeded) {
          missionEl.textContent =
            "任務：在農田播種作物（小米、玉米、芋頭、地瓜）";
        } else if (!game.scareReady) {
          missionEl.textContent = "任務：在田邊架設驅鳥器具";
        } else if (!game.birdPhaseDone) {
          missionEl.textContent = `任務：拉動繩索驅鳥（${game.scareCount} / 5）`;
        } else if (!game.allMature) {
          missionEl.textContent = "任務：等待作物長大成熟";
        } else if (!game.allHarvested) {
          missionEl.textContent = `任務：採收成熟作物（${game.harvestCount} / ${game.harvestTarget}）`;
        } else if (!game.allStored) {
          missionEl.textContent = `把收成送到房子旁的穀倉（${game.storedBundles} / ${game.harvestTarget}）`;
        } else {
          missionEl.textContent = "任務完成：你完成了生長、採收與入倉";
        }

        const preparedCount = game.landPlots.filter((p) => p.prepared).length;
        const preparedTotal = game.landPlots.length;
        const seededCount = game.landPlots.filter((p) => p.seeded).length;
        const seededTotal = game.landPlots.length;

        let sceneName = "戶外";
        if (game.inHouse) sceneName = "石板屋內";
        if (game.inGranary) sceneName = "糧倉內";
        if (game.inRiverScene) sceneName = "河邊空地";

        let statusText = `場景：${sceneName}`;

        if (game.inRiverScene) {
          statusText += "｜探索中";
        } else if (game.inHouse) {
          statusText += "｜探索中";
        } else if (!game.blessingDone) {
          statusText += `｜祈福：${Math.min(game.blessingStep, 3)} / 3`;
        } else if (!game.allCleared) {
          statusText += `｜整理：${Math.max(deposited, 0)} / ${total}`;
          if (game.carrying) statusText += "｜搬運中";
        } else if (
          !game.burningTriggered &&
          !game.ashReady &&
          !game.landReady
        ) {
          statusText += "｜前往堆置區點火";
        } else if (!game.landReady) {
          statusText += "｜燃燒中";
        } else if (!game.stoneWallBuilt) {
          statusText += `｜石牆：${game.stoneStacks.filter((s) => s.done).length} / ${game.stoneStacks.length}`;
        } else if (!game.allSeeded) {
          statusText += `｜播種：${seededCount} / ${seededTotal}`;
        } else if (!game.scareReady) {
          statusText += `｜器具：${game.scareDevices.filter((d) => d.placed).length} / ${game.scareDevices.length}`;
        } else if (!game.birdPhaseDone) {
          statusText += `｜驅鳥：${game.scareCount} / 5`;
        } else if (!game.allMature) {
          statusText += `｜生長：${game.growthStage} / 3`;
        } else if (!game.allHarvested) {
          statusText += `｜採收：${game.harvestCount} / ${game.harvestTarget}`;
          if (game.carryingHarvest) statusText += "｜搬運中";
        } else if (!game.allStored) {
          statusText += `｜入倉：${game.storedBundles} / ${game.harvestTarget}`;
          if (game.carryingHarvest) statusText += "｜搬運中";
        } else {
          statusText += "｜全部完成";
        }

        statusEl.textContent = statusText;
        refreshDialogueUI();
      }

      function loop() {
        if (!game.started && game.introPlaying) {
          game.introFrame += 0.25; // 減緩動畫整體播放速度（原為 ++ 即 1，現改為 0.5，速度變為原本的 50%）
          if (game.introFrame > game.introTotalFrames) {
            finishIntroSequence(false);
          }
        }

        if (game.started && !game.settingsOpen) {
          game.frameCount++;
          movePlayer();
          if (game.inHouse && game.currentIndoorAudio) {
            let activeNpc = null;

            if (game.currentSpeaker === "indoorMale") {
              activeNpc = game.interiorNPCs.find((n) => n.id === "indoorMale");
            } else if (game.currentSpeaker === "indoorFemale") {
              activeNpc = game.interiorNPCs.find(
                (n) => n.id === "indoorFemale",
              );
            }

            if (!activeNpc || !isNear(game.player, activeNpc, 72)) {
              setMessage("歌聲慢慢停了下來。");
            }
          }
          handleInteract();
          updateSeedMenuState();
          updateBurning();
          updateBirds();
          updateCropGrowth();
          updateSceneTransitions();
          updateCamera();
        }
        render();
        requestAnimationFrame(loop);
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        topbarEl.style.display = game.started ? "flex" : "none";

        if (!game.started) {
          if (game.inMainMenu) {
            drawMainMenu();
          } else if (game.introPlaying) {
            drawOpeningAnimation();
          } else {
            drawStartScreen();
          }

          if (game.settingsOpen) {
            drawSettingsPanel();
          }
          return;
        }

        if (game.inRiverScene) {
          drawRiverScene();
          if (game.openingAtRiver && game.riverElder) {
            drawNPC(game.riverElder, "#1a1a1a", "#d0b98c");
            drawQuestIcon(game.riverElder, "!");
          } else if (game.riverNPC) {
            drawNPC(game.riverNPC, game.riverNPC.clothes, game.riverNPC.skin);
          }
          drawRiverInteractionHints();
          drawPlayer();
        } else if (game.inHouse) {
          drawInteriorScene();

          for (const npc of game.interiorNPCs) {
            if (npc.gender === "male") {
              drawNPC(npc, "#3f2a1d", "#d0b98c");
            } else {
              drawNPC(npc, "#7b2948", "#d0b98c");
            }
          }

          drawHouseExitMarker();
          drawInteractionHints();
          drawPlayer();
        } else if (game.inGranary) {
          drawGranaryInteriorScene();
          drawGranaryExitMarker();
          if (isNear(game.player, game.granaryExitZone, 46)) {
            drawInteractOutline(game.granaryExitZone);
          }
          drawGranaryStorePrompt();
          drawPlayer();
        } else {
          ctx.save();
          ctx.translate(-game.camera.x, -game.camera.y);

          drawGround();
          drawStoryScenery();
          drawRoad();
          drawHouseArea();
          drawField();
          drawSlopeAccents();
          drawLandPlots();
          drawScareDevices();
          drawBirds();
          drawBlocks();
          drawStoneHouseLayer();
          drawOldMapLayer();
          drawForestEntranceLayer();
          drawGranary();
          drawWeeds();
          drawStackZone();

          drawPendingTaskGlows();

          drawNPC(game.elder, "#1a1a1a", "#d0b98c");
          drawOutdoorStoryNPCs();

          if (!game.blessingDone) {
            drawQuestIcon(game.elder, "!");
          } else if (game.birdPhaseDone) {
            drawQuestIcon(game.elder, "?");
          }

          drawInteractionHints();

          drawDoorPrompt();
          drawGranaryDoorPrompt();
          drawCropHarvestPrompt();
          drawPlayer();
          if (game.carrying) drawCarryIcon();

          ctx.restore();

          if (game.seedMenuOpen) {
            drawSeedMenu();
          }
        }

        drawAtmosphere();

        if (game.settingsOpen) {
          drawSettingsPanel();
        }
      }

      function drawSettingsPanel() {
        const panelW = canvas.width * 0.34;
        const panelH = canvas.height * 0.32;
        const x = (canvas.width - panelW) / 2;
        const y = (canvas.height - panelH) / 2;

        ctx.save();

        ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(35, 24, 12, 0.96)";
        roundRect(ctx, x, y, panelW, panelH, 18);
        ctx.fill();

        ctx.strokeStyle = "#e6c98a";
        ctx.lineWidth = 4;
        roundRect(ctx, x, y, panelW, panelH, 18);
        ctx.stroke();

        ctx.fillStyle = "#fff7de";
        ctx.font = "bold 28px Noto Sans TC, Microsoft JhengHei, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("設定", x + panelW / 2, y + 38);

        const rows = [
