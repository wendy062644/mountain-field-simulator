      function roadY(x, baseY) {
        return baseY - getSlopeOffset(x) * 0.35;
      }

      function getSlopeOffset(worldX) {
        const startX = 10 * TILE;
        const endX = 39 * TILE;
        const t = clamp((worldX - startX) / (endX - startX), 0, 1);
        const smooth = t * t * (3 - 2 * t);
        return smooth * 72;
      }

      function getSlopeLift(worldX) {
        return getSlopeOffset(worldX);
      }

      function isOnSlopeArea(x, y) {
        return (
          x >= 12 * TILE &&
          x <= 38.5 * TILE &&
          y >= 13.2 * TILE &&
          y <= 19.8 * TILE
        );
      }

      function getSlopeInfluence(x, y) {
        if (!isOnSlopeArea(x, y)) return 0;

        const left = 12 * TILE;
        const right = 38.5 * TILE;
        const top = 13.2 * TILE;
        const bottom = 19.8 * TILE;

        const tx = clamp((x - left) / (right - left), 0, 1);
        const tyTop = clamp((y - top) / (2.2 * TILE), 0, 1);
        const tyBottom = clamp((bottom - y) / (2.2 * TILE), 0, 1);

        const edgeFade = Math.min(tx, tyTop, tyBottom, 1);
        return clamp(edgeFade * 1.6, 0, 1);
      }

      function drawGround() {
        for (let y = 0; y < WORLD.h; y++) {
          for (let x = -LEFT_EXPAND_TILES; x < WORLD.w; x++) {
            const px = x * TILE;
            const py = y * TILE;
            const field = x >= 39 && x <= 52 && y >= 8 && y <= 21;
            const slopeLift = getSlopeLift(px + TILE / 2);

            let base = field ? "#c39a58" : "#78b24f";
            if (!field && x >= 26) base = "#72aa48";
            if (!field && x >= 36) base = "#6b9f44";

            ctx.fillStyle = base;
            ctx.fillRect(px, py, TILE, TILE);

            // 往右越高：右側稍亮、左下較深，做出緩坡感
            ctx.fillStyle = `rgba(255,255,210,${0.03 + slopeLift / 1400})`;
            ctx.fillRect(px, py, TILE, TILE * 0.48);
            ctx.fillStyle = `rgba(70,45,20,${0.02 + (44 - slopeLift) / 1800})`;
            ctx.fillRect(px, py + TILE * 0.58, TILE, TILE * 0.42);

            // 等高線感：往右逐漸出現較密的橫向草紋
            if (
              !field &&
              x >= 18 &&
              y > 4 &&
              y < WORLD.h - 2 &&
              (x + y) % 3 === 0
            ) {
              ctx.fillStyle = "rgba(255,245,200,0.06)";
              ctx.fillRect(px + 3, py + 8, TILE - 10, 2);
            }

            ctx.fillStyle = "rgba(255,255,255,0.07)";
            if ((x + y) % 3 === 0) ctx.fillRect(px + 4, py + 4, 3, 3);
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            if ((x * 7 + y * 11) % 4 === 0)
              ctx.fillRect(px + 20, py + 16, 3, 3);
          }
        }

        // 左下低地的陰影感
        const lowland = ctx.createLinearGradient(
          0,
          canvas.height,
          0,
          canvas.height - 220,
        );
        lowland.addColorStop(0, "rgba(60,35,12,0.12)");
        lowland.addColorStop(1, "rgba(60,35,12,0)");
        ctx.fillStyle = lowland;
        ctx.fillRect(0, canvas.height - 230, canvas.width, 230);

        // 右上高地的薄霧亮帶
        const upland = ctx.createLinearGradient(
          canvas.width * 0.55,
          0,
          canvas.width,
          0,
        );
        upland.addColorStop(0, "rgba(255,255,255,0)");
        upland.addColorStop(1, "rgba(255,255,230,0.08)");
        ctx.fillStyle = upland;
        ctx.fillRect(
          canvas.width * 0.5,
          0,
          canvas.width * 0.5,
          canvas.height * 0.7,
        );
      }

      function drawRoad() {
        // 先算出「第三排樹叢缺口」的高度
        // 從這裡開始，後面都固定差不多這個高度，不再往上
        const flatY = roadY(33.5 * TILE, 15.2 * TILE);

        const points = [
          // 房子左邊延伸到最左側邊界的小徑入口
          { x: WORLD_MIN_X + 0.8 * TILE, y: 18.78 * TILE },
          { x: -3.5 * TILE, y: 18.7 * TILE },
          { x: -1.5 * TILE, y: 18.63 * TILE },
          { x: 0.6 * TILE, y: 18.58 * TILE },
          { x: 2.8 * TILE, y: 18.48 * TILE },
          { x: 4.9 * TILE, y: 18.34 * TILE },
          { x: 6.8 * TILE, y: 18.2 * TILE },

          // 石板屋前
          { x: 8.8 * TILE, y: roadY(8.8 * TILE, 18.2 * TILE) },
          { x: 12.0 * TILE, y: roadY(12.0 * TILE, 17.9 * TILE) },
          { x: 15.8 * TILE, y: roadY(15.8 * TILE, 17.1 * TILE) },

          // 第一列樹叢缺口
          { x: 18.5 * TILE, y: roadY(18.5 * TILE, 16.2 * TILE) },

          // 第二列樹叢缺口
          { x: 23.5 * TILE, y: roadY(23.5 * TILE, 16.0 * TILE) },
          { x: 28.5 * TILE, y: roadY(28.5 * TILE, 15.8 * TILE) },

          // 第三列樹叢缺口
          { x: 31.0 * TILE, y: roadY(31.0 * TILE, 15.5 * TILE) },
          { x: 33.5 * TILE, y: flatY },

          // 第四列樹叢缺口：不再往上
          { x: 35.5 * TILE, y: flatY },

          // 到農田前：也不再往上
          { x: 37.5 * TILE, y: flatY },

          // 農田入口：維持同高度附近
          { x: 39.6 * TILE, y: flatY },
        ];

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // 主路
        ctx.strokeStyle = "#bc8746";
        ctx.lineWidth = 60; // 原本再加寬
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }

        ctx.strokeStyle = "rgba(90,55,24,0.16)";
        ctx.lineWidth = 6;

        ctx.moveTo(points[0].x, points[0].y + 7);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y + 7);
        }
        ctx.stroke();

        // 高光
        ctx.strokeStyle = "rgba(255,230,180,0.12)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y - 6);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y - 6);
        }
        ctx.stroke();

        // 石板屋門口小支路也一起加寬
        ctx.strokeStyle = "#bc8746";
        ctx.lineWidth = 24;
        ctx.beginPath();
        ctx.moveTo(8.1 * TILE, 17.2 * TILE);
        ctx.lineTo(9.4 * TILE, 17.9 * TILE);
        ctx.lineTo(10.3 * TILE, 18.0 * TILE);

          const y = (18.8 - i * 2.1) * TILE;

          ctx.moveTo((13 + i * 2.2) * TILE, y);
          ctx.lineTo((23 + i * 4.0) * TILE, y - 0.35 * TILE);

        }

      function drawLandPlots() {
        if (!game.landReady) return;

        for (const plot of game.landPlots) {
          if (!plot.prepared) {
            ctx.fillStyle = "rgba(70, 55, 30, 0.32)";
            ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

            ctx.strokeStyle = "rgba(255, 234, 170, 0.72)";
            ctx.lineWidth = 2;
            ctx.strokeRect(plot.x, plot.y, plot.w, plot.h);

            ctx.strokeStyle = "rgba(90, 70, 40, 0.6)";
            for (let i = 0; i < 4; i++) {
              const yy = plot.y + 8 + i * 12;
              ctx.beginPath();
              ctx.moveTo(plot.x + 6, yy);
              ctx.lineTo(plot.x + plot.w - 6, yy);
              ctx.stroke();
            }
          } else {
            ctx.fillStyle = "rgba(150, 110, 62, 0.28)";
            ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

            ctx.strokeStyle = "rgba(120, 82, 42, 0.7)";
            ctx.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
              const yy = plot.y + 8 + i * 11;
              ctx.beginPath();
              ctx.moveTo(plot.x + 6, yy);
              ctx.lineTo(plot.x + plot.w - 6, yy);
              ctx.stroke();
            }
          }

          if (plot.seeded) {
            ctx.fillStyle = "rgba(120, 80, 40, 0.18)";
            ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

            for (const c of plot.crops) {
              const px = plot.x + c.ox * TILE;
              const py = plot.y + c.oy * TILE;

              if (!plot.harvested && plot.growth === 0) {
                ctx.fillStyle = "#2e1d0f";
                ctx.fillRect(px, py, 3, 3);
              }

              if (!plot.harvested && plot.growth >= 1) {
                if (plot.cropType === "小米") {
                  ctx.strokeStyle = plot.growth >= 3 ? "#9f7d2f" : "#5c9a3b";
                  ctx.lineWidth = plot.growth >= 2 ? 2 : 1.5;
                  ctx.beginPath();
                  ctx.moveTo(px, py + 8);
                  ctx.lineTo(
                    px,
                    py - (plot.growth === 1 ? 6 : plot.growth === 2 ? 12 : 15),
                  );
                  ctx.stroke();
                  if (plot.growth >= 2) {
                    ctx.fillStyle = plot.growth >= 3 ? "#d8b44b" : "#7dbd53";
                    ctx.fillRect(
                      px - 2,
                      py - (plot.growth === 2 ? 13 : 16),
                      5,
                      plot.growth === 2 ? 6 : 8,
                    );
                  }
                }

                if (plot.cropType === "玉米") {
                  ctx.strokeStyle = "#4f8d35";
                  ctx.lineWidth = plot.growth >= 2 ? 2 : 1.5;
                  ctx.beginPath();
                  ctx.moveTo(px, py + 8);
                  ctx.lineTo(
                    px,
                    py - (plot.growth === 1 ? 8 : plot.growth === 2 ? 14 : 16),
                  );
                  ctx.stroke();

                  ctx.fillStyle = "#5f9a40";
                  ctx.beginPath();
                  ctx.moveTo(px, py - 2);
                  ctx.lineTo(px - 6, py + 5);
                  ctx.lineTo(px - 1, py + 5);
                  ctx.closePath();
                  ctx.fill();
                  ctx.beginPath();
                  ctx.moveTo(px, py - 4);
                  ctx.lineTo(px + 6, py + 3);
                  ctx.lineTo(px + 1, py + 4);
                  ctx.closePath();
                  ctx.fill();

                  if (plot.growth >= 2) {
                    ctx.fillStyle = plot.growth >= 3 ? "#d7b54a" : "#c7d35b";
                    ctx.fillRect(
                      px + 2,
                      py - (plot.growth === 2 ? 4 : 7),
                      5,
                      plot.growth === 2 ? 9 : 11,
                    );
                  }
                }

                if (plot.cropType === "芋頭") {
                  ctx.strokeStyle = "#5e9a43";
                  ctx.lineWidth = 2;
                  ctx.beginPath();
                  ctx.moveTo(px, py + 8);
                  ctx.lineTo(
                    px,
                    py - (plot.growth === 1 ? 4 : plot.growth === 2 ? 8 : 10),
                  );
                  ctx.stroke();
                  ctx.fillStyle = plot.growth >= 3 ? "#4c8d3a" : "#67a94f";
                  ctx.beginPath();
                  ctx.moveTo(px, py - 8);
                  ctx.lineTo(px - 7, py);
                  ctx.lineTo(px, py + 1);
                  ctx.lineTo(px + 7, py);
                  ctx.closePath();
                  ctx.fill();
                }

                if (plot.cropType === "地瓜") {
                  ctx.strokeStyle = "#4f8f38";
                  ctx.lineWidth = 2;
                  ctx.beginPath();
                  ctx.moveTo(px, py + 8);
                  ctx.lineTo(px - 5, py + 1);
                  ctx.moveTo(px, py + 8);
                  ctx.lineTo(px + 5, py + 1);
                  ctx.stroke();
                  ctx.fillStyle = plot.growth >= 3 ? "#6cab4a" : "#79c257";
                  ctx.fillRect(px - 4, py - 2, 8, 5);
                  if (plot.growth >= 3) {
                    ctx.fillStyle = "#8d5aa8";
                    ctx.fillRect(px - 2, py + 5, 4, 3);
                  }
                }
              }

              if (plot.harvested) {
                ctx.strokeStyle = "#8a6a3d";
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(px, py + 6);
                ctx.lineTo(px, py + 1);
                ctx.stroke();
              }
            }
          }
        }

        for (const s of game.stoneStacks) {
          ctx.fillStyle = s.done ? "#6c6a67" : "rgba(120, 120, 120, 0.35)";
          ctx.fillRect(s.x, s.y, s.w, s.h);

          ctx.strokeStyle = s.done ? "#3f3d3a" : "rgba(255, 240, 200, 0.55)";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(s.x, s.y, s.w, s.h);

          const horizontal = s.w > s.h;
          ctx.fillStyle = s.done ? "#8c8a86" : "#9d9a95";

          if (horizontal) {
            for (let i = 0; i < 4; i++) {
              ctx.fillRect(
                s.x + 4 + i * (s.w / 4),
                s.y + 2 + (i % 2) * 2,
                12,
                s.h - 4,
              );
            }
          } else {
            for (let i = 0; i < 4; i++) {
              ctx.fillRect(
                s.x + 2 + (i % 2) * 2,
                s.y + 4 + i * (s.h / 4),
                s.w - 4,
                10,
              );
            }
          }
        }
      }

      function drawBlocks() {
        for (const b of game.blocks) {
          if (b.type === "tree") drawTree(b.x, b.y, b.w, b.h);
          else if (b.type === "fence") drawFence(b.x, b.y, b.w, b.h);
          else if (b.type === "post") drawPost(b.x, b.y, b.w, b.h);
          else if (b.type === "totem") drawTotem(b.x, b.y, b.w, b.h);
        }
      }

      function drawStoneHouseLayer() {
        for (const b of game.blocks) {
          if (b.type === "house" || b.type === "houseRoof") {
            drawStoneHouse(b);
          }
        }
      }

      function drawStoneHouse(b) {
        if (b.type !== "house") return;

        const g = getStoneHouseGeometry(b);
        const { x, y, w, h, door } = g;

        if (IMAGES.house) {
          const img = IMAGES.house;
          const sW = img.naturalWidth || 512;
          const sH = img.naturalHeight || 512;
          // Scale house to fit the block roughly. Adjust the width and offset as needed.
          const tgtW = w * 1.3;
          const tgtH = sH * (tgtW / sW);
          ctx.drawImage(
            img,
            0,
            0,
            sW,
            sH,
            x - (tgtW - w) / 2,
            y + h - tgtH,
            tgtW,
            tgtH,
          );
          return;
        }

        // roof
        ctx.fillStyle = "#2f2f2f";
        ctx.beginPath();
        ctx.moveTo(x + 12, y + 54);
        ctx.lineTo(x + 110, y + 14);
        ctx.lineTo(x + w - 14, y + 38);
        ctx.lineTo(x + w + 10, y + 56);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#5d5d5d";
        for (let i = 0; i < 20; i++) {
          ctx.fillRect(x + 8 + i * 18, y + 39 + (i % 2), 24, 4);
          ctx.fillRect(x + 2 + i * 18, y + 48 + ((i + 1) % 2), 24, 4);
        }

        // wall base
        ctx.fillStyle = "#32363a";
        ctx.fillRect(x + 12, y + 56, w - 16, h - 20);

        const stoneRows = [
          [26, 42, 34, 48, 30, 38, 34],
          [36, 30, 46, 28, 40, 32, 30],
          [28, 44, 34, 48, 26, 38, 32],
          [42, 32, 40, 30, 44, 28, 34],
        ];

        for (let r = 0; r < 8; r++) {
          const sy = y + 66 + r * 16;
          let sx = x + 18 + (r % 2 ? 10 : 0);
          const row = stoneRows[r % stoneRows.length];

          for (const sw of row) {
            if (sx + sw > x + w - 24) break;

            ctx.fillStyle = (r + sw) % 2 === 0 ? "#6a6d72" : "#5b5f64";
            ctx.fillRect(sx, sy, sw, 10);

            ctx.fillStyle = "rgba(0,0,0,0.12)";
            ctx.fillRect(sx, sy + 8, sw, 2);

            sx += sw + 6;
          }
        }

        // lintel above door
        ctx.fillStyle = "#6a4327";
        ctx.fillRect(x + 38, y + 78, w - 86, 16);

        ctx.fillStyle = "#b98a57";
        for (let i = 0; i < 8; i++) {

        ctx.fillStyle = "#4a2a18";
        ctx.fillRect(door.x, door.y, door.w, door.h);

        ctx.strokeStyle = "#875a38";
        ctx.lineWidth = 2;
        ctx.strokeRect(door.x + 5, door.y + 5, door.w - 10, door.h - 10);

        ctx.beginPath();
        ctx.arc(door.x + 28, door.y + 39, 10, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(door.x + 28, door.y + 52);
        ctx.lineTo(door.x + 28, door.y + 74);
        ctx.moveTo(door.x + 28, door.y + 60);
        ctx.lineTo(door.x + 16, door.y + 70);
        ctx.moveTo(door.x + 28, door.y + 60);
        ctx.lineTo(door.x + 40, door.y + 70);
        ctx.stroke();

        // standing slab on right
        ctx.fillStyle = "#454545";
        ctx.beginPath();
        ctx.moveTo(x + w - 26, y + h);
        ctx.lineTo(x + w + 12, y + 118);
        ctx.lineTo(x + w + 28, y + h - 4);
        ctx.closePath();
        ctx.fill();

      function drawRiverSceneTree(x, y, scale = 1) {
        const trunkW = 5 * scale;
        const trunkH = 40 * scale;
        const crownW = 34 * scale;
        const crownH = 56 * scale;

        if (IMAGES.tree) {
          ctx.drawImage(
            IMAGES.tree,
            x - crownW * 0.56,
            y - crownH * 1.0,
            44 * scale,
            52 * scale,
          );
          return;
        }

        ctx.save();
        ctx.fillStyle = "#5a3b20";
        ctx.fillRect(x - trunkW / 2, y - trunkH * 0.02, trunkW, trunkH);

        ctx.fillStyle = "#254626";
        ctx.beginPath();
        ctx.ellipse(
          x,
          y - crownH * 0.34,
          crownW * 0.4,
          crownH * 0.54,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        ctx.fillStyle = "#356334";
        ctx.beginPath();
        ctx.ellipse(
          x - crownW * 0.18,
          y - crownH * 0.52,
          crownW * 0.28,
          crownH * 0.28,
          -0.16,
          0,
          Math.PI * 2,
        );
        ctx.ellipse(
          x + crownW * 0.18,
          y - crownH * 0.5,
          crownW * 0.26,
          crownH * 0.26,
          0.14,
          0,
          Math.PI * 2,
        );
        ctx.ellipse(
          x,
          y - crownH * 0.76,
          crownW * 0.22,
          crownH * 0.18,
          0,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.ellipse(
          x - crownW * 0.12,
          y - crownH * 0.68,
          crownW * 0.14,
          crownH * 0.08,
          -0.2,
          0,
          Math.PI * 2,
        );
        ctx.fill();
        ctx.restore();
      }

      function drawStackZone() {
        const z = game.stackZone;

        // clear ground under the stack zone so nothing visually sits beneath it
        ctx.fillStyle = "#b88745";
        ctx.fillRect(z.x - 6, z.y - 4, z.w + 12, z.h + 8);

        // 地面底色
        ctx.fillStyle = "#916231";
        ctx.fillRect(z.x, z.y, z.w, z.h);
        ctx.strokeStyle = "#5a381b";
        ctx.lineWidth = 3;
        ctx.strokeRect(z.x + 1, z.y + 1, z.w - 2, z.h - 2);

        const deposited =
          game.weeds.filter((w) => w.cleared).length - (game.carrying ? 1 : 0);
        const pileHeight = Math.min(5, Math.ceil(Math.max(0, deposited) / 4));

        // 還沒燒完前，顯示草木堆
        if (!game.ashReady) {
          for (let i = 0; i < pileHeight; i++) {
            ctx.fillStyle = i % 2 ? "#7d5228" : "#8a5a2b";
            ctx.fillRect(
              z.x + 10 + i * 2,
              z.y + z.h - 10 - i * 8,
              z.w - 20 - i * 4,
              8,
            );
          }
        }

        // 燃燒中：火從小變大
        if (game.burningTriggered) {
          const fireLevel = game.burningProgress;
          const flameCount = 2 + Math.floor(fireLevel * 4); // 2 → 6

          for (let i = 0; i < flameCount; i++) {
            const spacing = 16;
            const fx = z.x + 20 + i * spacing;
            const baseY = z.y + z.h - 8 - (i % 2) * 3;

            const up =
              6 +
              fireLevel * 20 +
              Math.sin(performance.now() / 120 + i) * (2 + fireLevel * 4);
            const innerUp = up * 0.58;

            // 外焰
            ctx.fillStyle = "#ff8f2c";
            ctx.beginPath();
            ctx.moveTo(fx, baseY);
            ctx.lineTo(fx + 7, baseY - up);
            ctx.lineTo(fx + 14, baseY);
            ctx.fill();

            // 內焰
            ctx.fillStyle = "#ffd25a";
            ctx.beginPath();
            ctx.moveTo(fx + 3, baseY);
            ctx.lineTo(fx + 7, baseY - innerUp);
            ctx.lineTo(fx + 11, baseY);
            ctx.fill();
          }
        }

        // 燒完後：淡淡燒痕
        if (game.ashReady) {
          ctx.fillStyle = "rgba(55, 45, 35, 0.28)";
          ctx.fillRect(z.x + 8, z.y + z.h - 18, z.w - 16, 10);

          ctx.fillStyle = "rgba(120, 116, 110, 0.35)";
          for (let i = 0; i < 10; i++) {
            const ax = z.x + 12 + i * 8;
            const ay = z.y + z.h - 14 - (i % 2);
            ctx.fillRect(ax, ay, 4, 2);
          }
        }
      }

        }

        // 支柱
        ctx.fillStyle = "#5c4021";
        ctx.fillRect(x + 20, y + 82, 12, 52);

        // 防鼠盤

        ctx.fillRect(x + 14, y + 76, 24, 8);
        ctx.fillRect(x + 92, y + 76, 24, 8);

        // 平台
        ctx.fillStyle = "#6e4c2b";
        ctx.fillRect(x + 8, y + 72, 114, 12);

        const upperX = x - 18;
        const upperW = 166;
        const upperInset = 10;

        // 倉體
        ctx.fillStyle = "#7b5a34";
        ctx.fillRect(upperX, y + 14, upperW, 66);

        // 木板紋理
        ctx.fillStyle = "#8c6a3d";
        for (let i = 0; i < 6; i++) {
          ctx.fillRect(
            upperX + upperInset,
            y + 30 + i * 8,
            upperW - upperInset * 2,
            3,
          );
        }

        // 側邊立板
        ctx.fillStyle = "#6d4f2e";
        ctx.fillRect(upperX + 6, y + 26, 6, 46);
        ctx.fillRect(upperX + upperW - 12, y + 26, 6, 46);

        // 屋頂
        ctx.fillStyle = "#4a3a2a";
        ctx.beginPath();
        ctx.moveTo(upperX - 18, y + 24);
        ctx.lineTo(upperX + 26, y - 22);
        ctx.lineTo(upperX + upperW - 34, y - 22);
        ctx.lineTo(upperX + upperW + 20, y + 24);
        ctx.closePath();
        ctx.fill();

        // 屋簷
        ctx.fillStyle = "#5b4833";
        ctx.fillRect(upperX - 8, y + 20, upperW + 16, 12);

        // 倉門
        ctx.fillStyle = "#e7d7a4";
        ctx.fillRect(x + 52, y + 34, 30, 26);

        // 入口木梯，避免像直接飛進去
        ctx.strokeStyle = "#654829";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(geo.ladder.leftTop.x, geo.ladder.leftTop.y);
        ctx.lineTo(geo.ladder.leftBottom.x, geo.ladder.leftBottom.y);
        ctx.moveTo(geo.ladder.rightTop.x, geo.ladder.rightTop.y);
        ctx.lineTo(geo.ladder.rightBottom.x, geo.ladder.rightBottom.y);
        ctx.stroke();

        ctx.lineWidth = 3;
        for (let i = 0; i < 4; i++) {
          const t = i / 3;
          const lx =
            geo.ladder.leftTop.x +
            (geo.ladder.leftBottom.x - geo.ladder.leftTop.x) * t;
          const ly =
            geo.ladder.leftTop.y +
            (geo.ladder.leftBottom.y - geo.ladder.leftTop.y) * t;
          const rx =
            geo.ladder.rightTop.x +
            (geo.ladder.rightBottom.x - geo.ladder.rightTop.x) * t;
          const ry =
            geo.ladder.rightTop.y +
            (geo.ladder.rightBottom.y - geo.ladder.rightTop.y) * t;
          ctx.beginPath();
          ctx.moveTo(lx, ly);
          ctx.lineTo(rx, ry);
          ctx.stroke();
        }
      }

      function drawPlayer() {
        const p = game.player;

        // 如果有對應的外觀圖片庫 (Sprite) 就使用 Image 繪製
        const spriteKey =
          game.selectedGender === "female" ? "player_f" : "player_m";
        if (IMAGES[spriteKey]) {
          let frameIndex = 0;
          // 目前的圖只有1格（靜態），暫時不根據 isMoving 算動畫 frameIndex，
          // 直接畫完整張原圖的中心

          const img = IMAGES[spriteKey];
          // 如果影像是AI生成剛切下來單一尺寸，可以讀取 img.naturalWidth 直接縮放
          const sW = img.naturalWidth || 128;
          const sH = img.naturalHeight || 128;

          ctx.save();
          if (p.dir === "left") {
            ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
            ctx.scale(-1, 1);
            let displayH = 160;
            let displayW = sW * (displayH / sH);
            ctx.drawImage(
              img,
              0,
              0,
              sW,
              sH,
              -displayW / 2,
              -displayH + p.h,
              displayW,
              displayH,
            );

      function drawInteractOutline(box, radius = 6) {
        const pad = 6;
        const rot = box.rotation || 0;
        const cx = box.x + box.w / 2;
        const cy = box.y + box.h / 2;
        const w = box.w + pad * 2;
        const h = box.h + pad * 2;
        const x = -w / 2;
        const y = -h / 2;

        ctx.save();
        if (rot) {
          ctx.translate(cx, cy);
          ctx.rotate(rot);
        }

        // 外層淡白光
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 8;
        roundRect(
          ctx,
          rot ? x : box.x - pad,
          rot ? y : box.y - pad,
          w,
          h,
          radius,
        );
        ctx.stroke();

        // 內層亮白框
        ctx.strokeStyle = "rgba(255,245,210,0.95)";
        ctx.lineWidth = 2;
        roundRect(
          ctx,
          rot ? x : box.x - pad,
          rot ? y : box.y - pad,
          w,
          h,
          radius,
        );
        ctx.stroke();

        ctx.restore();
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawInteractionHints() {
        const player = game.player;

        // 石板屋門口
        if (!game.inHouse && isNear(player, game.houseDoorZone, 76)) {
          drawInteractOutline(game.houseDoorZone);
        }

        // 屋內出口
        if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
          drawInteractOutline(game.houseExitZone);
        }

        // 屋內長者
        if (game.inHouse) {
          for (const npc of game.interiorNPCs) {
            if (isNear(player, npc, 50)) {
              drawInteractOutline(npc);
            }
          }
        }

        // 戶外長老
        if (!game.inHouse && isNear(player, game.elder, 56)) {
          drawInteractOutline(game.elder);
        }

        if (!game.inHouse && !game.inGranary) {
          if (game.forestPathZone && isNear(player, game.forestPathZone, 54)) {
            drawInteractOutline(game.forestPathZone, 8);
            drawPromptBubble(
              "前往河邊",
              game.forestPathZone.x + 6,
              game.forestPathZone.y - 28,
              { fitBox: game.forestPathZone, extraWidth: 8 },
            );
          }

          const outdoorNpc = getNearbyOutdoorNPC();
          if (outdoorNpc) {
            drawInteractOutline(outdoorNpc);
          }

          const storySpot = getNearbyStorySpot();
          if (storySpot) {
            drawInteractOutline(storySpot);
          }
        }

        // 雜草 / 小樹
        if (!game.inHouse && game.blessingDone && !game.carrying) {
          const weed = game.weeds.find(
            (w) =>
              !w.cleared &&
              isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 38),
          );
          if (weed) {
            drawInteractOutline({ x: weed.x, y: weed.y, w: weed.w, h: weed.h });
          }
        }

        // 堆置區
        if (
          !game.inHouse &&
          game.carrying &&
          isNear(player, game.stackZone, 58)
        ) {
          drawInteractOutline(game.stackZone);
        }

        if (
          !game.inHouse &&
          game.allCleared &&
          !game.carrying &&
          isNear(player, game.stackZone, 58) &&
          !game.burningTriggered &&
          !game.ashReady
        ) {
          drawInteractOutline(game.stackZone);
        }

        // 石頭堆
        if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
          const stack = game.stoneStacks.find(
            (s) => !s.done && isNear(player, s, 44),
          );
          if (stack) {
            drawInteractOutline(stack);
          }
        }

        // 播種區塊
        if (!game.inHouse && game.landPrepared && !game.allSeeded) {
          const plot = game.landPlots.find(
            (p) => p.prepared && !p.seeded && isNear(player, p, 44),
          );
          if (plot) {
            drawInteractOutline(plot);
          }
        }

        // 驅鳥器具本體
        if (!game.inHouse && game.allSeeded && !game.scareReady) {
          const device = game.scareDevices.find(
            (d) => !d.placed && isNear(player, d, 42),
          );
          if (device) {
            drawInteractOutline(device);
          }
        }

        // 拉繩點
        if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
          const rope = game.scareDevices.find(
            (d) =>
              d.placed &&
              isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42),
          );

          if (rope) {
            drawInteractOutline(
              { x: rope.ropeX, y: rope.ropeY, w: 18, h: 18 },
              4,
            );
          }
        }
      }

        ctx.moveTo(0, 420);

        ctx.lineTo(300, 410);
        ctx.lineTo(520, 230);

        ctx.lineTo(1280, 768);

        ctx.closePath();

      function drawOpeningAnimation() {
        const t = game.introFrame;
        const total = game.introTotalFrames || 1800;

        const mountainStart = 0;
        const riverStart = 340;
        const villageStart = 820;
        const fieldStart = 1300;

        const mountainHoldEnd = 360;
        const riverHoldEnd = 860;
        const villageHoldEnd = 1340;

        const fadeWindow = 150;

        const mAlpha = clamp(
          Math.min((t - mountainStart) / 80, 1) *
            (1 - Math.max(0, t - mountainHoldEnd) / fadeWindow),
          0,
          1,
        );
        const rAlpha = clamp(
          Math.min((t - riverStart) / 95, 1) *
            (1 - Math.max(0, t - riverHoldEnd) / fadeWindow),
          0,
          1,
        );
        const vAlpha = clamp(
          Math.min((t - villageStart) / 95, 1) *
            (1 - Math.max(0, t - villageHoldEnd) / fadeWindow),
          0,
          1,
        );
        const fAlpha = clamp(Math.min((t - fieldStart) / 110, 1), 0, 1);

        drawIntroMountainScene(mAlpha, t);
        drawIntroRiverScene(rAlpha, t - riverStart);
        drawIntroVillageScene(vAlpha, t - villageStart);
        drawIntroFieldScene(fAlpha, t - fieldStart);

        const globalFadeIn = clamp(t / 80, 0, 1);
        const globalFadeOut = clamp((t - (total - 160)) / 160, 0, 1);

        ctx.save();
        ctx.globalAlpha = globalFadeIn * (1 - globalFadeOut);

        ctx.textAlign = "center";
        ctx.fillStyle = "#fff4d2";
        ctx.shadowColor = "rgba(0,0,0,0.38)";
        ctx.shadowBlur = 10;

        if (t < riverStart + 30) {
          ctx.font = "bold 42px sans-serif";
          ctx.fillText("在雲豹與百步蛇守護的深山裡", canvas.width / 2, 152);
          ctx.font = "25px sans-serif";
          if (t > 110)
            ctx.fillText("隱藏著古老的魯凱部落", canvas.width / 2, 208);
        } else if (t < villageStart + 20) {
          ctx.font = "bold 38px sans-serif";
          ctx.fillText(
            "一個失去記憶的人，循著未知的呼喚來到這裡",
            canvas.width / 2,
            146,
          );
          ctx.font = "24px sans-serif";
          if (t > 500)
            ctx.fillText(
              "水流經過掌心，像記憶在甦醒前的顫動",
              canvas.width / 2,
              202,
            );
          if (t > 690)
            ctx.fillText("他睜開眼時，山霧仍未散去", canvas.width / 2, 246);
        } else if (t < fieldStart + 20) {
          ctx.font = "bold 38px sans-serif";
          ctx.fillText(
            "長者收留了他，帶他走過石板屋與霧中的山路",
            canvas.width / 2,
            146,
          );
          ctx.font = "24px sans-serif";
          if (t > 980)
            ctx.fillText(
              "他的名字還沒有回來，但土地已在等待",
              canvas.width / 2,
              202,
            );
          if (t > 1160)
            ctx.fillText(
              "部落靜靜看著他，也靜靜等待他的答案",
              canvas.width / 2,
              246,
            );
        } else {
          ctx.font = "bold 42px sans-serif";
          ctx.fillText(
            "這片未開墾的土地，是他重生的起點",
            canvas.width / 2,
            148,
          );
          ctx.font = "25px sans-serif";
          if (t > 1480)
            ctx.fillText("這是一段，尋回名字的旅程", canvas.width / 2, 204);
          if (t > 1630)
            ctx.fillText("而第一個回答他的，是土地與火", canvas.width / 2, 248);
        }

        ctx.font = "18px sans-serif";
        ctx.fillStyle = "#ffebb9";
        ctx.fillText("按 Enter 或空白鍵可跳過序章", canvas.width / 2, 694);

        const barW = 420;
        const barH = 10;
        const bx = canvas.width / 2 - barW / 2;
        const by = 724;
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = "#f0cd7e";
        ctx.fillRect(bx, by, barW * clamp(t / total, 0, 1), barH);

        ctx.restore();

        if (globalFadeOut > 0) {
          ctx.fillStyle = `rgba(0,0,0,${globalFadeOut})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }

      function drawOldMapLayer() {
        // 舊地圖石台獨立拉到前景層，避免被樹叢擋住
        const mapX = 21.8 * TILE;
        const mapY = 8.0 * TILE;
        const mapW = 2.8 * TILE;
        const mapH = 1.9 * TILE;

        if (IMAGES.oldMap) {
          const img = IMAGES.oldMap;
          const sW = img.naturalWidth || 128;
          const sH = img.naturalHeight || 128;
          // 調整比例讓石碑大一點
          const tgtW = mapW * 2;
          const tgtH = sH * (tgtW / sW);
          ctx.drawImage(
            img,
            0,
            0,
            sW,
            sH,
            mapX - (tgtW - mapW) / 2,
            mapY + mapH - tgtH + 10,
            tgtW,
            tgtH,
          );
          return;

        ctx.fillStyle = "#74665a";
        ctx.fillRect(mapX, mapY + 0.8 * TILE, 2.3 * TILE, 1.1 * TILE);
        ctx.fillRect(mapX + 0.5 * TILE, mapY, 1.3 * TILE, 0.9 * TILE);

      function drawAtmosphere() {
        if (
          !game.started ||
          game.inHouse ||
          game.inGranary ||
          game.inRiverScene
        )
          return;
        ctx.save();
        // 一天從早到晚的循環：每 12000 幀一圈 (約 3.3 分鐘)
        const cycle = 12000;
        const t = (game.frameCount % cycle) / cycle;

        // 基礎光影覆蓋層：使用不同混合模式來表現清晨、黃昏、夜晚
        if (t < 0.2) {
          // 清晨起霧 (0.0 ~ 0.2)
          const mist = Math.sin((t / 0.2) * Math.PI) * 0.45;
          ctx.globalCompositeOperation = "screen";
          ctx.fillStyle = `rgba(200, 220, 255, ${mist})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (t > 0.4 && t < 0.7) {
          // 黃昏夕陽 (0.4 ~ 0.7)
          const sunset = Math.sin(((t - 0.4) / 0.3) * Math.PI) * 0.35;
          ctx.globalCompositeOperation = "multiply";
          ctx.fillStyle = `rgba(255, 140, 60, ${sunset})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else if (t >= 0.7 || t > 0.95) {
          // 夜晚 (0.7 ~ 1.0)
          let night = 0;
          if (t >= 0.7 && t <= 1.0)
            night = Math.sin(((t - 0.7) / 0.3) * Math.PI) * 0.6;
          ctx.globalCompositeOperation = "multiply";
          ctx.fillStyle = `rgba(30, 40, 70, ${night})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.restore();
      }

      // --- 圖片加載器 (Asset Loader) ---
      const IMAGES = {};
      const ASSETS_TO_LOAD = {
        // 在這裡放入您的圖片素材路徑，準備好素材後即可取消註解替換
        player_m: "./player_m.png",
        player_f: "./player_f.png",
        elder: "./elder.png",
        tree: "./tree.png",
        bush: "./bush.png",
        house: "./house.png",
        storehouse: "./storehouse.png",
        npc_villager: "./npc_villager.png",
        craftWoman: "./craftWoman.png",
        child: "./child.png",
        oldMap: "./oldMap.png",
        weed: "./weed.png",
        bg: "./bg.png",
      };

      function loadAssets(callback) {
        const keys = Object.keys(ASSETS_TO_LOAD);
        if (keys.length === 0) {
          callback();
          return;
        }
        let loaded = 0;
        keys.forEach((k) => {
          const img = new Image();
          img.onload = () => {
            IMAGES[k] = img;
            loaded++;
            if (loaded === keys.length) callback();
          };
          img.onerror = () => {
            console.warn("圖片載入失敗: " + k);
            IMAGES[k] = null;
            loaded++;
            if (loaded === keys.length) callback();
          };
          img.src = ASSETS_TO_LOAD[k];
        });
      }

      loadAssets(() => {
        init();
        loop();
      });
    </script>
  </body>
</html>
