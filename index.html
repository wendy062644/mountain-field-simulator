<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魯凱族山田燒墾小遊戲</title>
  <style>
    :root {
      --ui-bg: rgba(35, 24, 12, 0.9);
      --ui-border: #e6c98a;
      --ui-text: #fff7de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(#90c95b, #6ca242);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(96vw, 1280px);
      height: auto;
      max-height: 92vh;
      border: 6px solid #3a2816;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      background: #7fb253;
    }
    .panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(96vw, 1280px);
      pointer-events: none;
    }
    #topbar {
      top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ui-text);
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0,0,0,0.35);
    }
    .badge {
      background: var(--ui-bg);
      border: 2px solid var(--ui-border);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1.45;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    #dialogue {
      bottom: 16px;
      background: var(--ui-bg);
      border: 3px solid var(--ui-border);
      border-radius: 16px;
      color: var(--ui-text);
      padding: 16px 18px;
      min-height: 112px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }
    #dialogue .title { color: #ffd27d; font-weight: 800; letter-spacing: 1px; font-size: 14px; }
    #dialogue .text { font-size: 18px; line-height: 1.55; }
    #dialogue .hint { font-size: 13px; opacity: 0.82; color: #ffebb9; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1280" height="768"></canvas>

    <div class="panel" id="topbar">
      <div class="badge" id="mission">任務：前往山田，與長老對話</div>
      <div class="badge" id="status">場景：戶外｜祈福：未完成｜整理：0 / 0</div>
    </div>

    <div class="panel" id="dialogue">
      <div class="title">魯凱族山田燒墾</div>
      <div class="text" id="dialogueText">使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。</div>
      <div class="hint">操作：移動 / 空白鍵互動 / R 重新開始</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dialogueText = document.getElementById('dialogueText');
    const missionEl = document.getElementById('mission');
    const statusEl = document.getElementById('status');

    const TILE = 32;
    const WORLD = { w: 56, h: 30 };
    const keys = {};
    let canPressInteract = true;

    document.addEventListener('keydown', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = true;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if (k === 'r') init();

      if (!game.started) {
        if (k === 'a' || k === 'ArrowLeft') game.selectedGender = 'male';
        if (k === 'd' || k === 'ArrowRight') game.selectedGender = 'female';
        if (k === 'Enter') {
          const n = prompt('請輸入角色名字：', game.playerName || '');
          if (n && n.trim()) game.playerName = n.trim();
          game.started = true;
          game.message = `歡迎，${game.playerName}。先熟悉部落，再前往山田。`;
          updateUI();
        }
      }
    });
    document.addEventListener('keyup', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = false;
      if (e.key === ' ') canPressInteract = true;
    });

    const game = {
      player: null,
      elder: null,
      blocks: [],
      weeds: [],
      stackZone: null,
      blessingDone: false,
      blessingStep: 0,
      carrying: false,
      allCleared: false,
      burningTriggered: false,
      burningProgress: 0,
      inHouse: false,
      houseDoorZone: null,
      houseExitZone: null,
      interiorGuide: null,
      camera: { x: 0, y: 0 },
      started: false,
      selectedGender: 'male',
      playerName: '',
      message: '使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。'
    };

    function init() {
      game.player = { x: 7.2 * TILE, y: 19.2 * TILE, w: 20, h: 26, speed: 2.4, dir: 'down' };
      game.elder = { x: 46.5 * TILE, y: 13.5 * TILE, w: 20, h: 26 };
      game.blocks = [];
      game.weeds = [];
      game.stackZone = { x: 47 * TILE, y: 19 * TILE, w: TILE * 3, h: TILE * 2 };
      game.houseDoorZone = { x: 8.15 * TILE, y: 16.0 * TILE, w: 1.55 * TILE, h: 2.9 * TILE };
      game.houseExitZone = { x: 14.2 * TILE, y: 14.3 * TILE, w: 1.6 * TILE, h: 1.2 * TILE };
      game.interiorGuide = { x: 20.5 * TILE, y: 8.5 * TILE, w: 20, h: 26 };
      game.blessingDone = false;
      game.blessingStep = 0;
      game.carrying = false;
      game.allCleared = false;
      game.burningTriggered = false;
      game.burningProgress = 0;
      game.inHouse = false;
      game.camera = { x: 0, y: 0 };
      game.started = false;
      game.message = '使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。';
      buildWorld();
      updateCamera();
      updateUI();
    }

    function buildWorld() {
      for (let x = 0; x < WORLD.w; x++) {
        addBlock(x, 0, 1, 1, 'tree');
        addBlock(x, WORLD.h - 1, 1, 1, 'tree');
      }
      for (let y = 1; y < WORLD.h - 1; y++) {
        addBlock(0, y, 1, 1, 'tree');
        addBlock(WORLD.w - 1, y, 1, 1, 'tree');
      }

      // 部落區：不使用圍牆，改用前院空地、石板地與樹木界定空間
      addBlock(6, 14, 6, 4, 'house');
      addBlock(6, 13, 6, 1, 'houseRoof');
      addBlock(13, 14, 1, 3, 'totem');

      // 部落周邊以樹與石材物件構成自然邊界
      addBlock(2, 10, 1, 1, 'tree');
      addBlock(4, 8, 1, 1, 'tree');
      addBlock(12, 8, 1, 1, 'tree');
      addBlock(15, 10, 1, 1, 'tree');
      addBlock(2, 21, 1, 1, 'tree');
      addBlock(16, 21, 1, 1, 'tree');
      addBlock(4, 21, 1, 1, 'tree');
      addBlock(13, 22, 1, 1, 'tree');

      // 山林過渡
      addBlock(18, 4, 1, 10, 'tree');
      addBlock(18, 17, 1, 10, 'tree');
      addBlock(19, 4, 10, 1, 'tree');
      addBlock(19, 26, 16, 1, 'tree');
      addBlock(28, 6, 1, 6, 'tree');
      addBlock(28, 16, 1, 10, 'tree');
      addBlock(33, 4, 1, 7, 'tree');
      addBlock(33, 17, 1, 10, 'tree');
      addBlock(37, 6, 1, 6, 'tree');
      addBlock(37, 16, 1, 10, 'tree');

      // 山田區：移除整圈柵欄，改成自然邊界（大樹、局部開口）
      addBlock(39, 8, 2, 1, 'tree');
      addBlock(42, 8, 2, 1, 'tree');
      addBlock(45, 8, 2, 1, 'tree');
      addBlock(48, 8, 2, 1, 'tree');
      addBlock(51, 8, 2, 1, 'tree');

      addBlock(39, 21, 2, 1, 'tree');
      addBlock(42, 21, 2, 1, 'tree');
      addBlock(45, 21, 1, 1, 'tree');

      addBlock(39, 10, 1, 2, 'tree');
      addBlock(39, 17, 1, 3, 'tree');
      addBlock(52, 9, 1, 3, 'tree');
      addBlock(52, 15, 1, 4, 'tree');

      // 入口左側保留開口，右下留出堆置區通道
      const spots = [
        [41,10],[43,10],[45,10],[47,10],[49,10],
        [40,12],[42,12],[44,12],[46,12],[50,12],
        [41,14],[43,14],[45,14],[47,14],[49,14],
        [40,16],[42,16],[44,16],[46,16],[50,16],
        [41,18],[43,18],[45,18],[47,18],[49,18]
      ];
      spots.forEach(([x,y], i) => {
        game.weeds.push({ x: x * TILE + 5, y: y * TILE + 6, w: 22, h: 20, cleared: false, id: i });
      });
    }

    function addBlock(tx, ty, tw, th, type) {
      game.blocks.push({ x: tx * TILE, y: ty * TILE, w: tw * TILE, h: th * TILE, type, tx, ty });
    }

    function removeBlockAt(tx, ty) {
      game.blocks = game.blocks.filter(b => !(b.tx === tx && b.ty === ty && b.w === TILE && b.h === TILE));
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function shrinkBlockForCollision(b) {
      if (b.type === 'tree') return { x: b.x + 2, y: b.y + 10, w: b.w - 4, h: b.h - 10 };
      if (b.type === 'house') return { x: b.x + 10, y: b.y + 18, w: b.w - 20, h: b.h - 18 };
      if (b.type === 'houseRoof') return null;
      return b;
    }

    function getHouseColliders(b) {
      return [
        // 上方牆面
        { x: b.x + 20, y: b.y + 18, w: b.w - 40, h: 42 },

        // 左牆
        { x: b.x + 10, y: b.y + 18, w: 46, h: b.h - 26 },

        // 右牆
        { x: b.x + b.w - 56, y: b.y + 18, w: 46, h: b.h - 26 },

        // 門左側前牆
        { x: b.x + 56, y: b.y + 78, w: 54, h: b.h - 78 },

        // 門右側前牆
        { x: b.x + 160, y: b.y + 78, w: 22, h: b.h - 78 }
      ];
    }

    function collides(box) {
      if (game.inHouse) {
        const roomBounds = { x: 80, y: 130, w: canvas.width - 160, h: canvas.height - 150 };
        return (
          box.x < roomBounds.x ||
          box.y < roomBounds.y ||
          box.x + box.w > roomBounds.x + roomBounds.w ||
          box.y + box.h > roomBounds.y + roomBounds.h
        );
      }

      for (const b of game.blocks) {
        if (b.type === 'house') {
          const colliders = getHouseColliders(b);
          for (const c of colliders) {
            if (rectsOverlap(box, c)) return true;
          }
          continue;
        }

        const hitbox = shrinkBlockForCollision(b);
        if (hitbox && rectsOverlap(box, hitbox)) return true;
      }

      return false;
    }

    function updateCamera() {
      if (game.inHouse) return;
      const worldW = WORLD.w * TILE;
      const worldH = WORLD.h * TILE;
      const tx = game.player.x + game.player.w / 2 - canvas.width / 2;
      const ty = game.player.y + game.player.h / 2 - canvas.height / 2;
      game.camera.x = clamp(tx, 0, Math.max(0, worldW - canvas.width));
      game.camera.y = clamp(ty, 0, Math.max(0, worldH - canvas.height));
    }

    function movePlayer() {
      const p = game.player;
      let dx = 0, dy = 0;
      if (keys['ArrowLeft'] || keys['a']) { dx -= p.speed; p.dir = 'left'; }
      if (keys['ArrowRight'] || keys['d']) { dx += p.speed; p.dir = 'right'; }
      if (keys['ArrowUp'] || keys['w']) { dy -= p.speed; p.dir = 'up'; }
      if (keys['ArrowDown'] || keys['s']) { dy += p.speed; p.dir = 'down'; }

      const nextX = { x: p.x + dx, y: p.y, w: p.w, h: p.h };
      if (!collides(nextX)) p.x += dx;
      const nextY = { x: p.x, y: p.y + dy, w: p.w, h: p.h };
      if (!collides(nextY)) p.y += dy;
    }

    function isNear(a, b, d = 36) {
      const ax = a.x + a.w / 2;
      const ay = a.y + a.h / 2;
      const bx = b.x + b.w / 2;
      const by = b.y + b.h / 2;
      return Math.hypot(ax - bx, ay - by) <= d;
    }

    function setMessage(text) {
      game.message = text;
      dialogueText.textContent = text;
    }

    function handleInteract() {
      const pressed = keys[' '];
      if (!pressed || !canPressInteract) return;
      canPressInteract = false;
      const player = game.player;

      if (!game.inHouse && isNear(player, game.houseDoorZone, 44)) {
        game.inHouse = true;
        game.player.x = 14.8 * TILE;
        game.player.y = 14.2 * TILE;
        game.player.dir = 'up';
        setMessage('你走進石板屋。屋內擺著陶壺、木雕與日常器物。靠近門口再按空白鍵可離開。');
        updateUI();
        return;
      }

      if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
        game.inHouse = false;
        game.player.x = 7.2 * TILE;
        game.player.y = 19.2 * TILE;
        game.player.dir = 'down';
        updateCamera();
        setMessage('你走出石板屋，回到部落前方空地。');
        updateUI();
        return;
      }

      if (game.inHouse && isNear(player, game.interiorGuide, 50)) {
        setMessage('屋內長者：石板屋是生活與記憶的所在。先熟悉家屋，再去山田與外面的長老對話。');
        return;
      }

      if (!game.blessingDone && isNear(player, game.elder, 56)) {
        game.blessingStep++;
        if (game.blessingStep === 1) setMessage('長老：這片山田還不能動手。先向祖靈祈福，再開始整理吧。');
        else if (game.blessingStep === 2) setMessage('你與長老低聲祈禱，向土地、山林與祖靈表達敬意。');
        else {
          game.blessingDone = true;
          setMessage('祈福完成。現在可以整理荒田，把雜草與矮樹集中堆到右下角的堆置區。');
        }
        updateUI();
        return;
      }

      if (!game.inHouse && game.blessingDone && !game.carrying) {
        const weed = game.weeds.find(w => !w.cleared && isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34));
        if (weed) {
          weed.cleared = true;
          game.carrying = true;
          setMessage('你砍下並整理了一份雜草／矮樹。把它帶到堆置區。');
          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.carrying && isNear(player, game.stackZone, 58)) {
        game.carrying = false;
        setMessage('你把整理好的草木堆放在指定地點。');
        if (game.weeds.every(w => w.cleared)) {
          game.allCleared = true;
          setMessage('荒田已整理完成。再到堆置區按空白鍵，即可觸發燃燒。');
        }
        updateUI();
        return;
      }

      if (!game.inHouse && game.allCleared && !game.carrying && isNear(player, game.stackZone, 58) && !game.burningTriggered) {
        game.burningTriggered = true;
        setMessage('你點燃堆置的草木，火勢受控地燃起。山田燒墾進入下一步。');
        updateUI();
      }
    }

    function updateBurning() {
      if (!game.burningTriggered) return;
      game.burningProgress = Math.min(1, game.burningProgress + 0.0035);
    }

    function updateUI() {
      const total = game.weeds.length;
      const deposited = game.weeds.filter(w => w.cleared).length - (game.carrying ? 1 : 0);

      if (game.inHouse) missionEl.textContent = '任務：探索石板屋，靠近門口按空白鍵可離開';
      else if (!game.blessingDone) missionEl.textContent = '任務：到山田與長老對話，完成祈福';
      else if (!game.allCleared) missionEl.textContent = game.carrying ? '任務：把草木搬到右下角堆置區' : '任務：繼續整理荒田';
      else if (!game.burningTriggered) missionEl.textContent = '任務：前往堆置區，觸發燃燒';
      else missionEl.textContent = '任務完成：你完成了山田燒墾的整理與燃燒';

      statusEl.textContent = `場景：${game.inHouse ? '石板屋內' : '戶外'}｜祈福：${game.blessingDone ? '已完成' : '未完成'}｜整理：${Math.max(deposited, 0)} / ${total}${game.carrying ? '｜搬運中' : ''}${game.burningTriggered ? '｜燃燒中' : ''}`;
      dialogueText.textContent = game.message;
    }

    function loop() {
      if (game.started) {
        movePlayer();
        handleInteract();
        updateBurning();
        updateCamera();
      }
      render();
      requestAnimationFrame(loop);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!game.started) {
        drawStartScreen();
        return;
      }

      if (game.inHouse) {
        drawInteriorScene();
        drawNPC(game.interiorGuide, '#5a3420', '#d0b98c');
        drawHouseExitMarker();
        drawPlayer();
      } else {
        ctx.save();
        ctx.translate(-game.camera.x, -game.camera.y);
        drawGround();
        drawRoad();
        drawHouseArea();
        drawField();
        drawBlocks();
        drawWeeds();
        drawStackZone();
        drawNPC(game.elder, '#1a1a1a', '#d0b98c');
        drawQuestIcon(game.elder, !game.blessingDone ? '!' : '?');
        drawDoorPrompt();
        drawPlayer();
        if (game.carrying) drawCarryIcon();
        ctx.restore();
      }
    }

    function drawGround() {
      for (let y = 0; y < WORLD.h; y++) {
        for (let x = 0; x < WORLD.w; x++) {
          const field = x >= 39 && x <= 52 && y >= 8 && y <= 21;
          ctx.fillStyle = field ? '#c39a58' : '#78b24f';
          ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
          ctx.fillStyle = 'rgba(255,255,255,0.07)';
          if ((x + y) % 3 === 0) ctx.fillRect(x * TILE + 4, y * TILE + 4, 3, 3);
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          if ((x * 7 + y * 11) % 4 === 0) ctx.fillRect(x * TILE + 20, y * TILE + 16, 3, 3);
        }
      }
    }

    function drawRoad() {
      ctx.fillStyle = '#bc8746';

      // 石板屋前的小路
      ctx.fillRect(9 * TILE, 17 * TILE, 2.5 * TILE, 1.5 * TILE);

      // 通往森林的主路，做成逐段彎折比較自然
      ctx.fillRect(9.5 * TILE, 17.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(15 * TILE, 16.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(21 * TILE, 15.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(27 * TILE, 14.5 * TILE, 6 * TILE, 1.5 * TILE);
      ctx.fillRect(33 * TILE, 14 * TILE, 6 * TILE, 1.5 * TILE);

      // 接到山田入口
      ctx.fillRect(38 * TILE, 14 * TILE, 1.5 * TILE, 2 * TILE);

      // short spur toward the house door
      ctx.fillRect(8.5 * TILE, 16.4 * TILE, 1.2 * TILE, 0.8 * TILE);

      for (let i = 0; i < 140; i++) {
        const x = 7 * TILE + (i * 41) % (32 * TILE);
        const y = 14 * TILE + (i * 23) % (5 * TILE);
        ctx.fillStyle = i % 2 ? 'rgba(255,230,180,0.12)' : 'rgba(120,75,20,0.08)';
        ctx.fillRect(x, y, 3, 3);
      }
    }

    function drawHouseArea() {
      // 石板前院
      ctx.fillStyle = '#5e5e5e';
      for (let i = 0; i < 30; i++) {
        const row = Math.floor(i / 10);
        const px = 3.8 * TILE + (i % 10) * 24 + (row % 2 ? 8 : 0);
        const py = 18.0 * TILE + row * 18;
        ctx.beginPath();
        ctx.moveTo(px, py + 8);
        ctx.lineTo(px + 12, py);
        ctx.lineTo(px + 26, py + 4);
        ctx.lineTo(px + 22, py + 16);
        ctx.lineTo(px + 6, py + 18);
        ctx.closePath();
        ctx.fill();
      }

      // 柴堆與生活痕跡
      drawWoodPile(3.4 * TILE, 17.0 * TILE);
      drawWoodPile(12.3 * TILE, 18.6 * TILE);
      drawPotOutdoor(4.8 * TILE, 17.4 * TILE, 10);
      drawPotOutdoor(11.8 * TILE, 19.1 * TILE, 9);

      drawBush(5 * TILE + 6, 9 * TILE + 8, '#4a7f39');
      drawBush(12 * TILE + 6, 20 * TILE + 4, '#507d3a');
    }

    function drawField() {
      // main soil area with more organic shape
      ctx.fillStyle = '#b88745';
      ctx.fillRect(40 * TILE, 9 * TILE, 11 * TILE, 11 * TILE);

      // irregular edges to avoid boxy feel
      ctx.fillRect(39.5 * TILE, 11 * TILE, 1.5 * TILE, 7 * TILE);
      ctx.fillRect(50.5 * TILE, 10 * TILE, 1.5 * TILE, 8 * TILE);
      ctx.fillRect(42 * TILE, 19.5 * TILE, 6 * TILE, 1 * TILE);

      ctx.fillStyle = '#8f5d2f';
      for (let y = 9; y < 20; y++) {
        for (let x = 40; x < 51; x++) {
          ctx.fillRect(x * TILE + 2, y * TILE + 20, TILE - 4, 2);
        }
      }
    }

    function drawStoneHouse(b) {
      if (b.type !== 'house') return;
      const x = b.x - 26, y = b.y - 42;
      const w = 8.4 * TILE;
      const h = 5.2 * TILE;

      // roof
      ctx.fillStyle = '#2f2f2f';
      ctx.beginPath();
      ctx.moveTo(x + 12, y + 54);
      ctx.lineTo(x + 86, y + 18);
      ctx.lineTo(x + w - 10, y + 38);
      ctx.lineTo(x + w + 8, y + 56);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#5d5d5d';
      for (let i = 0; i < 16; i++) {
        ctx.fillRect(x + 8 + i * 18, y + 39 + (i % 2), 24, 4);
        ctx.fillRect(x + 2 + i * 18, y + 48 + ((i + 1) % 2), 24, 4);
      }

      // wall base
      ctx.fillStyle = '#32363a';
      ctx.fillRect(x + 12, y + 56, w - 16, h - 20);

      // irregular slate stones instead of repeated emblem-like pattern
      const rowOffsets = [0, 8, 3, 11, 5, 13, 2, 9, 4, 12, 6, 10];
      for (let ry = 0; ry < 12; ry++) {
        const sy = y + 62 + ry * 10;
        const offset = rowOffsets[ry % rowOffsets.length];
        for (let sx = x + 18 + offset; sx < x + w - 24; sx += 28) {
          const stoneW = 18 + ((sx + sy) % 3) * 4;
          ctx.fillStyle = ((sx / 10 + ry) % 2 === 0) ? '#6a6d72' : '#5b5f64';
          ctx.fillRect(sx, sy, stoneW, 5);
        }
      }

      // lintel above door
      ctx.fillStyle = '#6a4327';
      ctx.fillRect(x + 30, y + 78, w - 66, 16);
      ctx.fillStyle = '#b98a57';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(x + 44 + i * 34, y + 84, 10, 4);
      }

      // door
      ctx.fillStyle = '#4a2a18';
      ctx.fillRect(x + 94, y + 106, 50, 92);
      ctx.strokeStyle = '#875a38';
      ctx.lineWidth = 2;
      ctx.strokeRect(x + 99, y + 111, 40, 82);
      ctx.beginPath();
      ctx.arc(x + 119, y + 145, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 119, y + 155);
      ctx.lineTo(x + 119, y + 176);
      ctx.moveTo(x + 119, y + 164);
      ctx.lineTo(x + 108, y + 173);
      ctx.moveTo(x + 119, y + 164);
      ctx.lineTo(x + 130, y + 173);
      ctx.stroke();

      // standing slab on right
      ctx.fillStyle = '#454545';
      ctx.beginPath();
      ctx.moveTo(x + w - 24, y + h);
      ctx.lineTo(x + w + 10, y + 118);
      ctx.lineTo(x + w + 24, y + h - 4);
      ctx.closePath();
      ctx.fill();
    }

      game.selectedGender = 'male';
      drawPlayer();
      game.player = { x: rightX+25, y: y + 110, dir: 'down' };
      game.selectedGender = 'female';
      drawPlayer();
      game.player = oldPlayer;
      game.selectedGender = oldGender;

      ctx.fillStyle = '#fff7de';
      ctx.font = '22px sans-serif';
      ctx.fillText('男生', leftX+30, 500);
      ctx.fillText('女生', rightX+30, 500);

      ctx.font = '20px sans-serif';
      ctx.fillText(`名字：${game.playerName}`, canvas.width / 2, 545);
      ctx.font = '18px sans-serif';
      ctx.fillText('左右鍵或 A / D 選擇角色，按 Enter 輸入名字並開始', canvas.width / 2, 590);
    }

    init();
    loop();
  </script>
</body>
</html>
