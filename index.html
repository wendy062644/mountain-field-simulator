<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魯凱族山田燒墾小遊戲</title>
  <style>
    :root {
      --ui-bg: rgba(35, 24, 12, 0.9);
      --ui-border: #e6c98a;
      --ui-text: #fff7de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(#90c95b, #6ca242);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(96vw, 1280px);
      height: auto;
      max-height: 92vh;
      border: 6px solid #3a2816;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      background: #7fb253;
    }
    .panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(96vw, 1280px);
      pointer-events: none;
    }
    #topbar {
      top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--ui-text);
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0,0,0,0.35);
    }

    .badge {
      background: var(--ui-bg);
      border: 3px solid var(--ui-border);
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 22px;
      line-height: 1.5;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
    }
    #dialogue {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(8px);
      width: min(96vw, 1280px);

      background: rgba(35, 24, 12, 0.92);
      border: 3px solid var(--ui-border);
      border-radius: 16px;
      color: var(--ui-text);

      padding: 16px 18px;
      min-height: 112px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30);
      overflow: visible;
      pointer-events: none;

      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s ease, transform 0.18s ease, min-height 0.18s ease, padding 0.18s ease;
    }

    #dialogue.active {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    #dialogue .dialogue-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-height: 0;
    }

    #dialogue .title {
      color: #ffd27d;
      font-weight: 800;
      letter-spacing: 1px;
      font-size: 14px;
      line-height: 1.2;
    }

    #dialogue .text {
      font-size: 18px;
      line-height: 1.55;
    }

    #dialogue .hint {
      font-size: 13px;
      opacity: 0.82;
      color: #ffebb9;
    }

    #dialoguePortrait {
      position: absolute;
      right: 18px;
      top: -42px;
      width: 180px;
      height: 180px;
      display: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.35));
    }

    /* 正式對話時放大 */
    #dialogue.talking {
      background: linear-gradient(rgba(42, 28, 16, 0.96), rgba(28, 18, 10, 0.96));
      border-width: 4px;
      border-radius: 24px;
      padding: 24px 220px 22px 26px;
      min-height: 210px;
      box-shadow: 0 18px 38px rgba(0,0,0,0.36);
    }

    #dialogue.talking .dialogue-main {
      gap: 10px;
      min-height: 150px;
    }

    #dialogue.talking .title {
      font-weight: 900;
      font-size: 22px;
    }

    #dialogue.talking .text {
      font-size: 28px;
      line-height: 1.65;
      text-shadow: 0 2px 0 rgba(0,0,0,0.28);
    }

    #dialogue.talking .hint {
      font-size: 15px;
      opacity: 0.88;
    }

    #dialogue.talking.show-portrait #dialoguePortrait {
      display: block;
    }
    #dialogue.show-portrait #dialoguePortrait {
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1280" height="768"></canvas>

    <div class="panel" id="topbar">
      <div class="badge" id="mission">任務：前往田地，與長老對話</div>
      <div class="badge" id="status">場景：戶外｜祈福：未完成｜整理：0 / 0</div>
    </div>

    <div class="panel" id="dialogue">
      <canvas id="dialoguePortrait" width="180" height="180"></canvas>

      <div class="dialogue-main">
        <div class="title" id="dialogueTitle">魯凱族山田燒墾</div>
        <div class="text" id="dialogueText">使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。</div>
        <div class="hint">操作：移動 / 空白鍵互動 / R 重新開始</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dialogueEl = document.getElementById('dialogue');
    const dialogueTitle = document.getElementById('dialogueTitle');
    const dialogueText = document.getElementById('dialogueText');
    const portraitCanvas = document.getElementById('dialoguePortrait');
    const portraitCtx = portraitCanvas.getContext('2d');
    const missionEl = document.getElementById('mission');
    const statusEl = document.getElementById('status');

    const maleSong = new Audio('A.mp3');
    const femaleSong = new Audio('B.mp3');

    maleSong.loop = true;
    femaleSong.loop = true;

    maleSong.volume = 0.7;
    femaleSong.volume = 0.7;

    const TILE = 32;
    const WORLD = { w: 56, h: 30 };
    const keys = {};
    let canPressInteract = true;

    document.addEventListener('keydown', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = true;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if (k === 'r') init();

      if (game.seedMenuOpen) {
        if (k === '1') { plantCropByIndex(0); return; }
        if (k === '2') { plantCropByIndex(1); return; }
        if (k === '3') { plantCropByIndex(2); return; }
        if (k === '4') { plantCropByIndex(3); return; }
      }

      if (!game.started) {
        if (k === 'a' || k === 'ArrowLeft') game.selectedGender = 'male';
        if (k === 'd' || k === 'ArrowRight') game.selectedGender = 'female';
        if (k === 'Enter') {
          const n = prompt('請輸入角色名字：', game.playerName || '');
          if (n && n.trim()) game.playerName = n.trim();
          game.started = true;
          setMessage(`歡迎，${game.playerName}。先熟悉部落，再前往田地。`);
          updateUI();
        }
      }
    });
    document.addEventListener('keyup', (e) => {
      const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
      keys[k] = false;
      if (e.key === ' ') canPressInteract = true;
    });

    const game = {
      player: null,
      elder: null,
      blocks: [],
      weeds: [],
      stackZone: null,
      blessingDone: false,
      blessingStep: 0,
      carrying: false,
      allCleared: false,
      burningTriggered: false,
      burningProgress: 0,
      ashReady: false,
      inHouse: false,
      landReady: false,
      landPlots: [],
      landPrepared: false,
      cropTypes: ['小米', '花生', '芋頭', '地瓜'],
      seedMenuOpen: false,
      seedMenuPlot: null,

      stoneStacks: [],
      stoneWallBuilt: false,

      scareDevices: [],
      scareReady: false,

      allSeeded: false,
      birds: [],
      birdTimer: 0,
      scareCount: 0,
      birdPhaseDone: false,

      growthStarted: false,
      growthProgress: 0,
      growthStage: 0,      // 0剛播、1發芽、2長高、3成熟
      allMature: false,

      harvestCount: 0,
      harvestTarget: 0,
      carryingHarvest: false,
      allHarvested: false,

      storageZone: null,
      storedBundles: 0,
      allStored: false,

      houseDoorZone: null,
      houseExitZone: null,
      inGranary: false,
      granaryDoorZone: null,
      granaryExitZone: null,
      interiorNPCs: [],
      currentIndoorSinger: null,
      camera: { x: 0, y: 0 },
      started: false,
      selectedGender: 'male',
      playerName: '',
      message: '使用方向鍵或 WASD 移動，靠近人物或地點後按空白鍵互動。',
      currentSpeaker: 'system',
      currentTitle: '魯凱族山田燒墾',
      isTalking: false
    };

    const ELDER_SPOTS = {
      prayer:     { x: 38.0 * TILE, y: 14.9 * TILE }, // 農田入口外側，略往左下避免堵住開口
      brushGuide: { x: 50.6 * TILE, y: 18.2 * TILE }, // 右下堆置區旁
      burnWatch:  { x: 44.0 * TILE, y: 8.8  * TILE }, // 上方防火道旁
      stoneGuide: { x: 52.6 * TILE, y: 13.8 * TILE }, // 石牆右側
      sowGuide:   { x: 40.6 * TILE, y: 18.6 * TILE }, // 左下田邊
      birdGuide:  { x: 38.4 * TILE, y: 15.2 * TILE }, // 入口旁，方便看驅鳥
      rest:       { x: 34.8 * TILE, y: 14.6 * TILE }, // 田外小路
      storageGuide:{ x: 14.8 * TILE, y: 16.8 * TILE } // 石板屋旁穀倉附近
    };

    function moveElderTo(stage) {
      const pos = ELDER_SPOTS[stage];
      if (!pos) return;
      game.elder.x = pos.x;
      game.elder.y = pos.y;
    }

    function init() {
      game.player = { x: 7.2 * TILE, y: 19.2 * TILE, w: 20, h: 26, speed: 2.4, dir: 'down' };
      game.elder = { x: ELDER_SPOTS.prayer.x, y: ELDER_SPOTS.prayer.y, w: 20, h: 26 };
      game.blocks = [];
      game.weeds = [];
      game.stackZone = { x: 47 * TILE, y: 19 * TILE, w: TILE * 3, h: TILE * 2 };
      game.houseDoorZone = { x: 6.4 * TILE, y: 16 * TILE, w: 1.8 * TILE, h: 2.9 * TILE };
      game.houseExitZone = { x: 14.2 * TILE, y: 14.3 * TILE, w: 1.6 * TILE, h: 1.2 * TILE };
      game.storageZone = { x: 21.8 * TILE, y: 18.0 * TILE, w: 3.4 * TILE, h: 3.0 * TILE };
      const g = getGranaryGeometry();

      game.granaryDoorZone = {
        x: g.door.x - 4,
        y: g.door.y - 4,
        w: g.door.w + 8,
        h: g.door.h + 8
      };

      // 白框提示區：比真正門口大，而且往下延伸到玩家會站的位置
      game.granaryHintZone = {
        x: g.door.x - 20,
        y: g.door.y - 10,
        w: g.door.w + 40,
        h: g.door.h + 60
      };

      game.granaryExitZone = { x: 580, y: 470, w: 90, h: 78 };
      game.inGranary = false;
      game.interiorNPCs = [
        {
          id: 'indoorMale',
          name: '屋內男族人',
          gender: 'male',
          x: 16.8 * TILE,
          y: 9.6 * TILE,
          w: 20,
          h: 26,
          songText: '嗯——啊——山谷的風，會把歌帶到田裡。',
          songFreqs: [196, 246.94, 293.66]
        },
        {
          id: 'indoorFemale',
          name: '屋內女族人',
          gender: 'female',
          x: 22.8 * TILE,
          y: 9.4 * TILE,
          w: 20,
          h: 26,
          songText: '啦——啊——小米成熟時，歌聲也會回來。',
          songFreqs: [261.63, 329.63, 392.0]
        }
      ];

      game.currentIndoorAudio = null;
      stopIndoorSong();
      game.blessingDone = false;
      game.blessingStep = 0;
      game.carrying = false;
      game.allCleared = false;
      game.burningTriggered = false;
      game.burningProgress = 0;
      game.ashReady = false;
      game.inHouse = false;
      game.landReady = false;
      game.landPlots = [];
      game.landPrepared = false;
      game.seedMenuOpen = false;
      game.seedMenuPlot = null;
      game.stoneStacks = [];
      game.stoneWallBuilt = false;

      game.scareDevices = [];
      game.scareReady = false;
      game.allSeeded = false;
      game.birds = [];
      game.birdTimer = 0;
      game.scareCount = 0;
      game.birdPhaseDone = false;
      game.growthStarted = false;
      game.growthProgress = 0;
      game.growthStage = 0;
      game.allMature = false;

      game.harvestCount = 0;
      game.harvestTarget = 0;
      game.carryingHarvest = false;
      game.allHarvested = false;

      game.storedBundles = 0;
      game.allStored = false;
      game.camera = { x: 0, y: 0 };
      game.started = false;
      game.message = '';
      game.currentSpeaker = 'system';
      game.currentTitle = '魯凱族山田燒墾';
      game.isTalking = false;
      buildWorld();
      updateCamera();
      updateUI();
      refreshDialogueUI();
    }

    function buildWorld() {
      for (let x = 0; x < WORLD.w; x++) {
        addBlock(x, 0, 1, 1, 'tree');
        addBlock(x, WORLD.h - 1, 1, 1, 'tree');
      }
      for (let y = 1; y < WORLD.h - 1; y++) {
        addBlock(0, y, 1, 1, 'tree');
        addBlock(WORLD.w - 1, y, 1, 1, 'tree');
      }

      // 部落區：不使用圍牆，改用前院空地、石板地與樹木界定空間
      addBlock(3, 14, 8, 4, 'house');
      addBlock(3, 13, 8, 1, 'houseRoof');
      addBlock(14, 14, 1, 3, 'totem');

      // 部落周邊以樹與石材物件構成自然邊界
      addBlock(2, 10, 1, 1, 'tree');
      addBlock(4, 8, 1, 1, 'tree');
      addBlock(12, 8, 1, 1, 'tree');
      addBlock(15, 10, 1, 1, 'tree');
      addBlock(2, 21, 1, 1, 'tree');
      addBlock(16, 21, 1, 1, 'tree');
      addBlock(4, 21, 1, 1, 'tree');
      addBlock(13, 22, 1, 1, 'tree');

      // 山林過渡
      addBlock(18, 4, 1, 10, 'tree');
      addBlock(18, 17, 1, 10, 'tree');
      addBlock(19, 4, 10, 1, 'tree');
      addBlock(19, 26, 16, 1, 'tree');
      addBlock(28, 5, 1, 7, 'tree');
      addBlock(28, 17, 1, 9, 'tree');
      addBlock(33, 4, 1, 8, 'tree');
      addBlock(33, 17, 1, 10, 'tree');
      addBlock(37, 6, 1, 6, 'tree');
      addBlock(37, 18, 1, 8, 'tree');

      // 山田區：保留自然邊界，但縮短入口附近樹叢高度，避免和 NPC 夾住入口
      addBlock(39, 8, 2, 1, 'tree');
      addBlock(42, 8, 2, 1, 'tree');
      addBlock(45, 8, 2, 1, 'tree');
      addBlock(48, 8, 2, 1, 'tree');
      addBlock(51, 8, 2, 1, 'tree');

      addBlock(39, 21, 2, 1, 'tree');
      addBlock(42, 21, 2, 1, 'tree');
      addBlock(45, 21, 1, 1, 'tree');

      addBlock(39, 9, 1, 3, 'tree');
      addBlock(39, 17, 1, 4, 'tree');
      addBlock(52, 9, 1, 3, 'tree');
      addBlock(52, 16, 1, 4, 'tree');

      // 入口左側保留開口，右下留出堆置區通道
      const spots = [
        [41,10],[45,10],[49,10],
        [40,12],[44,12],[50,12],
        [41,14],[45,14],[49,14],
        [42,16],[46,16],
        [43,18],[47,18]
      ];
      const specialKinds = {
        2: 'wildflower',
        6: 'stone',
        10: 'nest'
      };

      spots.forEach(([x,y], i) => {
        game.weeds.push({
          x: x * TILE + 5,
          y: y * TILE + 6,
          w: 22,
          h: 20,
          cleared: false,
          id: i,
          kind: specialKinds[i] || 'normal'
        });
      });
    }

    function setupLandPlots() {
      game.landPlots = [];

      const startX = 41.2 * TILE;
      const startY = 10.6 * TILE;
      const cols = 4;
      const rows = 3;
      const plotW = 1.9 * TILE;
      const plotH = 1.8 * TILE;
      const gapX = 0.75 * TILE;
      const gapY = 0.9 * TILE;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = startX + c * (plotW + gapX);
          const py = startY + r * (plotH + gapY);

          game.landPlots.push({
            x: px,
            y: py,
            w: plotW,
            h: plotH,
            prepared: false,
            seeded: false,
            cropType: null,
            growth: 0,
            mature: false,
            harvested: false,
            crops: [
              { ox: 0.45, oy: 0.40, planted: false },
              { ox: 1.15, oy: 0.40, planted: false },
              { ox: 0.45, oy: 0.95, planted: false },
              { ox: 1.15, oy: 0.95, planted: false }
            ]
          });
        }
      }

      game.stoneStacks = [
        { x: 40.8 * TILE, y: 19.1 * TILE, w: 2.2 * TILE, h: 0.7 * TILE, done: false },
        { x: 43.4 * TILE, y: 19.1 * TILE, w: 2.2 * TILE, h: 0.7 * TILE, done: false },
        { x: 46.0 * TILE, y: 19.1 * TILE, w: 2.2 * TILE, h: 0.7 * TILE, done: false },
        { x: 48.6 * TILE, y: 19.1 * TILE, w: 2.2 * TILE, h: 0.7 * TILE, done: false },
        { x: 40.2 * TILE, y: 11.0 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false },
        { x: 40.2 * TILE, y: 13.5 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false },
        { x: 40.2 * TILE, y: 16.0 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false },
        { x: 50.9 * TILE, y: 11.0 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false },
        { x: 50.9 * TILE, y: 13.5 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false },
        { x: 50.9 * TILE, y: 16.0 * TILE, w: 0.7 * TILE, h: 1.8 * TILE, done: false }
      ];
    }

    function openSeedMenu(plot) {
      game.seedMenuOpen = true;
      game.seedMenuPlot = plot;
      setMessage('請按 1～4 選擇作物，離開田格一段距離會自動取消。');
    }

    function cancelSeedMenu(silent = false) {
      if (!game.seedMenuOpen) return;
      game.seedMenuOpen = false;
      game.seedMenuPlot = null;
      if (!silent) {
        setMessage('你先離開了這塊田，已取消這次播種選擇。');
      }
    }

    function updateSeedMenuState() {
      if (!game.seedMenuOpen || !game.seedMenuPlot) return;
      if (game.inHouse || game.inGranary) {
        cancelSeedMenu(true);
        return;
      }

      if (!isNear(game.player, game.seedMenuPlot, 82)) {
        cancelSeedMenu();
        updateUI();
      }
    }

    function plantCropByIndex(idx) {
      if (!game.seedMenuOpen || !game.seedMenuPlot) return;
      if (idx < 0 || idx >= game.cropTypes.length) return;

      const plot = game.seedMenuPlot;
      const crop = game.cropTypes[idx];

      plot.seeded = true;
      plot.cropType = crop;
      plot.crops.forEach(c => c.planted = true);

      game.seedMenuOpen = false;
      game.seedMenuPlot = null;

      const done = game.landPlots.filter(p => p.seeded).length;
      const total = game.landPlots.length;

      if (done < total) {
        setMessage(`你在這塊田裡種下了${crop}。播種進度：${done} / ${total}`);
      } else {
        game.allSeeded = true;
        setupScareDevices();
        moveElderTo('birdGuide');
        setDialogue('播種完成。先在田邊架好驅鳥器具，之後鳥來了就拉繩子。', 'elder');
      }

      updateUI();
    }

    function addBlock(tx, ty, tw, th, type) {
      game.blocks.push({ x: tx * TILE, y: ty * TILE, w: tw * TILE, h: th * TILE, type, tx, ty });
    }

    function removeBlockAt(tx, ty) {
      game.blocks = game.blocks.filter(b => !(b.tx === tx && b.ty === ty && b.w === TILE && b.h === TILE));
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function shrinkBlockForCollision(b) {
      if (b.type === 'tree') return { x: b.x + 2, y: b.y + 10, w: b.w - 4, h: b.h - 10 };
      if (b.type === 'house') return { x: b.x + 10, y: b.y + 18, w: b.w - 20, h: b.h - 18 };
      if (b.type === 'houseRoof') return null;
      return b;
    }

    function getStoneHouseGeometry(b) {
      const x = b.x - 26;
      const y = b.y - 42;
      const w = 10.6 * TILE;
      const h = 5.2 * TILE;

      const body = {
        x: x + 12,
        y: y + 56,
        w: w - 16,
        h: h - 20
      };

      const door = {
        x: x + 132,
        y: y + 106,
        w: 56,
        h: 92
      };

      return { x, y, w, h, body, door };
    }

    function getHouseColliders(b) {
      const g = getStoneHouseGeometry(b);
      const body = g.body;
      const door = g.door;

      // 把可通行門洞往下壓
      const doorOpeningTop = door.y + 70;

      return [
        // 門上方整片牆（往下延長到 doorOpeningTop）
        {
          x: body.x,
          y: body.y,
          w: body.w,
          h: doorOpeningTop - body.y
        },

        // 門左側牆
        {
          x: body.x,
          y: doorOpeningTop,
          w: door.x - body.x,
          h: body.y + body.h - doorOpeningTop
        },

        // 門右側牆
        {
          x: door.x + door.w,
          y: doorOpeningTop,
          w: body.x + body.w - (door.x + door.w),
          h: body.y + body.h - doorOpeningTop
        }
      ];
    }

    function collides(box) {
      if (game.inHouse || game.inGranary) {
        const roomBounds = game.inHouse
        ? { x: 80, y: 130, w: canvas.width - 160, h: canvas.height - 150 }
        : { x: 220, y: 150, w: 840, h: 430 };

        const hitRoomEdge =
          box.x < roomBounds.x ||
          box.y < roomBounds.y ||
          box.x + box.w > roomBounds.x + roomBounds.w ||
          box.y + box.h > roomBounds.y + roomBounds.h;

        if (hitRoomEdge) return true;

        if (game.inHouse) {
          for (const npc of game.interiorNPCs) {
            const hitbox = getNPCCollider(npc);
            if (rectsOverlap(box, hitbox)) return true;
          }
        }

        return false;
      }

      // 室外 NPC 防撞
      const elderHitbox = getNPCCollider(game.elder);
      if (rectsOverlap(box, elderHitbox)) return true;

      const granaryGeo = getGranaryGeometry();

      for (const c of granaryGeo.colliders) {
        if (rectsOverlap(box, c)) {
          return true;
        }
      }

      for (const b of game.blocks) {
        if (b.type === 'house') {
          const colliders = getHouseColliders(b);
          for (const c of colliders) {
            if (rectsOverlap(box, c)) return true;
          }
          continue;
        }

        const hitbox = shrinkBlockForCollision(b);
        if (hitbox && rectsOverlap(box, hitbox)) return true;
      }

      return false;
    }

    function updateCamera() {
      if (game.inHouse || game.inGranary) return;

      const worldW = WORLD.w * TILE;
      const worldH = WORLD.h * TILE;
      const playerCenterX = game.player.x + game.player.w / 2;
      const playerCenterY = game.player.y + game.player.h / 2;

      const tx = playerCenterX - canvas.width / 2;
      const ty = playerCenterY - canvas.height / 2;

      game.camera.x = clamp(tx, 0, Math.max(0, worldW - canvas.width));
      game.camera.y = clamp(ty, 0, Math.max(0, worldH - canvas.height));
    }

    function movePlayer() {
      const p = game.player;
      let dx = 0, dy = 0;

      if (keys['ArrowLeft'] || keys['a'])  { dx -= 1; p.dir = 'left'; }
      if (keys['ArrowRight'] || keys['d']) { dx += 1; p.dir = 'right'; }
      if (keys['ArrowUp'] || keys['w'])    { dy -= 1; p.dir = 'up'; }
      if (keys['ArrowDown'] || keys['s'])  { dy += 1; p.dir = 'down'; }

      if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        dx = (dx / len) * p.speed;
        dy = (dy / len) * p.speed;
      }

      let slopeDy = 0;
      if (!game.inHouse && !game.inGranary) {
        const influence = getSlopeInfluence(p.x + p.w / 2, p.y + p.h / 2);
        if (influence > 0 && Math.abs(dx) > 0.01) {
          slopeDy = -dx * 0.12 * influence;
        }
      }

      const nextX = { x: p.x + dx, y: p.y, w: p.w, h: p.h };
      if (!collides(nextX)) p.x += dx;

      const nextY = { x: p.x, y: p.y + dy + slopeDy, w: p.w, h: p.h };
      if (!collides(nextY)) p.y += dy + slopeDy;
    }

    function getNPCCollider(npc) {
      return {
        x: npc.x + 1,
        y: npc.y + 2,
        w: npc.w - 2,
        h: npc.h - 2
      };
    }

    function isNear(a, b, d = 36) {
      const ax = a.x + a.w / 2;
      const ay = a.y + a.h / 2;
      const bx = b.x + b.w / 2;
      const by = b.y + b.h / 2;
      return Math.hypot(ax - bx, ay - by) <= d;
    }

    function setDialogue(text, speaker = 'system', title = null) {
      game.message = text;
      game.currentSpeaker = speaker;
      game.isTalking = true;

      const titleMap = {
        system: '魯凱族山田燒墾',
        elder: '長老',
        indoorMale: '屋內男族人',
        indoorFemale: '屋內女族人',
        player: game.playerName || '你'
      };

      game.currentTitle = title || titleMap[speaker] || '魯凱族山田燒墾';
      refreshDialogueUI();
    }

    function drawDialoguePortrait(speaker) {
      portraitCtx.clearRect(0, 0, portraitCanvas.width, portraitCanvas.height);
      if (!speaker) return;

      const ctx = portraitCtx;
      const isElder = speaker === 'elder';
      const isIndoorMale = speaker === 'indoorMale';
      const isIndoorFemale = speaker === 'indoorFemale';

      const clothes = isElder ? '#1a1a1a' : isIndoorMale ? '#3f2a1d' : '#7b2948';
      const skin = '#d0b98c';

      // 背景光暈
      ctx.fillStyle = 'rgba(255, 222, 150, 0.12)';
      ctx.beginPath();
      ctx.arc(92, 84, 62, 0, Math.PI * 2);
      ctx.fill();

      // 頭髮後輪廓
      ctx.fillStyle = '#1c1713';
      ctx.fillRect(56, 38, 66, 74);

      // 臉
      ctx.fillStyle = skin;
      ctx.fillRect(66, 42, 46, 44);

      // 頭髮瀏海
      ctx.fillStyle = '#16120f';
      ctx.fillRect(62, 34, 54, 18);
      ctx.fillRect(60, 44, 10, 16);
      ctx.fillRect(108, 44, 8, 14);

      // 眼睛
      ctx.fillStyle = '#fff8ea';
      ctx.fillRect(76, 58, 6, 4);
      ctx.fillRect(96, 58, 6, 4);

      // 眼珠
      ctx.fillStyle = '#2d241d';
      ctx.fillRect(78, 59, 2, 2);
      ctx.fillRect(98, 59, 2, 2);

      // 鼻口
      ctx.fillStyle = '#8b6a57';
      ctx.fillRect(88, 65, 3, 6);
      ctx.fillStyle = '#6b4434';
      ctx.fillRect(84, 74, 10, 3);

      // 頸部
      ctx.fillStyle = skin;
      ctx.fillRect(80, 86, 16, 12);

      // 上半身衣服
      ctx.fillStyle = clothes;
      ctx.fillRect(50, 98, 78, 58);

      // 肩膀
      ctx.fillRect(42, 108, 20, 26);
      ctx.fillRect(116, 108, 20, 26);

      // 傳統紋樣
      ctx.fillStyle = '#efe8d4';
      ctx.fillRect(84, 100, 8, 50);
      ctx.fillRect(69, 118, 6, 18);
      ctx.fillRect(101, 118, 6, 18);

      if (isElder) {
        // 長老較沉穩的披飾
        ctx.fillStyle = '#c2b18b';
        ctx.fillRect(63, 108, 50, 6);
        ctx.fillRect(72, 114, 8, 18);
        ctx.fillRect(97, 114, 8, 18);
      } else {
        // 屋內長者略溫暖的裝飾
        ctx.fillStyle = '#d6c3a1';
        ctx.fillRect(68, 108, 40, 5);
        ctx.fillRect(76, 114, 6, 16);
        ctx.fillRect(94, 114, 6, 16);
      }

      // 外框
      ctx.strokeStyle = '#e6c98a';
      ctx.lineWidth = 3;
      ctx.strokeRect(18, 18, 144, 144);
    }

    function syncDialogueBox() {
      const shouldShow = game.started && !!game.message;
      dialogueEl.classList.toggle('active', shouldShow);
      dialogueEl.classList.toggle('talking', shouldShow && game.isTalking);

      const showPortrait =
        shouldShow &&
        game.isTalking &&
        (
          game.currentSpeaker === 'elder' ||
          game.currentSpeaker === 'indoorMale' ||
          game.currentSpeaker === 'indoorFemale'
        );

      dialogueEl.classList.toggle('show-portrait', showPortrait);
      drawDialoguePortrait(showPortrait ? game.currentSpeaker : null);
    }

    function refreshDialogueUI() {
      dialogueTitle.textContent = game.currentTitle;
      dialogueText.textContent = game.message;
      syncDialogueBox();
    }

    function setMessage(text, title = '魯凱族山田燒墾') {
      stopIndoorSong();
      game.message = text;
      game.currentSpeaker = 'system';
      game.currentTitle = title;
      game.isTalking = false;
      refreshDialogueUI();
    }

    function stopIndoorSong() {
      maleSong.pause();
      femaleSong.pause();

      maleSong.currentTime = 0;
      femaleSong.currentTime = 0;

      game.currentIndoorAudio = null;
    }

    function playIndoorSong(type) {
      stopIndoorSong();

      let target = null;
      if (type === 'male') target = maleSong;
      if (type === 'female') target = femaleSong;
      if (!target) return;

      target.play().catch(err => {
        console.warn('音樂播放失敗：', err);
      });

      game.currentIndoorAudio = target;
    }

    function handleInteract() {
      const pressed = keys[' '];
      if (!pressed || !canPressInteract) return;
      canPressInteract = false;
      const player = game.player;

      if (!game.inHouse && isNear(player, game.houseDoorZone, 44)) {
        game.inHouse = true;
        game.player.x = 14.8 * TILE;
        game.player.y = 14.2 * TILE;
        game.player.dir = 'up';
        setMessage('你走進石板屋。屋內擺著陶壺、木雕與日常器物。靠近門口再按空白鍵可離開。');
        updateUI();
        return;
      }

      if (!game.inHouse && !game.inGranary && isNear(player, game.granaryDoorZone, 58)) {
        game.inGranary = true;
        game.player.x = 19.2 * TILE;
        game.player.y = 16.8 * TILE;
        game.player.dir = 'up';
        setMessage('你走進糧倉。裡面堆放著小米束、木架與陶器，空氣中有乾燥穀物的氣味。');
        updateUI();
        return;
      }

      if (game.inGranary && isNear(player, game.granaryExitZone, 46)) {
        game.inGranary = false;
        game.player.x = 16.9 * TILE;
        game.player.y = 20.4 * TILE;
        game.player.dir = 'down';
        updateCamera();
        setMessage('你走出糧倉，回到部落前方空地。');
        updateUI();
        return;
      }

      if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
        game.inHouse = false;
        game.player.x = 7.2 * TILE;
        game.player.y = 19.2 * TILE;
        game.player.dir = 'down';
        updateCamera();
        setMessage('你走出石板屋，回到部落前方空地。');
        updateUI();
        return;
      }

      if (game.inHouse) {
        const indoorNpc = game.interiorNPCs.find(npc => isNear(player, npc, 50));
        if (indoorNpc) {
          if (indoorNpc.id === 'indoorMale') {
            setDialogue(indoorNpc.songText, 'indoorMale');
            playIndoorSong('male');
          } else {
            setDialogue(indoorNpc.songText, 'indoorFemale');
            playIndoorSong('female');
          }
          return;
        }
      }

      if (!game.blessingDone && isNear(player, game.elder, 56)) {
        game.blessingStep++;
        if (game.blessingStep === 1) setDialogue('這塊田地還不能動手。先向祖靈祈福，再開始整理吧。', 'elder');
        else if (game.blessingStep === 2) setDialogue('你與長老低聲祈禱，向土地、山林與祖靈表達敬意。', 'elder');
        else {
          game.blessingDone = true;
          moveElderTo('brushGuide');
          setDialogue('祈福完成。現在可以整理這塊田地，把雜草和小樹集中堆到右下角。', 'elder');
        }
        updateUI();
        return;
      }

      if (!game.inHouse && game.blessingDone && isNear(player, game.elder, 56)) {
        if (!game.allCleared) {
          setDialogue('先把田地整理好，把草木集中到右下角。', 'elder');
        } else if (!game.burningTriggered && !game.ashReady && !game.landReady) {
          setDialogue('草木都堆好了，去堆置區準備點火。', 'elder');
        } else if (!game.landReady) {
          setDialogue('先等火勢退去，不要急著走進田裡。', 'elder');
        } else if (!game.stoneWallBuilt) {
          setDialogue('沿著田邊把石頭堆穩，先把擋土牆做好。', 'elder');
        } else if (!game.allSeeded) {
          setDialogue('石牆穩了，接下來可以選擇作物播種進土地裡。', 'elder');
        } else if (!game.scareReady) {
          setDialogue('先把田邊的驅鳥器具架好。', 'elder');
        } else if (!game.birdPhaseDone) {
          setDialogue('聽到鳥靠近，就去拉繩子把牠們驚走。', 'elder');
        } else if (!game.allMature) {
          setDialogue('田裡的作物還在長，先讓它慢慢成熟。', 'elder');
        } else if (!game.allHarvested) {
          setDialogue('作物已經熟了，去田裡採收吧。', 'elder');
        } else if (!game.allStored) {
          setDialogue('把採下來的作物背回穀倉，曬過、收好，才算真正完成。', 'elder');
        } else {
          setDialogue('今年的作物已經採收入倉，可以準備迎接收穫之後的分享與祭儀了。', 'elder');
        }
        updateUI();
        return;
      }

      if (!game.inHouse && game.blessingDone && !game.carrying) {
        const weed = game.weeds.find(w => !w.cleared && isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34));
        if (weed) {
          weed.cleared = true;
          game.carrying = true;

          if (weed.kind === 'wildflower') {
            setMessage('你在草叢裡發現一小束野花。你小心把它放到一旁，再把雜草帶去堆置區。');
          } else if (weed.kind === 'stone') {
            setMessage('草叢下露出一塊特別的石片，像是舊田地留下的痕跡。你記住了這個地方，再把草木搬去堆置區。');
          } else if (weed.kind === 'nest') {
            setMessage('你差點碰到一個小鳥巢，趕緊避開，把旁邊的雜草整理好後帶去堆置區。');
          } else {
            setMessage('你砍下並整理了一份雜草／矮樹。把它帶到堆置區。');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.carrying && isNear(player, game.stackZone, 58)) {
        game.carrying = false;

        const depositedNow = game.weeds.filter(w => w.cleared).length;
        const totalNow = game.weeds.length;

        if (depositedNow === Math.ceil(totalNow / 3)) {
          setMessage('你把第一批草木堆好，田地開始露出原本的輪廓。');
        } else if (depositedNow === Math.ceil(totalNow * 2 / 3)) {
          setMessage('整理進度過半，田地看起來清爽多了。');
        } else {
          setMessage('你把整理好的草木堆放在指定地點。');
        }

        if (game.weeds.every(w => w.cleared)) {
          game.allCleared = true;
          moveElderTo('burnWatch');
          setDialogue('草木都集中好了。我先去上面看防火道，你到堆置區準備點火。', 'elder');
        }

        updateUI();
        return;
      }

      if (!game.inHouse && game.allCleared && !game.carrying && isNear(player, game.stackZone, 58) && !game.burningTriggered && !game.ashReady) {
        game.burningTriggered = true;
        setMessage('你點燃堆置的草木，火勢受控地燃起。長老正在上方看著火路。');
        updateUI();
      }

      if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
        const stack = game.stoneStacks.find(s => !s.done && isNear(player, s, 44));
        if (stack) {
          stack.done = true;

          const done = game.stoneStacks.filter(s => s.done).length;
          const total = game.stoneStacks.length;

          if (done < total) {
            setMessage(`你把清理出的石頭沿田邊堆疊，作為簡易石牆來保持水土。石牆進度：${done} / ${total}`);
          } else {
            game.stoneWallBuilt = true;
            game.landPrepared = true;
            game.landPlots.forEach(p => p.prepared = true);
            moveElderTo('sowGuide');
            setDialogue('清理出來的石頭已經沿田邊堆好，能幫助保持水土。現在可以開始播種。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.landPrepared && !game.allSeeded && !game.seedMenuOpen) {
        const plot = game.landPlots.find(p => p.prepared && !p.seeded && isNear(player, p, 44));
        if (plot) {
          openSeedMenu(plot);
          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.allSeeded && !game.scareReady) {
        const device = game.scareDevices.find(d => !d.placed && isNear(player, d, 42));
        if (device) {
          device.placed = true;

          const done = game.scareDevices.filter(d => d.placed).length;
          const total = game.scareDevices.length;

          if (done < total) {
            setMessage(`你架好了其中一組驅鳥器具。設置進度：${done} / ${total}`);
          } else {
            game.scareReady = true;
            moveElderTo('rest');
            setDialogue('驅鳥器具都好了。我在外頭看著，你聽到鳥靠近就去拉繩。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
        const rope = game.scareDevices.find(
          d => d.placed && isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42)
        );

        if (rope) {
          const activeBirds = game.birds.filter(b => !b.scared);

          if (activeBirds.length === 0) {
            setMessage('你拉了繩子，鋁罐發出聲響，但現在還沒有鳥靠近農田。');
            updateUI();
            return;
          }

          for (const bird of activeBirds) {
            bird.scared = true;
          }

          game.scareCount++;

          if (game.scareCount < 5) {
            setMessage(`你拉動繩子，鋁罐發出聲響，鳥群被驚走了！驅鳥進度：${game.scareCount} / 5`);
          } else {
            game.birdPhaseDone = true;
            game.birds = [];
            moveElderTo('rest');
            setDialogue('做得好，你把田地顧住了。今天先到這裡。', 'elder');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.allMature && !game.carryingHarvest) {
        const plot = game.landPlots.find(
          p => p.mature && !p.harvested && isNear(player, p, 44)
        );

        if (plot) {
          plot.harvested = true;
          plot.mature = false;
          game.carryingHarvest = true;
          game.harvestCount++;

          if (game.harvestCount < game.harvestTarget) {
            setMessage(`你採收了一份成熟的${plot.cropType}。先背回穀倉，再回來繼續採收。`);
          } else {
            game.allHarvested = true;
            setMessage('最後一塊成熟作物也採收完成了。把這一批背回穀倉吧。');
          }

          updateUI();
          return;
        }
      }

      if (!game.inHouse && game.carryingHarvest && isNear(player, game.storageZone, 54)) {
        game.carryingHarvest = false;
        game.storedBundles++;

        if (game.storedBundles < game.harvestTarget) {
          setMessage(`你把收成放進穀倉。入倉進度：${game.storedBundles} / ${game.harvestTarget}`);
        } else {
          game.allStored = true;
          moveElderTo('storageGuide');
          setDialogue('作物都已經入倉了。今年的田地總算有了收成。', 'elder');
        }

        updateUI();
        return;
      }
    }

    function updateCropGrowth() {
      if (!game.birdPhaseDone || game.allMature) return;

      if (!game.growthStarted) {
        game.growthStarted = true;
        game.growthProgress = 0;
        game.growthStage = 0;
        moveElderTo('rest');
        setDialogue('鳥群退去後，就等作物慢慢長成。這段時間要常來看田。', 'elder');
        updateUI();
        return;
      }

      game.growthProgress = Math.min(1, game.growthProgress + 0.0007);

      let stage = 0;
      if (game.growthProgress >= 0.25) stage = 1;
      if (game.growthProgress >= 0.55) stage = 2;
      if (game.growthProgress >= 0.9)  stage = 3;

      if (stage !== game.growthStage) {
        game.growthStage = stage;
        game.landPlots.forEach(p => {
          if (p.seeded && !p.harvested) p.growth = stage;
        });

        if (stage === 1) {
          setMessage('田裡冒出了幼苗。');
        } else if (stage === 2) {
          setMessage('作物慢慢長高了，田地開始變得茂密。');
        } else if (stage === 3) {
          game.allMature = true;
          game.landPlots.forEach(p => {
            if (p.seeded && !p.harvested) p.mature = true;
          });
          game.harvestTarget = game.landPlots.filter(p => p.mature).length;
          moveElderTo('storageGuide');
          setDialogue('田裡的作物已經成熟，可以開始採收。採下來後背回穀倉。', 'elder');
        }

        updateUI();
      }
    }

    function updateBurning() {
      if (!game.burningTriggered) return;

      game.burningProgress = Math.min(1, game.burningProgress + 0.0015);

      if (game.burningProgress >= 1 && !game.landReady) {
        game.burningTriggered = false;  // 火熄掉
        game.ashReady = true;           // 改成灰燼狀態
        game.landReady = true;
        setupLandPlots();
        moveElderTo('stoneGuide');
        setDialogue('火勢退去後，地上留下灰燼。把清理出的石頭沿田邊堆穩，做好保持水土的石牆。', 'elder');
        updateUI();
      }
    }

    function spawnBird() {
      const seededPlots = game.landPlots.filter(p => p.seeded);
      if (seededPlots.length === 0) return;

      const plot = seededPlots[Math.floor(Math.random() * seededPlots.length)];

      game.birds.push({
        x: plot.x + plot.w / 2 - 6,
        y: plot.y - 20,
        w: 12,
        h: 8,
        target: plot,
        scared: false,
        vy: 0.25
      });
    }

    function setupScareDevices() {
      game.scareDevices = [
        { x: 40.5 * TILE, y: 9.5 * TILE,  w: 18, h: 36, placed: false, ropeX: 42.2 * TILE, ropeY: 11.3 * TILE },
        { x: 50.8 * TILE, y: 9.7 * TILE,  w: 18, h: 36, placed: false, ropeX: 48.8 * TILE, ropeY: 11.5 * TILE },

        { x: 40.8 * TILE, y: 17.2 * TILE, w: 18, h: 36, placed: false, ropeX: 42.5 * TILE, ropeY: 18.8 * TILE },
        { x: 49.8 * TILE, y: 17.0 * TILE, w: 18, h: 36, placed: false, ropeX: 47.8 * TILE, ropeY: 18.7 * TILE }
      ];
    }

    function updateBirds() {
      if (!game.allSeeded || !game.scareReady || game.birdPhaseDone) return;

      game.birdTimer++;
      if (game.birdTimer >= 600 && game.birds.length < 3) {
        spawnBird();
        game.birdTimer = 0;
      }

      for (const bird of game.birds) {
        if (bird.scared) {
          bird.y -= 2.2;
          bird.x += 1.2;
          continue;
        }

        const targetY = bird.target.y + 10;
        if (bird.y < targetY) {
          bird.y += bird.vy;
        }
      }

      game.birds = game.birds.filter(b => b.y > -40 && b.x < WORLD.w * TILE + 40);
    }

    function drawBirds() {
      for (const b of game.birds) {
        if (b.scared) continue;

        ctx.fillStyle = '#2b2b2b';
        ctx.fillRect(b.x, b.y, 12, 8);

        ctx.fillRect(b.x - 4, b.y + 2, 5, 2);
        ctx.fillRect(b.x + 11, b.y + 2, 5, 2);

        ctx.fillStyle = '#4a4a4a';
        ctx.fillRect(b.x + 2, b.y - 2, 4, 2);
      }
    }

    function drawScareDevices() {
      for (const d of game.scareDevices) {
        // 竹竿
        if (d.placed) {
          ctx.fillStyle = '#7a5b2b';
          ctx.fillRect(d.x, d.y, 4, 36);
        } else {
          ctx.fillStyle = 'rgba(255, 236, 170, 0.65)';
          ctx.fillRect(d.x - 4, d.y + 28, 12, 6);
        }

        if (d.placed) {
          // 鋁罐
          ctx.fillStyle = '#c8c8c8';
          ctx.fillRect(d.x + 4, d.y + 6, 10, 8);
          ctx.fillRect(d.x + 6, d.y + 16, 10, 8);
          ctx.fillRect(d.x + 4, d.y + 26, 10, 8);

          // 繩子
          ctx.strokeStyle = '#d8c28a';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(d.x + 2, d.y + 8);
          ctx.lineTo(d.ropeX, d.ropeY);
          ctx.stroke();

          // 拉繩點
          ctx.fillStyle = '#f2e2a8';
          ctx.fillRect(d.ropeX - 5, d.ropeY - 5, 10, 10);
        }
      }
    }

    function drawTaskGlow(box, color = 'rgba(255, 245, 200, 0.18)', pad = 10) {
      const x = box.x - pad;
      const y = box.y - pad;
      const w = box.w + pad * 2;
      const h = box.h + pad * 2;
      const cx = x + w / 2;
      const cy = y + h / 2;
      const r = Math.max(w, h) * 0.75;

      ctx.save();

      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, color);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

      ctx.strokeStyle = 'rgba(255, 245, 215, 0.45)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, w, h);

      ctx.restore();
    }

    function drawPendingTaskGlows() {
      if (game.inHouse) return;

      // 祈福：長老
      if (!game.blessingDone) {
        drawTaskGlow(game.elder, 'rgba(255, 245, 200, 0.18)', 12);
        return;
      }

      // 整理草木
      if (!game.allCleared) {
        if (game.carrying) {
          drawTaskGlow(game.stackZone, 'rgba(255, 230, 180, 0.20)', 12);
        } else {
          for (const w of game.weeds) {
            if (!w.cleared) {
              drawTaskGlow({ x: w.x, y: w.y, w: w.w, h: w.h }, 'rgba(230, 255, 210, 0.14)', 8);
            }
          }
        }
        return;
      }

      // 點火
      if (!game.burningTriggered && !game.ashReady && !game.landReady) {
        drawTaskGlow(game.stackZone, 'rgba(255, 210, 150, 0.22)', 14);
        return;
      }

      // 等待火勢退去
      if (!game.landReady) {
        drawTaskGlow(game.stackZone, 'rgba(255, 185, 120, 0.16)', 16);
        return;
      }

      // 堆石牆：全部未完成石堆一起亮
      if (!game.stoneWallBuilt) {
        for (const s of game.stoneStacks) {
          if (!s.done) {
            drawTaskGlow(s, 'rgba(220, 235, 255, 0.16)', 8);
          }
        }
        return;
      }

      // 播種：全部未播種區塊一起亮
      if (!game.allSeeded) {
        for (const p of game.landPlots) {
          if (p.prepared && !p.seeded) {
            drawTaskGlow(p, 'rgba(255, 245, 175, 0.16)', 8);
          }
        }
        return;
      }

      // 架設驅鳥器具：全部未放置器具一起亮
      if (!game.scareReady) {
        for (const d of game.scareDevices) {
          if (!d.placed) {
            drawTaskGlow(d, 'rgba(235, 245, 255, 0.18)', 10);
          }
        }
        return;
      }

      // 驅鳥：全部拉繩點一起亮
      if (!game.birdPhaseDone) {
        for (const d of game.scareDevices) {
          if (d.placed) {
            drawTaskGlow({ x: d.ropeX - 6, y: d.ropeY - 6, w: 12, h: 12 }, 'rgba(255, 250, 210, 0.18)', 8);
          }
        }
      }

      if (!game.allMature) {
        for (const p of game.landPlots) {
          if (p.seeded && !p.harvested) {
            drawTaskGlow(p, 'rgba(210, 255, 190, 0.12)', 8);
          }
        }
        return;
      }

      if (!game.allHarvested) {
        for (const p of game.landPlots) {
          if (p.mature && !p.harvested) {
            drawTaskGlow(p, 'rgba(255, 235, 160, 0.18)', 8);
          }
        }
        return;
      }

      if (!game.allStored) {
        drawTaskGlow(game.storageZone, 'rgba(235, 245, 255, 0.20)', 12);
        return;
      }
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawInteractOutline(box, radius = 6) {
      const pad = 6;
      const x = box.x - pad;
      const y = box.y - pad;
      const w = box.w + pad * 2;
      const h = box.h + pad * 2;

      ctx.save();

      ctx.strokeStyle = 'rgba(255,255,255,0.24)';
      ctx.lineWidth = 8;
      roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,245,210,0.95)';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();

      ctx.restore();
    }

    function drawInteractionHints() {
      const player = game.player;

      if (!game.inHouse && isNear(player, game.houseDoorZone, 44)) {
        drawInteractOutline(game.houseDoorZone);
      }

      if (game.inGranary && isNear(player, game.granaryExitZone, 46)) {
        drawInteractOutline(game.granaryExitZone);
      }

      if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
        drawInteractOutline(game.houseExitZone);
      }

      if (game.inHouse) {
        for (const npc of game.interiorNPCs) {
          if (isNear(player, npc, 50)) {
            drawInteractOutline(npc);
          }
        }
      }

      if (!game.inHouse && isNear(player, game.elder, 56)) {
        drawInteractOutline(game.elder);
      }

      if (!game.inHouse && game.blessingDone && !game.carrying) {
        const weed = game.weeds.find(
          w => !w.cleared && isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34)
        );
        if (weed) {
          drawInteractOutline({ x: weed.x, y: weed.y, w: weed.w, h: weed.h });
        }
      }

      if (!game.inHouse && game.carrying && isNear(player, game.stackZone, 58)) {
        drawInteractOutline(game.stackZone);
      }

      if (!game.inHouse && game.allCleared && !game.carrying && isNear(player, game.stackZone, 58) && !game.burningTriggered && !game.ashReady) {
        drawInteractOutline(game.stackZone);
      }

      if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
        const stack = game.stoneStacks.find(s => !s.done && isNear(player, s, 44));
        if (stack) {
          drawInteractOutline(stack);
        }
      }

      if (!game.inHouse && game.landPrepared && !game.allSeeded) {
        const plot = game.landPlots.find(p => p.prepared && !p.seeded && isNear(player, p, 44));
        if (plot) {
          drawInteractOutline(plot);
        }
      }

      if (!game.inHouse && game.allSeeded && !game.scareReady) {
        const device = game.scareDevices.find(d => !d.placed && isNear(player, d, 42));
        if (device) {
          drawInteractOutline(device);
        }
      }

      if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
        const rope = game.scareDevices.find(
          d => d.placed && isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42)
        );
        if (rope) {
          drawInteractOutline({ x: rope.ropeX, y: rope.ropeY, w: 18, h: 18 }, 4);
        }
      }

      if (!game.inHouse && game.allMature && !game.carryingHarvest) {
        const plot = game.landPlots.find(p => p.mature && !p.harvested && isNear(player, p, 44));
        if (plot) {
          drawInteractOutline(plot);
        }
      }

      if (!game.inHouse && game.carryingHarvest && isNear(player, game.storageZone, 54)) {
        drawInteractOutline(game.storageZone);
      }
    }

    function drawGranaryInteriorScene() {
      // 牆面背景
      ctx.fillStyle = '#3f2e1c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 內部主空間（縮小視覺範圍）

      ctx.fillRect(room.x + 250, room.y + 110, 12, 170);

      ctx.fillRect(room.x + 250, room.y + 110, 262, 12);

      ctx.fillStyle = '#7f5738';
      ctx.beginPath();
      ctx.arc(room.x + 480, room.y + 98, 13, 0, Math.PI * 2);

    function drawGranaryExitMarker() {
      const z = game.granaryExitZone;
      ctx.strokeStyle = 'rgba(255,245,210,0.9)';

    function updateUI() {
      const total = game.weeds.length;
      const deposited = game.weeds.filter(w => w.cleared).length - (game.carrying ? 1 : 0);

      if (game.inHouse) {
        missionEl.textContent = '探索石板屋，靠近門口按空白鍵可離開';
      } else if (game.inGranary) {
        missionEl.textContent = '探索糧倉，靠近門口按空白鍵可離開';
      } else if (!game.blessingDone) {
        missionEl.textContent = '任務：到農田與長老對話，完成祈福';
      } else if (!game.allCleared) {
        missionEl.textContent = game.carrying ? '任務：把草木搬到右下角堆置區' : '任務：繼續整理荒田';
      } else if (!game.burningTriggered && !game.ashReady && !game.landReady) {
        missionEl.textContent = '任務：前往堆置區，觸發燃燒';
      } else if (!game.landReady) {
        missionEl.textContent = '任務：等待火勢退去';
      } else if (!game.stoneWallBuilt) {
        missionEl.textContent = '任務：堆疊石頭，完成田邊擋土牆';
      } else if (!game.allSeeded) {
        missionEl.textContent = '任務：在農田播種作物（小米、花生、芋頭、地瓜）';
      } else if (!game.scareReady) {
        missionEl.textContent = '任務：在田邊架設驅鳥器具';
      } else if (!game.birdPhaseDone) {
        missionEl.textContent = `任務：拉動繩索驅鳥（${game.scareCount} / 5）`;
      } else if (!game.allMature) {
        missionEl.textContent = '任務：等待作物長大成熟';
      } else if (!game.allHarvested) {
        missionEl.textContent = `任務：採收成熟作物（${game.harvestCount} / ${game.harvestTarget}）`;
      } else if (!game.allStored) {
        missionEl.textContent = `把收成送到房子旁的穀倉（${game.storedBundles} / ${game.harvestTarget}）`;
      } else {
        missionEl.textContent = '任務完成：你完成了生長、採收與入倉';
      }

      const preparedCount = game.landPlots.filter(p => p.prepared).length;
      const preparedTotal = game.landPlots.length;
      const seededCount = game.landPlots.filter(p => p.seeded).length;
      const seededTotal = game.landPlots.length;

      let sceneName = '戶外';
      if (game.inHouse) sceneName = '石板屋內';
      if (game.inGranary) sceneName = '糧倉內';

      let statusText = `場景：${sceneName}`;

      if (game.inHouse) {
        statusText += '｜探索中';
      } else if (!game.blessingDone) {
        statusText += `｜祈福：${Math.min(game.blessingStep, 3)} / 3`;
      } else if (!game.allCleared) {
        statusText += `｜整理：${Math.max(deposited, 0)} / ${total}`;
        if (game.carrying) statusText += '｜搬運中';
      } else if (!game.burningTriggered && !game.ashReady && !game.landReady) {
        statusText += '｜前往堆置區點火';
      } else if (!game.landReady) {
        statusText += '｜燃燒中';
      } else if (!game.stoneWallBuilt) {
        statusText += `｜石牆：${game.stoneStacks.filter(s => s.done).length} / ${game.stoneStacks.length}`;

        statusText += `｜器具：${game.scareDevices.filter(d => d.placed).length} / ${game.scareDevices.length}`;

        statusText += `｜驅鳥：${game.scareCount} / 5`;

        statusText += `｜生長：${game.growthStage} / 3`;

        statusText += `｜採收：${game.harvestCount} / ${game.harvestTarget}`;

      } else if (!game.allStored) {
        statusText += `｜入倉：${game.storedBundles} / ${game.harvestTarget}`;
        if (game.carryingHarvest) statusText += '｜搬運中';
      } else {
        statusText += '｜全部完成';
      }

      statusEl.textContent = statusText;
      refreshDialogueUI();
    }

    function loop() {
      if (game.started) {
        movePlayer();
        if (game.inHouse && game.currentIndoorAudio) {
          let activeNpc = null;

          if (game.currentSpeaker === 'indoorMale') {
            activeNpc = game.interiorNPCs.find(n => n.id === 'indoorMale');
          } else if (game.currentSpeaker === 'indoorFemale') {
            activeNpc = game.interiorNPCs.find(n => n.id === 'indoorFemale');
          }

          if (!activeNpc || !isNear(game.player, activeNpc, 72)) {
            setMessage('歌聲慢慢停了下來。');
          }
        }
        handleInteract();
        updateSeedMenuState();
        updateBurning();
        updateBirds();
        updateCropGrowth();
        updateCamera();
      }
      render();
      requestAnimationFrame(loop);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!game.started) {
        drawStartScreen();
        return;
      }

      if (game.inHouse) {
        drawInteriorScene();

        for (const npc of game.interiorNPCs) {
          if (npc.gender === 'male') {
            drawNPC(npc, '#3f2a1d', '#d0b98c');
          } else {
            drawNPC(npc, '#7b2948', '#d0b98c');
          }
        }

        drawHouseExitMarker();
        drawInteractionHints();
        drawPlayer();

      } else if (game.inGranary) {
        drawGranaryInteriorScene();
        if (isNear(game.player, game.granaryExitZone, 46)) {
          drawInteractOutline(game.granaryExitZone);
        }
        drawPlayer();

      } else {
        ctx.save();
        ctx.translate(-game.camera.x, -game.camera.y);

        drawGround();
        drawRoad();
        drawHouseArea();
        drawField();
        drawSlopeAccents();
        drawLandPlots();
        drawScareDevices();
        drawBirds();
        drawBlocks();
        drawGranary();
        drawWeeds();
        drawStackZone();

        drawPendingTaskGlows();

        drawNPC(game.elder, '#1a1a1a', '#d0b98c');

        if (!game.blessingDone) {
          drawQuestIcon(game.elder, '!');
        } else if (game.birdPhaseDone) {
          drawQuestIcon(game.elder, '?');
        }

        drawInteractionHints();

        drawDoorPrompt();
        drawGranaryDoorPrompt();
        drawPlayer();
        if (game.carrying) drawCarryIcon();

        ctx.restore();

        if (game.seedMenuOpen) {
          drawSeedMenu();
        }
      }
    }

    function drawSeedMenu() {
      const box = { x: canvas.width / 2 - 230, y: canvas.height / 2 - 105, w: 460, h: 210 };
      ctx.save();
      ctx.fillStyle = 'rgba(35, 24, 12, 0.94)';
      ctx.fillRect(box.x, box.y, box.w, box.h);
      ctx.strokeStyle = '#e6c98a';
      ctx.lineWidth = 4;
      ctx.strokeRect(box.x, box.y, box.w, box.h);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = '#fff7de';
      ctx.font = 'bold 26px Noto Sans TC, Microsoft JhengHei, sans-serif';
      ctx.fillText('選擇要種植的作物', box.x + box.w / 2, box.y + 34);

      ctx.font = '22px Noto Sans TC, Microsoft JhengHei, sans-serif';
      ctx.fillText('1｜小米', box.x + 130, box.y + 85);
      ctx.fillText('2｜花生', box.x + 330, box.y + 85);
      ctx.fillText('3｜芋頭', box.x + 130, box.y + 128);

    function roadY(x, baseY) {
      return baseY - getSlopeOffset(x) * 0.35;
    }

    function getSlopeOffset(worldX) {
      const startX = 10 * TILE;
      const endX = 39 * TILE;
      const t = clamp((worldX - startX) / (endX - startX), 0, 1);
      const smooth = t * t * (3 - 2 * t);
      return smooth * 72;
    }

    function getSlopeLift(worldX) {
      return getSlopeOffset(worldX);
    }

    function isOnSlopeArea(x, y) {
      return (
        x >= 12 * TILE &&
        x <= 38.5 * TILE &&
        y >= 13.2 * TILE &&
        y <= 19.8 * TILE
      );
    }

    function getSlopeInfluence(x, y) {
      if (!isOnSlopeArea(x, y)) return 0;

      const left = 12 * TILE;
      const right = 38.5 * TILE;
      const top = 13.2 * TILE;
      const bottom = 19.8 * TILE;

      const tx = clamp((x - left) / (right - left), 0, 1);
      const tyTop = clamp((y - top) / (2.2 * TILE), 0, 1);
      const tyBottom = clamp((bottom - y) / (2.2 * TILE), 0, 1);

      const edgeFade = Math.min(tx, tyTop, tyBottom, 1);
      return clamp(edgeFade * 1.6, 0, 1);
    }

    function drawGround() {
      for (let y = 0; y < WORLD.h; y++) {
        for (let x = 0; x < WORLD.w; x++) {
          const px = x * TILE;
          const py = y * TILE;
          const field = x >= 39 && x <= 52 && y >= 8 && y <= 21;
          const slopeLift = getSlopeLift(px + TILE / 2);

          let base = field ? '#c39a58' : '#78b24f';
          if (!field && x >= 26) base = '#72aa48';
          if (!field && x >= 36) base = '#6b9f44';

          ctx.fillStyle = base;
          ctx.fillRect(px, py, TILE, TILE);

          // 往右越高：右側稍亮、左下較深，做出緩坡感
          ctx.fillStyle = `rgba(255,255,210,${0.03 + slopeLift / 1400})`;
          ctx.fillRect(px, py, TILE, TILE * 0.48);
          ctx.fillStyle = `rgba(70,45,20,${0.02 + (44 - slopeLift) / 1800})`;
          ctx.fillRect(px, py + TILE * 0.58, TILE, TILE * 0.42);

          // 等高線感：往右逐漸出現較密的橫向草紋
          if (!field && x >= 18 && y > 4 && y < WORLD.h - 2 && (x + y) % 3 === 0) {
            ctx.fillStyle = 'rgba(255,245,200,0.06)';
            ctx.fillRect(px + 3, py + 8, TILE - 10, 2);
          }

          ctx.fillStyle = 'rgba(255,255,255,0.07)';
          if ((x + y) % 3 === 0) ctx.fillRect(px + 4, py + 4, 3, 3);
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          if ((x * 7 + y * 11) % 4 === 0) ctx.fillRect(px + 20, py + 16, 3, 3);
        }
      }

      // 左下低地的陰影感
      const lowland = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - 220);
      lowland.addColorStop(0, 'rgba(60,35,12,0.12)');
      lowland.addColorStop(1, 'rgba(60,35,12,0)');
      ctx.fillStyle = lowland;
      ctx.fillRect(0, canvas.height - 230, canvas.width, 230);

      // 右上高地的薄霧亮帶
      const upland = ctx.createLinearGradient(canvas.width * 0.55, 0, canvas.width, 0);
      upland.addColorStop(0, 'rgba(255,255,255,0)');
      upland.addColorStop(1, 'rgba(255,255,230,0.08)');
      ctx.fillStyle = upland;
      ctx.fillRect(canvas.width * 0.5, 0, canvas.width * 0.5, canvas.height * 0.7);
    }

    function drawRoad() {
      // 先算出「第三排樹叢缺口」的高度
      // 從這裡開始，後面都固定差不多這個高度，不再往上
      const flatY = roadY(33.5 * TILE, 15.2 * TILE);

      const points = [
        // 石板屋前
        { x: 8.8 * TILE,  y: roadY(8.8 * TILE, 18.2 * TILE) },
        { x: 12.0 * TILE, y: roadY(12.0 * TILE, 17.9 * TILE) },
        { x: 15.8 * TILE, y: roadY(15.8 * TILE, 17.1 * TILE) },

        // 第一列樹叢缺口
        { x: 18.5 * TILE, y: roadY(18.5 * TILE, 16.2 * TILE) },

        // 第二列樹叢缺口
        { x: 23.5 * TILE, y: roadY(23.5 * TILE, 16.0 * TILE) },
        { x: 28.5 * TILE, y: roadY(28.5 * TILE, 15.8 * TILE) },

        // 第三列樹叢缺口
        { x: 31.0 * TILE, y: roadY(31.0 * TILE, 15.5 * TILE) },
        { x: 33.5 * TILE, y: flatY },

        // 第四列樹叢缺口：不再往上
        { x: 35.5 * TILE, y: flatY },

        // 到農田前：也不再往上
        { x: 37.5 * TILE, y: flatY },

        // 農田入口：維持同高度附近
        { x: 39.6 * TILE, y: flatY }
      ];

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // 主路
      ctx.strokeStyle = '#bc8746';
      ctx.lineWidth = 60;   // 原本再加寬
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.stroke();

      // 陰影
      ctx.strokeStyle = 'rgba(90,55,24,0.16)';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y + 7);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y + 7);
      }
      ctx.stroke();

      // 高光
      ctx.strokeStyle = 'rgba(255,230,180,0.12)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y - 6);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y - 6);
      }
      ctx.stroke();

      // 石板屋門口小支路也一起加寬
      ctx.strokeStyle = '#bc8746';
      ctx.lineWidth = 24;
      ctx.beginPath();
      ctx.moveTo(8.1 * TILE, 17.2 * TILE);
      ctx.lineTo(9.4 * TILE, 17.9 * TILE);
      ctx.lineTo(10.3 * TILE, 18.0 * TILE);
      ctx.stroke();

      ctx.restore();
    }

    function drawHouseArea() {
      // 低地平台：房子所在位置較低、較平緩
      ctx.fillStyle = 'rgba(90, 70, 42, 0.18)';
      ctx.fillRect(2.8 * TILE, 16.8 * TILE, 13.8 * TILE, 4.8 * TILE);

      ctx.fillStyle = '#5e5e5e';
      for (let i = 0; i < 30; i++) {
        const row = Math.floor(i / 10);

      drawBush(5 * TILE + 6, 9 * TILE + 8, '#4a7f39');

    function drawField() {
      // 高地平台底色：田地在較高處
      ctx.fillStyle = 'rgba(95, 72, 40, 0.22)';
      ctx.fillRect(38.8 * TILE, 8.2 * TILE, 13.2 * TILE, 12.6 * TILE);

      // 平台下緣陰影，像山田抬高一階
      ctx.fillStyle = 'rgba(70, 45, 24, 0.22)';
      ctx.fillRect(39.1 * TILE, 19.9 * TILE, 11.9 * TILE, 0.3 * TILE);
      ctx.fillRect(39.0 * TILE, 19.5 * TILE, 0.28 * TILE, 0.8 * TILE);
      ctx.fillRect(50.9 * TILE, 19.3 * TILE, 0.28 * TILE, 0.9 * TILE);

      // main soil area with more organic shape
      ctx.fillStyle = '#b88745';
      ctx.fillRect(40 * TILE, 9 * TILE, 11 * TILE, 11 * TILE);

      // irregular edges to avoid boxy feel
      ctx.fillRect(39.5 * TILE, 11 * TILE, 1.5 * TILE, 7 * TILE);
      ctx.fillRect(50.5 * TILE, 10 * TILE, 1.5 * TILE, 8 * TILE);
      ctx.fillRect(42 * TILE, 19.5 * TILE, 6 * TILE, 1 * TILE);

      // 土地上半部稍亮，下半部稍深，增加坡面方向
      const fieldGrad = ctx.createLinearGradient(40 * TILE, 9 * TILE, 51 * TILE, 20 * TILE);
      fieldGrad.addColorStop(0, 'rgba(255, 228, 170, 0.12)');
      fieldGrad.addColorStop(1, 'rgba(60, 38, 20, 0.10)');
      ctx.fillStyle = fieldGrad;
      ctx.fillRect(39.5 * TILE, 9 * TILE, 12 * TILE, 11.5 * TILE);

      ctx.fillStyle = '#8f5d2f';
      for (let y = 9; y < 20; y++) {
        for (let x = 40; x < 51; x++) {
          ctx.fillRect(x * TILE + 2, y * TILE + 20, TILE - 4, 2);
        }
      }
    }


    function drawSlopeAccents() {
      ctx.strokeStyle = 'rgba(255, 244, 210, 0.10)';
      ctx.lineWidth = 2;

      for (let i = 0; i < 5; i++) {
        const y = (18.8 - i * 2.1) * TILE;
        ctx.beginPath();
        ctx.moveTo((13 + i * 2.2) * TILE, y);
        ctx.lineTo((23 + i * 4.0) * TILE, y - 0.35 * TILE);
        ctx.lineTo((35 + i * 3.0) * TILE, y - 0.65 * TILE);
        ctx.stroke();
      }
    }

    function drawLandPlots() {
      if (!game.landReady) return;

      for (const plot of game.landPlots) {
        if (!plot.prepared) {
          ctx.fillStyle = 'rgba(70, 55, 30, 0.32)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(255, 234, 170, 0.72)';
          ctx.lineWidth = 2;
          ctx.strokeRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(90, 70, 40, 0.6)';
          for (let i = 0; i < 4; i++) {
            const yy = plot.y + 8 + i * 12;
            ctx.beginPath();
            ctx.moveTo(plot.x + 6, yy);
            ctx.lineTo(plot.x + plot.w - 6, yy);
            ctx.stroke();
          }
        } else {
          ctx.fillStyle = 'rgba(150, 110, 62, 0.28)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          ctx.strokeStyle = 'rgba(120, 82, 42, 0.7)';
          ctx.lineWidth = 2;
          for (let i = 0; i < 4; i++) {
            const yy = plot.y + 8 + i * 11;
            ctx.beginPath();
            ctx.moveTo(plot.x + 6, yy);
            ctx.lineTo(plot.x + plot.w - 6, yy);
            ctx.stroke();
          }
        }

        if (plot.seeded) {
          ctx.fillStyle = 'rgba(120, 80, 40, 0.18)';
          ctx.fillRect(plot.x, plot.y, plot.w, plot.h);

          for (const c of plot.crops) {
            const px = plot.x + c.ox * TILE;
            const py = plot.y + c.oy * TILE;

            if (!plot.harvested && plot.growth === 0) {
              ctx.fillStyle = '#2e1d0f';
              ctx.fillRect(px, py, 3, 3);
            }

            if (!plot.harvested && plot.growth >= 1) {
              if (plot.cropType === '小米') {
                ctx.strokeStyle = plot.growth >= 3 ? '#9f7d2f' : '#5c9a3b';
                ctx.lineWidth = plot.growth >= 2 ? 2 : 1.5;
                ctx.beginPath();
                ctx.moveTo(px, py + 8);
                ctx.lineTo(px, py - (plot.growth === 1 ? 6 : plot.growth === 2 ? 12 : 15));
                ctx.stroke();
                if (plot.growth >= 2) {
                  ctx.fillStyle = plot.growth >= 3 ? '#d8b44b' : '#7dbd53';
                  ctx.fillRect(px - 2, py - (plot.growth === 2 ? 13 : 16), 5, plot.growth === 2 ? 6 : 8);
                }
              }

              if (plot.cropType === '花生') {
                ctx.fillStyle = plot.growth >= 3 ? '#5f9b45' : '#6dbb55';
                ctx.beginPath();
                ctx.arc(px, py, plot.growth === 1 ? 4 : plot.growth === 2 ? 6 : 7, 0, Math.PI * 2);
                ctx.fill();
                if (plot.growth >= 2) {
                  ctx.fillStyle = '#9c6b3a';
                  ctx.fillRect(px - 3, py + 4, 6, 3);
                }
              }

              if (plot.cropType === '芋頭') {
                ctx.strokeStyle = '#5e9a43';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px, py + 8);
                ctx.lineTo(px, py - (plot.growth === 1 ? 4 : plot.growth === 2 ? 8 : 10));
                ctx.stroke();
                ctx.fillStyle = plot.growth >= 3 ? '#4c8d3a' : '#67a94f';
                ctx.beginPath();
                ctx.moveTo(px, py - 8);
                ctx.lineTo(px - 7, py);
                ctx.lineTo(px, py + 1);
                ctx.lineTo(px + 7, py);
                ctx.closePath();
                ctx.fill();
              }

              if (plot.cropType === '地瓜') {
                ctx.strokeStyle = '#4f8f38';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px, py + 8);
                ctx.lineTo(px - 5, py + 1);
                ctx.moveTo(px, py + 8);
                ctx.lineTo(px + 5, py + 1);
                ctx.stroke();
                ctx.fillStyle = plot.growth >= 3 ? '#6cab4a' : '#79c257';
                ctx.fillRect(px - 4, py - 2, 8, 5);
                if (plot.growth >= 3) {
                  ctx.fillStyle = '#8d5aa8';
                  ctx.fillRect(px - 2, py + 5, 4, 3);
                }
              }
            }

            if (plot.harvested) {
              ctx.strokeStyle = '#8a6a3d';
              ctx.lineWidth = 1.2;
              ctx.beginPath();
              ctx.moveTo(px, py + 6);
              ctx.lineTo(px, py + 1);
              ctx.stroke();
            }
          }
        }
      }

      for (const s of game.stoneStacks) {
        ctx.fillStyle = s.done ? '#6c6a67' : 'rgba(120, 120, 120, 0.35)';
        ctx.fillRect(s.x, s.y, s.w, s.h);

        ctx.strokeStyle = s.done ? '#3f3d3a' : 'rgba(255, 240, 200, 0.55)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(s.x, s.y, s.w, s.h);

        const horizontal = s.w > s.h;
        ctx.fillStyle = s.done ? '#8c8a86' : '#9d9a95';

        if (horizontal) {
          for (let i = 0; i < 4; i++) {
            ctx.fillRect(s.x + 4 + i * (s.w / 4), s.y + 2 + (i % 2) * 2, 12, s.h - 4);
          }
        } else {
          for (let i = 0; i < 4; i++) {
            ctx.fillRect(s.x + 2 + (i % 2) * 2, s.y + 4 + i * (s.h / 4), s.w - 4, 10);
          }
        }
      }
    }

    function drawBlocks() {
      for (const b of game.blocks) {
        if (b.type === 'tree') drawTree(b.x, b.y, b.w, b.h);
        else if (b.type === 'house' || b.type === 'houseRoof') drawStoneHouse(b);
        else if (b.type === 'fence') drawFence(b.x, b.y, b.w, b.h);
        else if (b.type === 'post') drawPost(b.x, b.y, b.w, b.h);
        else if (b.type === 'totem') drawTotem(b.x, b.y, b.w, b.h);
      }
    }

    function drawStoneHouse(b) {
      if (b.type !== 'house') return;

      const g = getStoneHouseGeometry(b);
      const { x, y, w, h, door } = g;

      // roof
      ctx.fillStyle = '#2f2f2f';
      ctx.beginPath();
      ctx.moveTo(x + 12, y + 54);
      ctx.lineTo(x + 110, y + 14);
      ctx.lineTo(x + w - 14, y + 38);
      ctx.lineTo(x + w + 10, y + 56);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#5d5d5d';
      for (let i = 0; i < 20; i++) {
        ctx.fillRect(x + 8 + i * 18, y + 39 + (i % 2), 24, 4);
        ctx.fillRect(x + 2 + i * 18, y + 48 + ((i + 1) % 2), 24, 4);
      }

      // wall base
      ctx.fillStyle = '#32363a';
      ctx.fillRect(x + 12, y + 56, w - 16, h - 20);

      const stoneRows = [
        [26, 42, 34, 48, 30, 38, 34],
        [36, 30, 46, 28, 40, 32, 30],
        [28, 44, 34, 48, 26, 38, 32],
        [42, 32, 40, 30, 44, 28, 34]
      ];

      for (let r = 0; r < 8; r++) {
        const sy = y + 66 + r * 16;
        let sx = x + 18 + (r % 2 ? 10 : 0);
        const row = stoneRows[r % stoneRows.length];

        for (const sw of row) {
          if (sx + sw > x + w - 24) break;

          ctx.fillStyle = ((r + sw) % 2 === 0) ? '#6a6d72' : '#5b5f64';
          ctx.fillRect(sx, sy, sw, 10);

          ctx.fillStyle = 'rgba(0,0,0,0.12)';
          ctx.fillRect(sx, sy + 8, sw, 2);

          sx += sw + 6;
        }
      }

      // lintel above door
      ctx.fillStyle = '#6a4327';
      ctx.fillRect(x + 38, y + 78, w - 86, 16);

      ctx.fillStyle = '#b98a57';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(x + 52 + i * 34, y + 84, 10, 4);
      }

      // door
      ctx.fillStyle = '#4a2a18';
      ctx.fillRect(door.x, door.y, door.w, door.h);

      ctx.strokeStyle = '#875a38';
      ctx.lineWidth = 2;
      ctx.strokeRect(door.x + 5, door.y + 5, door.w - 10, door.h - 10);

      ctx.beginPath();
      ctx.arc(door.x + 28, door.y + 39, 10, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(door.x + 28, door.y + 52);
      ctx.lineTo(door.x + 28, door.y + 74);
      ctx.moveTo(door.x + 28, door.y + 60);
      ctx.lineTo(door.x + 16, door.y + 70);
      ctx.moveTo(door.x + 28, door.y + 60);
      ctx.lineTo(door.x + 40, door.y + 70);
      ctx.stroke();

      // standing slab on right
      ctx.fillStyle = '#454545';
      ctx.beginPath();
      ctx.moveTo(x + w - 26, y + h);
      ctx.lineTo(x + w + 12, y + 118);
      ctx.lineTo(x + w + 28, y + h - 4);
      ctx.closePath();
      ctx.fill();
    }

    function drawTree(x, y, w, h) {
      for (let ty = y; ty < y + h; ty += TILE) {
        for (let tx = x; tx < x + w; tx += TILE) {
          ctx.fillStyle = '#5a3b20';
          ctx.fillRect(tx + 8, ty + 14, 16, 22);

      ctx.fillStyle = c;
      ctx.fillRect(x - 2, y + 4, 32, 20);

      ctx.fillRect(x + 2, y - 2, 24, 12);

    function drawWeeds() {
      for (const w of game.weeds) {
        if (w.cleared) continue;
        const x = w.x - 4;
        const y = w.y - 10;
        ctx.fillStyle = '#4f8b34';
        ctx.fillRect(x + 8, y + 12, 16, 14);
        ctx.fillRect(x + 2, y + 18, 10, 12);
        ctx.fillRect(x + 20, y + 18, 10, 12);
        ctx.fillStyle = '#386525';
        ctx.fillRect(x + 13, y + 4, 6, 26);

    function drawStackZone() {
      const z = game.stackZone;

      // clear ground under the stack zone so nothing visually sits beneath it
      ctx.fillStyle = '#b88745';
      ctx.fillRect(z.x - 6, z.y - 4, z.w + 12, z.h + 8);

      // 地面底色
      ctx.fillStyle = '#916231';
      ctx.fillRect(z.x, z.y, z.w, z.h);
      ctx.strokeStyle = '#5a381b';
      ctx.lineWidth = 3;
      ctx.strokeRect(z.x + 1, z.y + 1, z.w - 2, z.h - 2);

      const deposited = game.weeds.filter(w => w.cleared).length - (game.carrying ? 1 : 0);
      const pileHeight = Math.min(5, Math.ceil(Math.max(0, deposited) / 4));

      // 還沒燒完前，顯示草木堆
      if (!game.ashReady) {
        for (let i = 0; i < pileHeight; i++) {
          ctx.fillStyle = i % 2 ? '#7d5228' : '#8a5a2b';
          ctx.fillRect(z.x + 10 + i * 2, z.y + z.h - 10 - i * 8, z.w - 20 - i * 4, 8);
        }
      }

      // 燃燒中：火從小變大
      if (game.burningTriggered) {
        const fireLevel = game.burningProgress;
        const flameCount = 2 + Math.floor(fireLevel * 4); // 2 → 6

        for (let i = 0; i < flameCount; i++) {
          const spacing = 16;
          const fx = z.x + 20 + i * spacing;
          const baseY = z.y + z.h - 8 - (i % 2) * 3;

          const up = 6 + fireLevel * 20 + Math.sin((performance.now() / 120) + i) * (2 + fireLevel * 4);
          const innerUp = up * 0.58;

          // 外焰
          ctx.fillStyle = '#ff8f2c';
          ctx.beginPath();
          ctx.moveTo(fx, baseY);
          ctx.lineTo(fx + 7, baseY - up);
          ctx.lineTo(fx + 14, baseY);
          ctx.fill();

          // 內焰
          ctx.fillStyle = '#ffd25a';
          ctx.beginPath();
          ctx.moveTo(fx + 3, baseY);
          ctx.lineTo(fx + 7, baseY - innerUp);
          ctx.lineTo(fx + 11, baseY);
          ctx.fill();
        }
      }

      // 燒完後：淡淡燒痕
      if (game.ashReady) {
        ctx.fillStyle = 'rgba(55, 45, 35, 0.28)';
        ctx.fillRect(z.x + 8, z.y + z.h - 18, z.w - 16, 10);

        ctx.fillStyle = 'rgba(120, 116, 110, 0.35)';
        for (let i = 0; i < 10; i++) {
          const ax = z.x + 12 + i * 8;
          const ay = z.y + z.h - 14 - (i % 2);
          ctx.fillRect(ax, ay, 4, 2);
        }
      }
    }

    function drawInteractOutline(box, radius = 6) {
      const pad = 6;
      const x = box.x - pad;
      const y = box.y - pad;
      const w = box.w + pad * 2;
      const h = box.h + pad * 2;

      ctx.save();

      // 外層淡白光
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 8;
      roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();

      // 內層亮白框
      ctx.strokeStyle = 'rgba(255,245,210,0.95)';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, w, h, radius);
      ctx.stroke();

      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawInteractionHints() {
      const player = game.player;

      // 石板屋門口
      if (!game.inHouse && isNear(player, game.houseDoorZone, 44)) {
        drawInteractOutline(game.houseDoorZone);
      }

      // 屋內出口
      if (game.inHouse && isNear(player, game.houseExitZone, 46)) {
        drawInteractOutline(game.houseExitZone);
      }

      // 屋內長者
      if (game.inHouse) {
        for (const npc of game.interiorNPCs) {
          if (isNear(player, npc, 50)) {
            drawInteractOutline(npc);
          }
        }
      }

      // 戶外長老
      if (!game.inHouse && isNear(player, game.elder, 56)) {
        drawInteractOutline(game.elder);
      }

      // 雜草 / 小樹
      if (!game.inHouse && game.blessingDone && !game.carrying) {
        const weed = game.weeds.find(
          w => !w.cleared && isNear(player, { x: w.x, y: w.y, w: w.w, h: w.h }, 34)
        );
        if (weed) {
          drawInteractOutline({ x: weed.x, y: weed.y, w: weed.w, h: weed.h });
        }
      }

      // 堆置區
      if (!game.inHouse && game.carrying && isNear(player, game.stackZone, 58)) {
        drawInteractOutline(game.stackZone);
      }

      if (!game.inHouse && game.allCleared && !game.carrying && isNear(player, game.stackZone, 58) && !game.burningTriggered && !game.ashReady) {
        drawInteractOutline(game.stackZone);
      }

      // 石頭堆
      if (!game.inHouse && game.landReady && !game.stoneWallBuilt) {
        const stack = game.stoneStacks.find(s => !s.done && isNear(player, s, 44));
        if (stack) {
          drawInteractOutline(stack);
        }
      }

      // 播種區塊
      if (!game.inHouse && game.landPrepared && !game.allSeeded) {
        const plot = game.landPlots.find(p => p.prepared && !p.seeded && isNear(player, p, 44));
        if (plot) {
          drawInteractOutline(plot);
        }
      }

      // 驅鳥器具本體
      if (!game.inHouse && game.allSeeded && !game.scareReady) {
        const device = game.scareDevices.find(d => !d.placed && isNear(player, d, 42));
        if (device) {
          drawInteractOutline(device);
        }
      }

      // 拉繩點
      if (!game.inHouse && game.scareReady && !game.birdPhaseDone) {
        const rope = game.scareDevices.find(
          d => d.placed && isNear(player, { x: d.ropeX, y: d.ropeY, w: 18, h: 18 }, 42)
        );

        if (rope) {
          drawInteractOutline({ x: rope.ropeX, y: rope.ropeY, w: 18, h: 18 }, 4);
        }
      }
    }
