name: Deploy GitHub Pages safely

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site without private save files
        run: |
          rm -rf dist
          mkdir -p dist

          rsync -av --delete ./ dist/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='dist/' \
            --exclude='node_modules/' \
            --exclude='downloads/' \
            --exclude='saves/' \
            --exclude='test-results/' \
            --exclude='playwright-report/' \
            --exclude='.playwright/' \
            --exclude='playwright/.auth/' \
            --exclude='storageState.json' \
            --exclude='*.storageState.json' \
            --exclude='private-rukai-millet-saves-*.json' \
            --exclude='rukai-millet-saves-*.json' \
            --exclude='*.save.json' \
            --exclude='*save*.json' \
            --exclude='*saves*.json'

          find dist -type f \( \
            -name 'private-rukai-millet-saves-*.json' -o \
            -name 'rukai-millet-saves-*.json' -o \
            -name '*.save.json' -o \
            -name '*save*.json' -o \
            -name '*saves*.json' -o \
            -name 'storageState.json' -o \
            -name '*.storageState.json' \
          \) -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
